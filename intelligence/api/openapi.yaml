components:
  parameters:
    intelligence-identity-id-path:
      description: Non-empty identity id path segment for Intelligence sub-resources.
      example: ef38f94347e94562b5bb8424a56397d8
      explode: false
      in: path
      name: id
      required: true
      schema:
        maxLength: 128
        minLength: 1
        type: string
      style: simple
      x-sailpoint-resource-operation-id: listIdentitiesV1
  responses:
    "401":
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/getIdentityIntelligenceV1_401_response'
      description: "Unauthorized - Returned if there is no authorization header, or\
        \ if the JWT token is expired."
    "403":
      content:
        application/json:
          examples:
            "403":
              summary: An example of a 403 response object
              value:
                detailCode: 403 Forbidden
                trackingId: b21b1f7ce4da4d639f2c62a57171b427
                messages:
                - locale: en-US
                  localeOrigin: DEFAULT
                  text: The server understood the request but refuses to authorize
                    it.
          schema:
            $ref: '#/components/schemas/errorresponsedto'
      description: "Forbidden - Returned if the user you are running as, doesn't have\
        \ access to this end-point."
    "429":
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/getIdentityIntelligenceV1_429_response'
      description: Too Many Requests - Returned in response to too many requests in
        a given period of time - rate limited. The Retry-After header in the response
        includes how long to wait before trying again.
  schemas:
    intelaccesssourcewire:
      properties:
        id:
          description: Source identifier referenced by the account wire object.
          example: 2c9180835d2e5168015d32f890301e89
          type: string
        name:
          description: Human-readable source name shown in administrative consoles.
          example: Active Directory
          type: string
      type: object
    intelaccessaccountwire:
      example:
        authoritative: true
        created: 2023-11-01T10:00:00Z
        name: jdoe
        modified: 2024-02-15T16:20:00Z
        disabled: false
        id: 2c91808874ff91550175097daaec161c
        source: "{}"
        locked: false
        systemAccount: false
        manuallyCorrelated: false
        nativeIdentity: "CN=jdoe,OU=Users,DC=example,DC=com"
        isMachine: false
      properties:
        id:
          description: Unique account identifier in Identity Security Cloud.
          example: 2c91808874ff91550175097daaec161c
          type: string
        name:
          description: Account name or login value on the correlated source.
          example: jdoe
          type: string
        source:
          allOf:
          - $ref: '#/components/schemas/intelaccesssourcewire'
          description: Source metadata for the account as returned by List Accounts
            wire format.
          type: object
        disabled:
          description: True when the account is administratively disabled on the source.
          example: false
          type: boolean
        locked:
          description: True when the account is locked from interactive sign-in on
            the source.
          example: false
          type: boolean
        authoritative:
          description: True when the account is treated as authoritative for attribute
            synchronization.
          example: true
          type: boolean
        systemAccount:
          description: True when the account represents a non-interactive or system
            principal.
          example: false
          type: boolean
        isMachine:
          description: True when the account belongs to a machine or service identity.
          example: false
          type: boolean
        manuallyCorrelated:
          description: True when an administrator manually correlated the account
            to an identity.
          example: false
          type: boolean
        nativeIdentity:
          description: Native identifier string on the source directory or application.
          example: "CN=jdoe,OU=Users,DC=example,DC=com"
          nullable: true
          type: string
        created:
          description: Timestamp when the account record was created in Identity Security
            Cloud.
          example: 2023-11-01T10:00:00Z
          format: date-time
          type: string
        modified:
          description: Timestamp when the account record was last modified in Identity
            Security Cloud.
          example: 2024-02-15T16:20:00Z
          format: date-time
          type: string
      required:
      - authoritative
      - created
      - disabled
      - id
      - isMachine
      - locked
      - manuallyCorrelated
      - modified
      - name
      - systemAccount
      type: object
    intelaccountsslice:
      description: Accounts slice embedded in the aggregate identity response.
      properties:
        items:
          description: First page of accounts for the identity.
          items:
            $ref: '#/components/schemas/intelaccessaccountwire'
          type: array
        next:
          description: Absolute URL to the next accounts page; present only when more
            results exist.
          example: https://tenant.example.api.cloud.sailpoint.com/v2026/intelligence/identities/ef38f94347e94562b5bb8424a56397d8/accounts?limit=10&offset=10
          format: uri
          type: string
      required:
      - items
      type: object
    intelprivilegedaccessitemwire:
      properties:
        privileged:
          description: True when this item is classified as privileged access for
            the identity.
          example: true
          type: boolean
        id:
          description: Identifier of the privileged access item.
          example: ent-1
          type: string
        type:
          description: Type of privileged access object.
          example: entitlement
          type: string
        displayName:
          description: Display label for the privileged access item in administrative
            experiences.
          example: Example_Admin_Access
          type: string
        name:
          description: Technical name of the privileged access item.
          example: Example_Admin_Access
          type: string
        source:
          $ref: '#/components/schemas/intelprivilegedaccessitemwire_source'
        attribute:
          description: Source attribute name that carries the privileged value when
            applicable.
          example: EXAMPLE_PERMISSION_GROUPS
          type: string
        value:
          description: Privileged value on the source attribute when applicable.
          example: Example_Admin_Access
          type: string
      required:
      - id
      - privileged
      - type
      type: object
    intelprivilegedaccessslice:
      description: Full privileged access result embedded in the aggregate identity
        response.
      properties:
        items:
          description: Privileged access items for the identity.
          items:
            $ref: '#/components/schemas/intelprivilegedaccessitemwire'
          type: array
      required:
      - items
      type: object
    inteloutlieraccessitem:
      description: One outlier access-item row.
      example:
        accessType: ENTITLEMENT
        displayName: Example_Admin_Access
        extremelyRare: false
        description: description
        id: outlier-access-001
        sourceName: Example SaaS Source
      properties:
        id:
          description: Stable identifier of the outlier access-item row.
          example: outlier-access-001
          type: string
        displayName:
          description: Display label of the risky access item.
          example: Example_Admin_Access
          type: string
        description:
          description: Optional descriptive text for the risky access item.
          nullable: true
          type: string
          example: null
        accessType:
          description: Access item type.
          example: ENTITLEMENT
          type: string
        sourceName:
          description: Source name where the risky access item exists.
          example: Example SaaS Source
          type: string
        extremelyRare:
          description: Indicates whether analytics marked this item as extremely rare.
          example: false
          type: boolean
      required:
      - accessType
      - displayName
      - extremelyRare
      - id
      - sourceName
      type: object
    intelrareaccessslice:
      description: Rare access slice embedded in the aggregate identity response.
      properties:
        items:
          description: First page of rare access items for the identity.
          items:
            $ref: '#/components/schemas/inteloutlieraccessitem'
          type: array
        next:
          description: Absolute URL to the next rareAccess page; present only when
            more results exist.
          example: https://tenant.example.api.cloud.sailpoint.com/v2026/intelligence/identities/ef38f94347e94562b5bb8424a56397d8/outliers/rare-access?limit=10&offset=10
          format: uri
          type: string
      required:
      - items
      type: object
    inteloutliersslice:
      description: Outlier slices embedded in the aggregate identity response.
      properties:
        rareAccess:
          allOf:
          - $ref: '#/components/schemas/intelrareaccessslice'
          description: First page of rare access items for the identity.
      required:
      - rareAccess
      type: object
    intelaccessitemhistoryevent:
      additionalProperties: true
      description: |
        Access-item history event. Supported eventTypes are AccessItemAssociated, AccessItemRemoved,
        and AccountStatusChanged.
      example:
        dateTime: 2026-05-11T09:40:04.496Z
        eventType: AccessItemRemoved
      properties:
        eventType:
          description: Type of access-item history event.
          enum:
          - AccessItemAssociated
          - AccessItemRemoved
          - AccountStatusChanged
          example: AccessItemRemoved
          type: string
        dateTime:
          description: Event timestamp.
          example: 2026-05-11T09:40:04.496Z
          format: date-time
          type: string
      required:
      - eventType
      type: object
    intelaccesshistoryaccessitemsslice:
      description: Access-item history slice embedded in the aggregate identity response.
      properties:
        items:
          description: First page of access-item history events for the identity.
          items:
            $ref: '#/components/schemas/intelaccessitemhistoryevent'
          type: array
        next:
          description: Absolute URL to the next access-items page; present only when
            more results exist.
          example: https://tenant.example.api.cloud.sailpoint.com/v2026/intelligence/identities/ef38f94347e94562b5bb8424a56397d8/access-history/access-items?limit=10&offset=10
          format: uri
          type: string
      required:
      - items
      type: object
    intelcertificationhistoryevent:
      additionalProperties: true
      description: Certification history event. Supported eventType is IdentityCertified.
      example:
        dateTime: 2019-03-08T22:37:33.901Z
        certificationId: 2c91808a77ff216301782327a50f09bf
        certificationName: Example certification
        signedDate: 2019-03-08T22:37:33.901Z
        eventType: IdentityCertified
      properties:
        eventType:
          description: Type of certification history event.
          enum:
          - IdentityCertified
          example: IdentityCertified
          type: string
        dateTime:
          description: Event timestamp.
          example: 2019-03-08T22:37:33.901Z
          format: date-time
          type: string
        certificationId:
          description: Identifier of the certification.
          example: 2c91808a77ff216301782327a50f09bf
          type: string
        certificationName:
          description: Display name of the certification.
          example: Example certification
          type: string
        signedDate:
          description: Timestamp when the certification was signed.
          example: 2019-03-08T22:37:33.901Z
          format: date-time
          type: string
      required:
      - eventType
      type: object
    intelaccesshistorycertificationsslice:
      description: Certification history slice embedded in the aggregate identity
        response.
      properties:
        items:
          description: First page of certification history events for the identity.
          items:
            $ref: '#/components/schemas/intelcertificationhistoryevent'
          type: array
        next:
          description: Absolute URL to the next certifications page; present only
            when more results exist.
          example: https://tenant.example.api.cloud.sailpoint.com/v2026/intelligence/identities/ef38f94347e94562b5bb8424a56397d8/access-history/certifications?limit=10&offset=10
          format: uri
          type: string
      required:
      - items
      type: object
    intelaccesshistory:
      description: |
        Access-history split into two independently paged categories. accessItems carries
        grant, remove, and account-status events. certifications carries identity-certified events.
      properties:
        accessItems:
          allOf:
          - $ref: '#/components/schemas/intelaccesshistoryaccessitemsslice'
          description: First page of access-item history events for the identity.
          type: object
        certifications:
          allOf:
          - $ref: '#/components/schemas/intelaccesshistorycertificationsslice'
          description: First page of certification history events for the identity.
          type: object
      required:
      - accessItems
      - certifications
      type: object
    intelidentityaggregate:
      description: |
        Flat identity response with identity attributes hoisted to the top level.
        The accounts, privilegedAccess, and accessHistory slices are always present.
        The outliers slice is omitted when the tenant lacks the IDA-outliers license.
      example:
        displayName: Example User
        created: 2026-05-12T08:00:00Z
        privilegedAccess: "{}"
        description: Example description.
        owners: governance-group-001
        outliers: "{}"
        type: HUMAN
        accessHistory: "{}"
        subtype: Employee
        identityStatus: ACTIVE
        modified: 2026-05-12T09:15:30Z
        alias: example.user
        isManager: false
        attributes:
          department: Engineering
          region: US
        id: ef38f94347e94562b5bb8424a56397d8
        accounts: "{}"
        email: user@example.com
      properties:
        id:
          description: Identity Security Cloud identifier for this identity.
          example: ef38f94347e94562b5bb8424a56397d8
          type: string
        type:
          description: Identity type for the matched record.
          enum:
          - HUMAN
          example: HUMAN
          type: string
        displayName:
          description: Preferred display name for the identity across administrative
            experiences.
          example: Example User
          type: string
        description:
          description: Optional free-text description assigned to the identity profile
            when present.
          example: Example description.
          nullable: true
          type: string
        subtype:
          description: NERM classification for the identity.
          enum:
          - Employee
          - Non Employee
          - Cannot Determine
          example: Employee
          nullable: true
          type: string
        owners:
          description: Serialized owner reference information when populated by upstream
            identity services.
          example: governance-group-001
          nullable: true
          type: string
        attributes:
          additionalProperties: true
          description: Arbitrary SCIM-style attribute bag returned for the identity
            context view.
          example:
            department: Engineering
            region: US
          type: object
        created:
          description: Timestamp when the identity record was created in Identity
            Security Cloud.
          example: 2026-05-12T08:00:00Z
          format: date-time
          type: string
        modified:
          description: Timestamp when the identity record was last modified in Identity
            Security Cloud.
          example: 2026-05-12T09:15:30Z
          format: date-time
          type: string
        alias:
          description: Primary login or account alias for the identity.
          example: example.user
          type: string
        email:
          description: Primary business email address for the identity.
          example: user@example.com
          format: email
          type: string
        identityStatus:
          description: Current identity lifecycle status label from Identity Security
            Cloud.
          example: ACTIVE
          type: string
        isManager:
          description: True when the identity is flagged as a people manager in the
            organization.
          example: false
          type: boolean
        accounts:
          allOf:
          - $ref: '#/components/schemas/intelaccountsslice'
          description: First page of accounts for the identity.
          type: object
        privilegedAccess:
          allOf:
          - $ref: '#/components/schemas/intelprivilegedaccessslice'
          description: Full privileged access result for the identity.
          type: object
        outliers:
          allOf:
          - $ref: '#/components/schemas/inteloutliersslice'
          description: Rare access slice; omitted when the tenant lacks the IDA-outliers
            license.
          type: object
        accessHistory:
          allOf:
          - $ref: '#/components/schemas/intelaccesshistory'
          description: Access-history split into access items and certifications sub-slices.
          type: object
      required:
      - accessHistory
      - accounts
      - id
      - isManager
      - privilegedAccess
      - type
      type: object
    errorbody:
      example:
        message: The filters query parameter is required and cannot be empty.
        detailCode: IDC_BAD_REQUEST
      properties:
        detailCode:
          description: Machine-readable error code returned by the Intelligence service.
