      parameters:
      - description: Non-empty identity id path segment for Intelligence sub-resources.
        example: ef38f94347e94562b5bb8424a56397d8
        explode: false
        in: path
        name: id
        required: true
        schema:
          maxLength: 128
          minLength: 1
          type: string
        style: simple
        x-sailpoint-resource-operation-id: listIdentitiesV1
      - description: Page size. Defaults to 250; values above 250 are rejected with
          400.
        example: 250
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 250
          format: int32
          maximum: 250
          minimum: 1
          type: integer
        style: form
      - description: Zero-based page offset. Defaults to 0.
        example: 0
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          format: int32
          minimum: 0
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              example:
              - id: 2c91808874ff91550175097daaec161c
                name: example.user
                source:
                  id: 60de165099e649cb828553a5e8510fc4
                  name: Example Directory
                disabled: false
                locked: false
                authoritative: false
                systemAccount: false
                isMachine: false
                manuallyCorrelated: false
                nativeIdentity: "CN=example.user,OU=users"
                created: 2026-01-01T00:00:00Z
                modified: 2026-05-01T00:00:00Z
              schema:
                items:
                  $ref: '#/components/schemas/intelaccessaccountwire'
                type: array
          description: One page of accounts.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorbody'
          description: Invalid path or query parameters.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getIdentityIntelligenceV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getIdentityIntelligenceV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorbody'
          description: Internal or upstream server failure.
      security:
      - userAuth:
        - sp:identity-sec-intel:read
      - applicationAuth:
        - sp:identity-sec-intel:read
      summary: List identity accounts
      tags:
      - Intelligence
      x-required-right: sp:identity-sec-intel:read
      x-sailpoint-userLevels:
      - Any
  /intelligence/v1/identities/{id}/outliers/rare-access:
