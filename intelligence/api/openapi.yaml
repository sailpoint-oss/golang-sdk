openapi: 3.0.1
info:
  contact:
    name: Developer Relations
    url: https://developer.sailpoint.com/discuss/api-help
  description: "Use these APIs to interact with the Identity Security Cloud platform\
    \ to achieve repeatable, automated processes with greater scalability. We encourage\
    \ you to join the SailPoint Developer Community forum at https://developer.sailpoint.com/discuss\
    \ to connect with other developers using our APIs."
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://developer.sailpoint.com/discuss/tos
  title: Identity Security Cloud API - Intelligence
  version: v1
servers:
- description: This is the production API server.
  url: "https://{tenant}.api.identitynow.com"
  variables:
    tenant:
      default: sailpoint
      description: "This is the name of your tenant, typically your company's name."
- description: This is the versioned API server.
  url: "https://{apiUrl}"
  variables:
    apiUrl:
      default: sailpoint.api.identitynow.com
      description: This is the api url of your tenant
security:
- userAuth:
  - sp:scopes:all
tags:
- description: |
    Read-only HTTP API that returns the Intelligence (identity context)
    for SecOps enrichment use cases (SIEM/SOAR connectors, MCP, browser
    extension). Backed by Atlas internal-REST calls to MICE, Shelby List Accounts,
    SDS Search, IDA-outliers, and identity-history.
  name: Intelligence
paths:
  /intelligence/v1/identities:
    get:
      description: |
        Requires tenant license idn:response-and-remediation.

        Resolves exactly one identity by SCIM-style filters expression and returns the Intelligence envelope.
        Supported queryable fields are id and email only.
        The response embeds the first page of accounts, rare access, access-history access items, and
        access-history certifications. Paged slices include a next link only when more results exist.
        The privilegedAccess slice contains the full result and is not paged.
        The outliers slice is omitted when the tenant lacks the IDA-outliers license.

        A single match returns HTTP 200 with IntelIdentityAggregate.

        Zero matches returns HTTP 404 with detailCode IDC_IDENTITY_NOT_FOUND.

        Multiple matches returns HTTP 409 with detailCode IDC_IDENTITY_AMBIGUOUS and candidates listing each match.
      operationId: getIdentityIntelligenceV1
      parameters:
      - description: |-
          Filter results using the standard syntax described in [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#filtering-results)

          Filtering is supported for the following fields and operators:

          **id**: *eq*

          **email**: *eq*
        examples:
          byId:
            value: id eq "ef38f94347e94562b5bb8424a56397d8"
          byEmail:
            value: email eq "user@example.com"
        explode: true
        in: query
        name: filters
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              example:
                id: ef38f94347e94562b5bb8424a56397d8
                type: HUMAN
                displayName: Example User
                subtype: Employee
                attributes:
                  city: Example City
                  cloudStatus: ACTIVE
                created: 2026-05-12T08:00:00Z
                modified: 2026-05-12T09:15:30Z
                alias: example.user
                email: user@example.com
                identityStatus: ACTIVE
                isManager: false
                accounts:
                  items:
                  - id: 2c91808874ff91550175097daaec161c
                    name: example.user
                    source:
                      id: 60de165099e649cb828553a5e8510fc4
                      name: Example Directory
                    disabled: false
                    locked: false
                    authoritative: false
                    systemAccount: false
                    isMachine: false
                    manuallyCorrelated: false
                    nativeIdentity: "CN=example.user,OU=users"
                    created: 2026-01-01T00:00:00Z
                    modified: 2026-05-01T00:00:00Z
                  next: https://tenant.example.api.cloud.sailpoint.com/v2026/intelligence/identities/ef38f94347e94562b5bb8424a56397d8/accounts?limit=10&offset=10
                privilegedAccess:
                  items:
                  - privileged: true
                    id: ent-1
                    type: entitlement
                    displayName: Example_Admin_Access
                    name: Example_Admin_Access
                    source:
                      name: Example HR Source
                      id: src-2
                    attribute: EXAMPLE_PERMISSION_GROUPS
                    value: Example_Admin_Access
                outliers:
                  rareAccess:
                    items:
                    - id: outlier-access-001
                      displayName: Example_Admin_Access
                      description: null
                      accessType: ENTITLEMENT
                      sourceName: Example SaaS Source
                      extremelyRare: false
                    next: https://tenant.example.api.cloud.sailpoint.com/v2026/intelligence/identities/ef38f94347e94562b5bb8424a56397d8/outliers/rare-access?limit=10&offset=10
                accessHistory:
                  accessItems:
                    items:
                    - eventType: AccessItemRemoved
                      dateTime: 2026-05-11T09:40:04.496Z
                      accessItem:
                        id: access-item-001
                        accessType: entitlement
                        displayName: Example Access
                        sourceName: Example Directory
                    next: https://tenant.example.api.cloud.sailpoint.com/v2026/intelligence/identities/ef38f94347e94562b5bb8424a56397d8/access-history/access-items?limit=10&offset=10
                  certifications:
                    items:
                    - eventType: IdentityCertified
                      dateTime: 2019-03-08T22:37:33.901Z
                      certificationId: 2c91808a77ff216301782327a50f09bf
                      certificationName: Example certification
                      signedDate: 2019-03-08T22:37:33.901Z
                    next: https://tenant.example.api.cloud.sailpoint.com/v2026/intelligence/identities/ef38f94347e94562b5bb8424a56397d8/access-history/certifications?limit=10&offset=10
              schema:
                $ref: '#/components/schemas/intelidentityaggregate'
          description: Exactly one identity matched.
        "400":
          content:
            application/json:
              example:
                detailCode: INVALID_REQUEST
                message: filters must be supplied and non-empty
              schema:
                $ref: '#/components/schemas/errorbody'
          description: Missing or invalid filters.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getIdentityIntelligenceV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "404":
          content:
            application/json:
              example:
                detailCode: IDC_IDENTITY_NOT_FOUND
                message: no identity matched the supplied filter
              schema:
                $ref: '#/components/schemas/intelidentitynotfoundbody'
          description: No identity matched the filter.
        "409":
          content:
            application/json:
              example:
                detailCode: IDC_IDENTITY_AMBIGUOUS
                message: multiple identities matched the supplied filter
                candidates:
                - id: cand-1
                  displayName: Example A
                - id: cand-2
                  displayName: Example B
              schema:
                $ref: '#/components/schemas/intelidentityambiguousbody'
          description: Multiple identities matched the filter.
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getIdentityIntelligenceV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorbody'
          description: Upstream or internal failure.
      security:
      - userAuth:
        - sp:identity-sec-intel:read
      - applicationAuth:
        - sp:identity-sec-intel:read
      summary: Get identity by filter
      tags:
      - Intelligence
      x-required-right: sp:identity-sec-intel:read
      x-sailpoint-userLevels:
      - Any
  /intelligence/v1/identities/{id}/accounts:
    get:
      description: |
        Continuation endpoint for the parent response's `accounts.next` link.
