        required: true
        schema:
          maxLength: 128
          minLength: 1
          type: string
        style: simple
        x-sailpoint-resource-operation-id: listIdentitiesV1
      - description: Page size. Defaults to 250; values above 250 are rejected with
          400.
        example: 250
        explode: true
        in: query
        name: limit
        required: false
        schema:
