        example: 250
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 250
          format: int32
          maximum: 250
          minimum: 1
          type: integer
        style: form
      - description: Zero-based page offset. Defaults to 0.
        example: 0
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          format: int32
          minimum: 0
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              example:
              - id: outlier-access-001
                displayName: Example_Admin_Access
                description: null
                accessType: ENTITLEMENT
                sourceName: Example SaaS Source
                extremelyRare: false
              schema:
