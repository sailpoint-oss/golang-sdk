            - 2c5680835d191a85765d28455b4a9823
            items:
              type: string
            type: array
          provisioningConfig:
            $ref: '#/components/schemas/provisioningconfig'
          attributes:
            additionalProperties: true
            description: Service Desk integration's attributes. Validation constraints
              enforced by the implementation.
            example:
              property: value
              key: value
            type: object
          beforeProvisioningRule:
            allOf:
            - $ref: '#/components/schemas/beforeprovisioningruledto'
        required:
        - attributes
        - description
        - name
        - type
        type: object
      example:
        ownerRef: ""
        cluster: xyzzy999
        created: 2024-01-17T18:45:25.994Z
        description: A very nice Service Desk integration
        clusterRef: ""
        type: ServiceNowSDIM
        managedSources:
        - 2c9180835d191a86015d28455b4a2329
        - 2c5680835d191a85765d28455b4a9823
        provisioningConfig:
          managedResourceRefs:
          - type: SOURCE
            id: 2c9180855d191c59015d291ceb051111
