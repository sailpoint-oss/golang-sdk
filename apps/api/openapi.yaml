                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "404":
          content:
            application/json:
              examples:
                "404":
                  summary: An example of a 404 response object
                  value:
                    detailCode: 404 Not found
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server did not find a current representation for the
                        target resource.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Not Found - returned if the request URL refers to a resource
            or object that does not exist
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getSourceAppV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              examples:
                "500":
                  summary: An example of a 500 response object
                  value:
                    detailCode: 500.0 Internal Fault
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: An internal fault occurred.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Internal Server Error - Returned if there is an unexpected
            error.
      security:
      - userAuth:
        - idn:app-roles:read
        - idn:app-roles:manage
      - applicationAuth:
        - idn:app-roles:read
        - idn:app-roles:manage
      summary: Get source app by id
      tags:
      - Apps
    patch:
      description: |-
        This API updates an existing source app using [JSON Patch](https://tools.ietf.org/html/rfc6902) syntax.
        The following fields are patchable: **name**, **description**, **enabled**, **owner**, **provisionRequestEnabled**, **appCenterEnabled**, **accountSource**,  **matchAllAccounts** and **accessProfiles**.
        Name, description and owner can't be empty or null.
      operationId: patchSourceAppV1
      parameters:
      - description: ID of the source app to patch
        explode: false
        in: path
        name: id
        required: true
        schema:
          example: 2c91808a7813090a017814121e121518
          type: string
        style: simple
        x-sailpoint-resource-operation-id: listAllSourceAppV1
      - description: Use this header to enable this experimental API.
        example: true
        explode: false
        in: header
        name: X-SailPoint-Experimental
        required: true
        schema:
          default: "true"
          type: string
        style: simple
      requestBody:
        content:
          application/json-patch+json:
            examples:
              Make an app enabled and matchAllAccounts in one call:
                description: This example shows how multiple fields may be updated
                  with a single patch call.
                value:
                - op: replace
                  path: /enabled
                  value: true
                - op: replace
                  path: /matchAllAccounts
                  value: true
              Replace an owner for an source app:
                description: This example shows how to use patch to replace the source
                  app's owner by replacing the owner's info.
                value:
                - op: replace
                  path: /owner
                  value:
                    id: 2c9180858315595501831958427e5424
              Update the description for the source app:
                description: This example shows how to use patch to update a description
                  for the source app.
                value:
                - op: replace
                  path: /description
                  value: new description for the source app
              Update the name for the source app:
                description: This example shows how to use patch to update the source
                  app's name.
                value:
                - op: replace
                  path: /name
                  value: source app new name
              Add access profile:
                description: Add one access profile to the existing list
                value:
                - op: add
                  path: /accessProfiles/-
                  value: 2c9180857725c14301772a93bb77242d
              Replace access profiles:
                description: Replace all access profiles with a new list of access
                  profiles
                value:
                - op: replace
                  path: /accessProfiles
                  value:
                  - 2c9180857725c14301772a93bb77242d
                  - c9575abb5e3a4e3db82b2f989a738aa2
              Remove access profile:
                description: Remove the first access profile in the list
                value:
                - op: remove
                  path: /accessProfiles/0
            schema:
              example:
              - op: replace
                path: /enabled
                value: true
              items:
                $ref: '#/components/schemas/jsonpatchoperation'
              type: array
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sourceapppatchdto'
          description: Responds with the source app as updated.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Client Error - Returned if the request body is invalid.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getSourceAppV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
