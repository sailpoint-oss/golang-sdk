          description: Internal Server Error - Returned if there is an unexpected
            error.
      security:
      - userAuth:
        - idn:app-roles:read
        - idn:app-roles:manage
      - applicationAuth:
        - idn:app-roles:read
        - idn:app-roles:manage
      summary: List assigned source apps
      tags:
      - Apps
