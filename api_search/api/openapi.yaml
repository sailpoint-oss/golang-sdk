                doc_count: 23
              - key: Singapore
                doc_count: 22
              - key: Tokyo
                doc_count: 20
              - key: Taipei
                doc_count: 16
          type: object
        hits:
          description: |
            The results of the aggregation search query.
          items:
            $ref: '#/components/schemas/searchdocuments'
          type: array
      type: object
    aggregationresult-csv:
      description: |
        If the *Accept:text/csv* header is specified and the *aggregationType* parameter in the request body is *SAILPOINT*,

        the aggregation result will be returned as a CSV document.
      example: "[\"Identity Locations,Count\",\"Munich,23\",\"Brussels,26\",\"Singapore,22\"\
        ,\"Tokyo,20\",\"Taipei,16\",\"London,64\",\"Austin,109\",\"Sao Paulo,24\"\
        ,\"San Jose,27\"]"
      type: string
    searchdocument:
      type: object
