components:
  parameters:
    limit:
      description: |-
        Max number of results to return.
        See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
      example: 250
      explode: true
      in: query
      name: limit
      required: false
      schema:
        default: 250
        format: int32
        maximum: 250
        minimum: 0
        type: integer
      style: form
    offset:
      description: |-
        Offset into the full result set. Usually specified with *limit* to paginate through the results.
        See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
      example: 0
      explode: true
      in: query
      name: offset
      required: false
      schema:
        default: 0
        format: int32
        minimum: 0
        type: integer
      style: form
    count:
      description: |-
        If *true* it will populate the *X-Total-Count* response header with the number of results that would be returned if *limit* and *offset* were ignored.

        Since requesting a total count can have a performance impact, it is recommended not to send **count=true** if that value will not be used.

        See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
      example: true
      explode: true
      in: query
      name: count
      required: false
      schema:
        default: false
        type: boolean
      style: form
  responses:
    "202":
      content:
        application/json:
          schema:
            type: object
      description: Accepted - Returned if the request was successfully accepted into
        the system.
    "400":
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorresponsedto'
      description: Client Error - Returned if the request body is invalid.
    "401":
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/listAccountsV1_401_response'
      description: "Unauthorized - Returned if there is no authorization header, or\
        \ if the JWT token is expired."
    "403":
      content:
        application/json:
          examples:
            "403":
              summary: An example of a 403 response object
              value:
                detailCode: 403 Forbidden
                trackingId: b21b1f7ce4da4d639f2c62a57171b427
                messages:
                - locale: en-US
                  localeOrigin: DEFAULT
                  text: The server understood the request but refuses to authorize
                    it.
          schema:
            $ref: '#/components/schemas/errorresponsedto'
      description: "Forbidden - Returned if the user you are running as, doesn't have\
        \ access to this end-point."
    "404":
      content:
        application/json:
          examples:
            "404":
              summary: An example of a 404 response object
              value:
                detailCode: 404 Not found
                trackingId: b21b1f7ce4da4d639f2c62a57171b427
                messages:
                - locale: en-US
                  localeOrigin: DEFAULT
                  text: The server did not find a current representation for the target
                    resource.
          schema:
            $ref: '#/components/schemas/errorresponsedto'
      description: Not Found - returned if the request URL refers to a resource or
        object that does not exist
    "429":
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/listAccountsV1_429_response'
      description: Too Many Requests - Returned in response to too many requests in
        a given period of time - rate limited. The Retry-After header in the response
        includes how long to wait before trying again.
    "500":
      content:
        application/json:
          examples:
            "500":
              summary: An example of a 500 response object
              value:
                detailCode: 500.0 Internal Fault
                trackingId: b21b1f7ce4da4d639f2c62a57171b427
                messages:
                - locale: en-US
                  localeOrigin: DEFAULT
                  text: An internal fault occurred.
          schema:
            $ref: '#/components/schemas/errorresponsedto'
      description: Internal Server Error - Returned if there is an unexpected error.
  schemas:
    basecommondto:
      properties:
        id:
          description: System-generated unique ID of the Object
          example: id12345
          readOnly: true
          type: string
        name:
          description: Name of the Object
          example: aName
          nullable: true
          type: string
        created:
          description: Creation date of the Object
          example: 2015-05-28T14:07:17Z
          format: date-time
          readOnly: true
          type: string
        modified:
          description: Last modification date of the Object
          example: 2015-05-28T14:07:17Z
          format: date-time
          readOnly: true
          type: string
      required:
      - name
      title: Base Common Dto
      type: object
    recommendation:
      properties:
        type:
          description: Recommended type of account.
          enum:
          - HUMAN
          - MACHINE
          example: MACHINE
          type: string
        method:
          description: "Method used to produce the recommendation. DISCOVERY - suggested\
            \ by AI, SOURCE - the account comes from a source flagged as containing\
            \ machine accounts, CRITERIA - the account satisfies classification criteria."
          enum:
          - DISCOVERY
          - SOURCE
          - CRITERIA
          example: DISCOVERY
          type: string
      required:
      - method
      - type
      title: Recommendation
      type: object
    dtotype:
      description: An enumeration of the types of DTOs supported within the IdentityNow
        infrastructure.
      enum:
      - ACCOUNT_CORRELATION_CONFIG
      - ACCESS_PROFILE
      - ACCESS_REQUEST_APPROVAL
      - ACCOUNT
      - APPLICATION
      - CAMPAIGN
      - CAMPAIGN_FILTER
      - CERTIFICATION
      - CLUSTER
      - CONNECTOR_SCHEMA
      - ENTITLEMENT
      - GOVERNANCE_GROUP
      - IDENTITY
      - IDENTITY_PROFILE
      - IDENTITY_REQUEST
      - MACHINE_IDENTITY
      - LIFECYCLE_STATE
      - PASSWORD_POLICY
      - ROLE
      - RULE
      - SOD_POLICY
      - SOURCE
      - TAG
      - TAG_CATEGORY
      - TASK_RESULT
      - REPORT_RESULT
      - SOD_VIOLATION
      - ACCOUNT_ACTIVITY
      - WORKGROUP
      example: IDENTITY
      type: string
    basereferencedto:
      properties:
        type:
          $ref: '#/components/schemas/dtotype'
        id:
          description: ID of the object to which this reference applies
          example: 2c91808568c529c60168cca6f90c1313
          type: string
        name:
          description: Human-readable display name of the object to which this reference
            applies
          example: William Wilson
          type: string
      title: Base Reference Dto
      type: object
    account:
      allOf:
      - $ref: '#/components/schemas/basecommondto'
      - properties:
          sourceId:
            description: The unique ID of the source this account belongs to
            example: 2c9180835d2e5168015d32f890ca1581
            type: string
          sourceName:
            description: The display name of the source this account belongs to
            example: Employees
            nullable: true
            type: string
          identityId:
            description: The unique ID of the identity this account is correlated
              to
            example: 2c9180835d2e5168015d32f890ca1581
            type: string
          cloudLifecycleState:
            description: The lifecycle state of the identity this account is correlated
              to
            example: active
            nullable: true
            type: string
          identityState:
            description: The identity state of the identity this account is correlated
              to
            example: ACTIVE
            nullable: true
            type: string
          connectionType:
            description: The connection type of the source this account is from
            example: direct
            nullable: true
            type: string
          isMachine:
            default: false
            description: Indicates if the account is of machine type
            example: true
            type: boolean
          recommendation:
            $ref: '#/components/schemas/account_allOf_recommendation'
          attributes:
            additionalProperties: true
            description: The account attributes that are aggregated
            example:
              firstName: SailPoint
              lastName: Support
              displayName: SailPoint Support
            nullable: true
            type: object
          authoritative:
            description: Indicates if this account is from an authoritative source
            example: false
            type: boolean
          description:
            description: A description of the account
            nullable: true
            type: string
            example: null
          disabled:
            description: Indicates if the account is currently disabled
            example: false
            type: boolean
          locked:
            description: Indicates if the account is currently locked
            example: false
            type: boolean
          nativeIdentity:
            description: The unique ID of the account generated by the source system
            example: "552775"
            type: string
          systemAccount:
            description: "If true, this is a user account within IdentityNow.  If\
              \ false, this is an account from a source system."
            example: false
            type: boolean
          uncorrelated:
            description: Indicates if this account is not correlated to an identity
            example: false
            type: boolean
          uuid:
            description: The unique ID of the account as determined by the account
              schema
            example: "{b0dce506-d6d4-44d2-8a32-d9a5b21fb175}"
            nullable: true
            type: string
          manuallyCorrelated:
            description: Indicates if the account has been manually correlated to
              an identity
            example: false
            type: boolean
          hasEntitlements:
            description: Indicates if the account has entitlements
            example: true
            type: boolean
          identity:
            $ref: '#/components/schemas/account_allOf_identity'
          sourceOwner:
            $ref: '#/components/schemas/account_allOf_sourceOwner'
          features:
            description: A string list containing the owning source's features
            example: ENABLE
            nullable: true
            type: string
          origin:
            description: The origin of the account either aggregated or provisioned
            enum:
            - AGGREGATED
            - PROVISIONED
            - null
            example: AGGREGATED
            nullable: true
            type: string
          ownerIdentity:
            $ref: '#/components/schemas/account_allOf_ownerIdentity'
        required:
        - attributes
        - authoritative
        - disabled
        - hasEntitlements
        - locked
        - manuallyCorrelated
        - nativeIdentity
        - sourceId
        - sourceName
        - systemAccount
        - uncorrelated
        type: object
      example:
        sourceId: 2c9180835d2e5168015d32f890ca1581
        origin: AGGREGATED
        recommendation:
          method: DISCOVERY
          type: MACHINE
        description: description
        sourceOwner:
          name: Adam Kennedy
          id: 2c918084660f45d6016617daa9210584
          type: IDENTITY
        connectionType: direct
        uuid: "{b0dce506-d6d4-44d2-8a32-d9a5b21fb175}"
        ownerIdentity:
          name: William Wilson
          id: 2c91808568c529c60168cca6f90c1313
          type: IDENTITY
        features: ENABLE
        identity:
          name: John Doe
          id: 2c918084660f45d6016617daa9210584
          type: IDENTITY
        modified: 2015-05-28T14:07:17Z
        disabled: false
        hasEntitlements: true
        id: id12345
        locked: false
        isMachine: true
        authoritative: false
        created: 2015-05-28T14:07:17Z
        manuallyCorrelated: false
        identityState: ACTIVE
        nativeIdentity: "552775"
        uncorrelated: false
        identityId: 2c9180835d2e5168015d32f890ca1581
        name: aName
        cloudLifecycleState: active
        attributes:
          firstName: SailPoint
          lastName: Support
          displayName: SailPoint Support
        sourceName: Employees
        systemAccount: false
    localeorigin:
      description: "An indicator of how the locale was selected. *DEFAULT* means the\
        \ locale is the system default. *REQUEST* means the locale was selected from\
        \ the request context (i.e., best match based on the *Accept-Language* header).\
        \ Additional values may be added in the future without notice."
      enum:
      - DEFAULT
      - REQUEST
      - null
      example: DEFAULT
      nullable: true
      type: string
    errormessagedto:
      example:
        localeOrigin: DEFAULT
        text: The request was syntactically correct but its content is semantically
          invalid.
        locale: en-US
      properties:
        locale:
          description: "The locale for the message text, a BCP 47 language tag."
          example: en-US
          nullable: true
          type: string
        localeOrigin:
          $ref: '#/components/schemas/localeorigin'
        text:
          description: Actual text of the error message in the indicated locale.
          example: The request was syntactically correct but its content is semantically
            invalid.
          type: string
      title: Error Message Dto
      type: object
    errorresponsedto:
      example:
        causes:
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        messages:
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        detailCode: 400.1 Bad Request Content
        trackingId: e7eab60924f64aa284175b9fa3309599
      properties:
        detailCode:
          description: Fine-grained error code providing more detail of the error.
          example: 400.1 Bad Request Content
          type: string
        trackingId:
          description: Unique tracking id for the error.
          example: e7eab60924f64aa284175b9fa3309599
          type: string
        messages:
          description: Generic localized reason for error
          items:
            $ref: '#/components/schemas/errormessagedto'
          type: array
