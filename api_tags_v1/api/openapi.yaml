    "429":
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/listTagsV1_429_response'
      description: Too Many Requests - Returned in response to too many requests in
        a given period of time - rate limited. The Retry-After header in the response
        includes how long to wait before trying again.
    "500":
      content:
        application/json:
          examples:
            "500":
              summary: An example of a 500 response object
              value:
                detailCode: 500.0 Internal Fault
                trackingId: b21b1f7ce4da4d639f2c62a57171b427
                messages:
                - locale: en-US
                  localeOrigin: DEFAULT
                  text: An internal fault occurred.
          schema:
            $ref: '#/components/schemas/errorresponsedto'
      description: Internal Server Error - Returned if there is an unexpected error.
  schemas:
    tag-2:
      example:
        created: 2022-05-04T14:48:49Z
        tagCategoryRefs:
        - name: "CN=entitlement.490efde5,OU=OrgCo,OU=ServiceDept,DC=HQAD,DC=local"
          id: 2c91809773dee32014e13e122092014e
          type: ENTITLEMENT
        - name: "CN=entitlement.490efde5,OU=OrgCo,OU=ServiceDept,DC=HQAD,DC=local"
          id: 2c91809773dee32014e13e122092014e
          type: ENTITLEMENT
        name: PCI
        modified: 2022-07-14T16:31:11Z
        id: 449ecdc0-d4ff-4341-acf6-92f6f7ce604f
      properties:
        id:
          description: Tag id
          example: 449ecdc0-d4ff-4341-acf6-92f6f7ce604f
          readOnly: true
          type: string
        name:
          description: Name of the tag.
          example: PCI
          type: string
        created:
          description: Date the tag was created.
          example: 2022-05-04T14:48:49Z
          format: date-time
          readOnly: true
          type: string
        modified:
          description: Date the tag was last modified.
          example: 2022-07-14T16:31:11Z
          format: date-time
          readOnly: true
          type: string
        tagCategoryRefs:
          items:
            $ref: '#/components/schemas/tag_2_tagCategoryRefs_inner'
          readOnly: true
          type: array
      required:
      - created
      - id
      - modified
      - name
      - tagCategoryRefs
      title: Tag
      type: object
    localeorigin:
      description: "An indicator of how the locale was selected. *DEFAULT* means the\
        \ locale is the system default. *REQUEST* means the locale was selected from\
        \ the request context (i.e., best match based on the *Accept-Language* header).\
        \ Additional values may be added in the future without notice."
      enum:
      - DEFAULT
      - REQUEST
      - null
      example: DEFAULT
      nullable: true
      type: string
    errormessagedto:
      example:
        localeOrigin: DEFAULT
        text: The request was syntactically correct but its content is semantically
          invalid.
        locale: en-US
      properties:
        locale:
          description: "The locale for the message text, a BCP 47 language tag."
          example: en-US
          nullable: true
          type: string
        localeOrigin:
          $ref: '#/components/schemas/localeorigin'
        text:
          description: Actual text of the error message in the indicated locale.
          example: The request was syntactically correct but its content is semantically
            invalid.
          type: string
      title: Error Message Dto
      type: object
    errorresponsedto:
      example:
        causes:
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        messages:
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        detailCode: 400.1 Bad Request Content
        trackingId: e7eab60924f64aa284175b9fa3309599
      properties:
        detailCode:
          description: Fine-grained error code providing more detail of the error.
          example: 400.1 Bad Request Content
          type: string
        trackingId:
          description: Unique tracking id for the error.
          example: e7eab60924f64aa284175b9fa3309599
          type: string
        messages:
          description: Generic localized reason for error
          items:
            $ref: '#/components/schemas/errormessagedto'
          type: array
        causes:
          description: Plain-text descriptive reasons to provide additional detail
            to the text provided in the messages field
          items:
            $ref: '#/components/schemas/errormessagedto'
          type: array
      title: Error Response Dto
      type: object
    listTagsV1_401_response:
      example:
        error: "JWT validation failed: JWT is expired"
      properties:
        error:
          description: A message describing the error
          example: "JWT validation failed: JWT is expired"
      type: object
    listTagsV1_429_response:
      example:
        message: ' Rate Limit Exceeded '
      properties:
        message:
          description: A message describing the error
          example: ' Rate Limit Exceeded '
      type: object
    tag_2_tagCategoryRefs_inner:
      description: Tagged object's category.
      example:
        name: "CN=entitlement.490efde5,OU=OrgCo,OU=ServiceDept,DC=HQAD,DC=local"
        id: 2c91809773dee32014e13e122092014e
        type: ENTITLEMENT
      properties:
        type:
          description: DTO type of the tagged object's category.
          enum:
          - ACCESS_PROFILE
          - APPLICATION
          - CAMPAIGN
          - ENTITLEMENT
          - IDENTITY
          - ROLE
          - SOD_POLICY
          - SOURCE
          example: ENTITLEMENT
          type: string
        id:
          description: Tagged object's ID.
          example: 2c91809773dee32014e13e122092014e
          type: string
        name:
          description: Tagged object's display name.
          example: "CN=entitlement.490efde5,OU=OrgCo,OU=ServiceDept,DC=HQAD,DC=local"
          type: string
      type: object
