          description: The list of recommendation record IDs to assign.
          example:
          - 79db50d4-723c-4aa0-a824-83c2205d82d1
          - a1b2c3d4-e5f6-7890-abcd-ef1234567890
          items:
            format: uuid
            type: string
          type: array
        assignee:
          $ref: '#/components/schemas/entitlementrecommendationassignee'
      required:
      - assignee
      - items
      title: Entitlement Recommendation Assign Request
      type: object
    entitlementrecommendationassignresult:
      description: Response body returned when entitlement recommendations are successfully
        queued for assignment.
      example:
        batchId: 770e8400-e29b-41d4-a716-446655440099
      properties:
        batchId:
          description: The unique identifier of the assignment batch created by this
            request.
          example: 770e8400-e29b-41d4-a716-446655440099
          format: uuid
          type: string
      title: Entitlement Recommendation Assign Result
      type: object
    jsonpatchoperation:
      description: "A JSONPatch Operation as defined by [RFC 6902 - JSON Patch](https://tools.ietf.org/html/rfc6902)"
      properties:
        op:
          description: The operation to be performed
          enum:
          - add
          - remove
          - replace
          - move
          - copy
          - test
          example: replace
          type: string
        path:
          description: A string JSON Pointer representing the target path to an element
            to be affected by the operation
          example: /description
          type: string
        value:
          $ref: '#/components/schemas/jsonpatchoperation_value'
      required:
      - op
      - path
      title: Json Patch Operation
      type: object
    sedbatchstats:
      description: Sed Batch Stats
      example:
        discoveredCount: 100
        discoveryComplete: true
        processedCount: 100
        batchId: 016629d1-1d25-463f-97f3-0c6686846650
        batchComplete: true
      properties:
        batchComplete:
          default: false
          description: batch complete
          example: true
          type: boolean
        batchId:
          description: batch Id
          example: 016629d1-1d25-463f-97f3-0c6686846650
          format: uuid
          type: string
        discoveredCount:
          description: discovered count
          example: 100
          format: int64
          type: integer
        discoveryComplete:
          default: false
          description: discovery complete
          example: true
          type: boolean
        processedCount:
          description: processed count
          example: 100
          format: int64
          type: integer
      title: Sed Batch Stats
      type: object
    sedbatchrecord:
      description: Sed Batch Record
      example:
        requestedBy: 987e6543-e21b-45d3-b123-123456789abc
        createdAt: 2023-10-01T12:00:00Z
        processedCount: 45
        materializedCount: 50
        tenantId: 123e4567-e89b-12d3-a456-426614174000
        name: Example Batch Name
        processedState: submitted | materialized | completed | failed
        batchId: 016629d1-1d25-463f-97f3-0c6686846650
        updatedAt: 2023-10-02T15:30:00Z
      properties:
        tenantId:
          description: The tenant ID associated with the batch.
          example: 123e4567-e89b-12d3-a456-426614174000
          format: uuid
          type: string
        batchId:
          description: The unique ID of the batch.
          example: 016629d1-1d25-463f-97f3-0c6686846650
          format: uuid
          type: string
        name:
          description: The name of the batch.
          example: Example Batch Name
          nullable: true
          type: string
        processedState:
          description: "The current state of the batch (e.g., submitted, materialized,\
            \ completed)."
          example: submitted | materialized | completed | failed
          nullable: true
          type: string
        requestedBy:
          description: The ID of the user who requested the batch.
          example: 987e6543-e21b-45d3-b123-123456789abc
          format: uuid
          type: string
        materializedCount:
          description: The number of items materialized in the batch.
          example: 50
          format: int32
          type: integer
        processedCount:
          description: The number of items processed in the batch.
          example: 45
          format: int32
          type: integer
        createdAt:
          description: The timestamp when the batch was created.
          example: 2023-10-01T12:00:00Z
          format: date-time
          type: string
        updatedAt:
          description: The timestamp when the batch was last updated.
          example: 2023-10-02T15:30:00Z
          format: date-time
          nullable: true
          type: string
      title: Sed Batch Record
      type: object
    searchcriteria:
      description: Represents the search criteria for querying entitlements.
      properties:
        indices:
          description: "A list of indices to search within. Must contain exactly one\
            \ item, typically \"entitlements\"."
          example:
          - entitlements
          items:
            type: string
          type: array
        filters:
          additionalProperties:
            $ref: '#/components/schemas/searchcriteria_filters_value'
          description: "A map of filters applied to the search. Keys are filter names,\
            \ and values are filter definitions."
          example:
            status:
              type: TERMS
              terms:
              - active
              - inactive
          type: object
        query:
          $ref: '#/components/schemas/searchcriteria_query'
        queryType:
          description: Specifies the type of query. Must be "TEXT" if `textQuery`
            is used.
          example: TEXT
          type: string
        textQuery:
          $ref: '#/components/schemas/searchcriteria_textQuery'
        includeNested:
          default: false
          description: Whether to include nested objects in the search results.
          example: true
          type: boolean
        sort:
          description: Specifies the sorting order for the results.
          example:
          - name:asc
          - createdAt:desc
          items:
            type: string
          type: array
        searchAfter:
          description: Used for pagination to fetch results after a specific point.
          example:
          - "12345"
          - "67890"
          items:
            type: string
          type: array
      required:
      - indices
      title: Search Criteria
      type: object
    sedbatchrequest:
      description: Sed Batch Request
      minProperties: 1
      properties:
        entitlements:
          description: list of entitlement ids
          items:
            example: 016629d1-1d25-463f-97f3-c6686846650
            type: string
          minItems: 1
          nullable: true
          type: array
        seds:
          description: list of sed ids
          items:
            example: 016629d1-1d25-463f-97f3-c6686846650
            type: string
          minItems: 1
          nullable: true
          type: array
        searchCriteria:
          additionalProperties:
            $ref: '#/components/schemas/searchcriteria'
          description: Search criteria for the batch request.
          nullable: true
          type: object
      title: Sed Batch Request
      type: object
    sedbatchresponse:
      description: Sed Batch Response
      example:
        batchId: 016629d1-1d25-463f-97f3-0c6686846650
      properties:
        batchId:
          description: BatchId that groups all the ids together
          example: 016629d1-1d25-463f-97f3-0c6686846650
          format: uuid
          type: string
      title: Sed Batch Response
      type: object
    sedapproval:
