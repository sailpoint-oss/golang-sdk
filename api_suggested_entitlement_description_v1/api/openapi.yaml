    sedassignmentresponse:
      description: Sed Assignment Response
      example:
        batchId: 016629d1-1d25-463f-97f3-0c6686846650
      properties:
        batchId:
          description: BatchId that groups all the ids together
          example: 016629d1-1d25-463f-97f3-0c6686846650
          format: uuid
          type: string
      title: Sed Assignment Response
      type: object
    sed:
      description: Suggested Entitlement Description
      example:
        approved_type: admin
        sourceId: 103f567b93ee49b991c40f9412f87643
        approved_when: 2000-01-23T04:56:07.000+00:00
        displayName: AWS-Cloud-Billing
        description: This entitlement allows automated processing of invoices in batches
          on a scheduled basis to streamline accounts payable procedures.
        type: group
        Name: BatchInvoiceProcessing
        approved_by: 2c918086-76de-afbf-0176-f6d28f65565a
        suggestedDescription: This entitlement allows automated processing of invoices
          in batches on a scheduled basis to streamline accounts payable
        attribute: Role
        id: ead281ee-12a9-40ac-9534-36b5d7d65d53
        sourceName: IDN Salesforce
        value: group
        status: suggested
      properties:
        Name:
          description: name of the entitlement
          example: BatchInvoiceProcessing
          type: string
        approved_by:
          description: entitlement approved by
          example: 2c918086-76de-afbf-0176-f6d28f65565a
          type: string
        approved_type:
          description: entitlement approved type
          example: admin
          type: string
        approved_when:
          description: entitlement approved then
          format: date-time
          type: string
        attribute:
          description: entitlement attribute
          example: Role
          type: string
        description:
          description: description of entitlement
          example: This entitlement allows automated processing of invoices in batches
            on a scheduled basis to streamline accounts payable procedures.
          type: string
        displayName:
          description: entitlement display name
          example: AWS-Cloud-Billing
          type: string
        id:
          description: sed id
          example: ead281ee-12a9-40ac-9534-36b5d7d65d53
          format: uuid
          type: string
        sourceId:
          description: entitlement source id
          example: 103f567b93ee49b991c40f9412f87643
          type: string
        sourceName:
          description: entitlement source name
          example: IDN Salesforce
          type: string
        status:
          description: entitlement status
          example: suggested
          type: string
        suggestedDescription:
          description: llm suggested entitlement description
          example: This entitlement allows automated processing of invoices in batches
            on a scheduled basis to streamline accounts payable
          type: string
        type:
          description: entitlement type
          example: group
          type: string
        value:
          description: entitlement value
          example: group
          type: string
      title: Sed
      type: object
    sedpatch:
      description: Patch for Suggested Entitlement Description
      properties:
        op:
          description: desired operation
          example: replace
          type: string
        path:
          description: field to be patched
          example: status
          type: string
        value:
          description: value to replace with
          example: approved
      title: Sed Patch
      type: object
