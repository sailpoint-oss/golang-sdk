  /entitlement-recommendations/v1/bulk-approve:
    post:
      description: "Approve multiple entitlement recommendations in a single request.\
        \ Each item in the request must include the recommendation ID and, depending\
        \ on the record type, either an approved description (SED items) or an approved\
        \ privilege level (privilege items). Returns a per-item result indicating\
        \ success or failure."
      operationId: approveBulkEntitlementRecommendationsV1
      requestBody:
        content:
          application/json:
            schema:
