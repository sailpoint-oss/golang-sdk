  /entitlement-recommendations/v1/{id}:
    patch:
      description: "Partially update a single entitlement recommendation record by\
        \ its ID. Use this endpoint to update the status, description, or privilege\
        \ level of a specific SED or privilege recommendation."
      operationId: patchEntitlementRecommendationV1
      parameters:
      - description: The unique identifier of the entitlement recommendation to update.
        example: 79db50d4-723c-4aa0-a824-83c2205d82d1
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
        x-sailpoint-resource-operation-id: listPendingEntitlementRecommendationApprovals
      requestBody:
        content:
          application/json-patch+json:
            schema:
              items:
                $ref: '#/components/schemas/jsonpatchoperation'
              type: array
        description: The patch operations to apply to the entitlement recommendation
          record.
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/entitlementrecommendationrecord'
          description: The updated entitlement recommendation record.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Client Error - Returned if the request body is invalid.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getAutoWriteSettingsV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
