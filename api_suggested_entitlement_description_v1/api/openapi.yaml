  /entitlement-recommendations/v1/assign:
    post:
      description: "Assign a set of entitlement recommendation records to a reviewer.\
        \ The assignee can be a specific identity, a governance group, or a role-based\
        \ assignee such as source owner or entitlement owner. Returns a batch ID that\
        \ can be used to track the assignment."
      operationId: submitEntitlementRecommendationsAssignmentV1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/entitlementrecommendationassignrequest'
        description: The recommendation IDs and the target assignee.
        required: true
      responses:
        "202":
          content:
            application/json:
              schema:
