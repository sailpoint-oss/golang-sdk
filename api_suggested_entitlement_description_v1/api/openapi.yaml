openapi: 3.0.1
info:
  contact:
    name: Developer Relations
    url: https://developer.sailpoint.com/discuss/api-help
  description: "Use these APIs to interact with the Identity Security Cloud platform\
    \ to achieve repeatable, automated processes with greater scalability. We encourage\
    \ you to join the SailPoint Developer Community forum at https://developer.sailpoint.com/discuss\
    \ to connect with other developers using our APIs."
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://developer.sailpoint.com/discuss/tos
  title: Identity Security Cloud API - Suggested Entitlement Description
  version: v1
servers:
- description: This is the production API server.
  url: "https://{tenant}.api.identitynow.com"
  variables:
    tenant:
      default: sailpoint
      description: "This is the name of your tenant, typically your company's name."
- description: This is the versioned API server.
  url: "https://{apiUrl}"
  variables:
    apiUrl:
      default: sailpoint.api.identitynow.com
      description: This is the api url of your tenant
security:
- userAuth:
  - sp:scopes:all
tags:
- description: "Use this API to implement Suggested Entitlement Description (SED)\
    \ functionality. \nSED functionality leverages the power of LLM to generate suggested\
    \ entitlement descriptions. \nRefer to [GenAI Entitlement Descriptions](https://documentation.sailpoint.com/saas/help/access/entitlements.html#genai-entitlement-descriptions)\
    \ to learn more about SED in Identity Security Cloud (ISC). \n"
  name: Suggested Entitlement Description
paths:
  /suggested-entitlement-descriptions/v1/auto-write-settings:
    get:
      description: "Get the current auto-write configuration for the tenant, including\
        \ the enabled state and source include/exclude lists."
      operationId: getAutoWriteSettingsV1
