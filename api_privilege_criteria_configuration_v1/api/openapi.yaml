  schemas:
    privilegecriteriaconfigdto:
      example:
        sourceId: c42c45d8d7c04d2da64d215cd8c32f21
        created: 2024-01-10T12:00:00Z
        modified: 2024-01-15T12:00:00Z
        id: 2c9180867817ac4d017817c491119a20
        config:
          globalPrivilegeLevelEnabled: true
          privilegeClassificationMode: SINGLE_PRIVILEGE_LEVEL
          singlePrivilegeLevel.privilegeLevel: HIGH
          criteriaPrivilegeLevel.connectorHighEnabled: true
          criteriaPrivilegeLevel.connectorMediumEnabled: true
          criteriaPrivilegeLevel.connectorLowEnabled: true
          criteriaPrivilegeLevel.customHighEnabled: true
          criteriaPrivilegeLevel.customMediumEnabled: true
          criteriaPrivilegeLevel.customLowEnabled: true
      properties:
        id:
          description: The Id of the task which is executing the bulk update.
          example: 2c9180867817ac4d017817c491119a20
          type: string
        sourceId:
          description: The Id of the source that the criteria configuration is applied
            to.
          example: c42c45d8d7c04d2da64d215cd8c32f21
          maxLength: 32
          minLength: 32
          type: string
        config:
          description: 'The configuration settings for privilege criteria evaluation. '
          example:
            globalPrivilegeLevelEnabled: true
            privilegeClassificationMode: SINGLE_PRIVILEGE_LEVEL
            singlePrivilegeLevel.privilegeLevel: HIGH
            criteriaPrivilegeLevel.connectorHighEnabled: true
            criteriaPrivilegeLevel.connectorMediumEnabled: true
            criteriaPrivilegeLevel.connectorLowEnabled: true
            criteriaPrivilegeLevel.customHighEnabled: true
            criteriaPrivilegeLevel.customMediumEnabled: true
            criteriaPrivilegeLevel.customLowEnabled: true
          type: object
        created:
          description: The date and time when the privilege criteria configuration
            was created.
          example: 2024-01-10T12:00:00Z
          type: string
        modified:
          description: The date and time when the privilege criteria configuration
            was last modified.
          example: 2024-01-15T12:00:00Z
          type: string
      type: object
    localeorigin:
      description: "An indicator of how the locale was selected. *DEFAULT* means the\
        \ locale is the system default. *REQUEST* means the locale was selected from\
        \ the request context (i.e., best match based on the *Accept-Language* header).\
        \ Additional values may be added in the future without notice."
      enum:
      - DEFAULT
      - REQUEST
      - null
      example: DEFAULT
      nullable: true
      type: string
    errormessagedto:
      example:
        localeOrigin: DEFAULT
        text: The request was syntactically correct but its content is semantically
          invalid.
        locale: en-US
      properties:
        locale:
          description: "The locale for the message text, a BCP 47 language tag."
          example: en-US
          nullable: true
          type: string
        localeOrigin:
          $ref: '#/components/schemas/localeorigin'
        text:
          description: Actual text of the error message in the indicated locale.
          example: The request was syntactically correct but its content is semantically
            invalid.
          type: string
      title: Error Message Dto
      type: object
    errorresponsedto:
      example:
        causes:
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        messages:
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        detailCode: 400.1 Bad Request Content
        trackingId: e7eab60924f64aa284175b9fa3309599
      properties:
        detailCode:
          description: Fine-grained error code providing more detail of the error.
          example: 400.1 Bad Request Content
          type: string
        trackingId:
          description: Unique tracking id for the error.
          example: e7eab60924f64aa284175b9fa3309599
          type: string
        messages:
          description: Generic localized reason for error
          items:
            $ref: '#/components/schemas/errormessagedto'
          type: array
        causes:
          description: Plain-text descriptive reasons to provide additional detail
            to the text provided in the messages field
          items:
            $ref: '#/components/schemas/errormessagedto'
          type: array
      title: Error Response Dto
      type: object
    getPrivilegeCriteriaConfigV1_401_response:
      example:
        error: "JWT validation failed: JWT is expired"
      properties:
        error:
          description: A message describing the error
          example: "JWT validation failed: JWT is expired"
      type: object
    getPrivilegeCriteriaConfigV1_429_response:
      example:
        message: ' Rate Limit Exceeded '
      properties:
        message:
          description: A message describing the error
          example: ' Rate Limit Exceeded '
      type: object
