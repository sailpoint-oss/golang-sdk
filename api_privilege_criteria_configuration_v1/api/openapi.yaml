            application/json:
              schema:
                $ref: '#/components/schemas/getPrivilegeCriteriaConfigV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getPrivilegeCriteriaConfigV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              examples:
                "500":
                  summary: An example of a 500 response object
                  value:
                    detailCode: 500.0 Internal Fault
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: An internal fault occurred.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Internal Server Error - Returned if there is an unexpected
            error.
      security:
      - userAuth:
        - sp:gov-criteria:read
      summary: Get privilege criteria config
      tags:
      - Privilege Criteria Configuration
      x-sailpoint-userLevels:
      - ORG_ADMIN
    patch:
      description: Use this API to update the privilege criteria configuration.
      operationId: patchPrivilegeCriteriaConfigV1
      parameters:
      - description: The Id of the privilege criteria configuration to update.
        example: 6d123044-5834-4e8d-a49f-9c70089b0de1
        explode: false
        in: path
        name: criteriaConfigId
        required: true
        schema:
          type: string
        style: simple
        x-sailpoint-resource-operation-id: listPrivilegeCriteriaConfig
      requestBody:
        content:
          application/json-patch+json:
            example:
            - op: replace
              path: /config/privilegeClassificationMode
              value: SINGLE_PRIVILEGE_LEVEL
            - op: replace
              path: /config/criteriaPrivilegeLevel/connectorMediumEnabled
              value: true
            schema:
              items:
                type: object
              type: array
        description: "A list of criteria configuration operations according to the\
          \ [JSON Patch](https://tools.ietf.org/html/rfc6902) standard."
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/privilegecriteriaconfigdto'
          description: OK
        "400":
          content:
