openapi: 3.0.1
info:
  contact:
    name: Developer Relations
    url: https://developer.sailpoint.com/discuss/api-help
  description: "Use these APIs to interact with the Identity Security Cloud platform\
    \ to achieve repeatable, automated processes with greater scalability. We encourage\
    \ you to join the SailPoint Developer Community forum at https://developer.sailpoint.com/discuss\
    \ to connect with other developers using our APIs."
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://developer.sailpoint.com/discuss/tos
  title: Identity Security Cloud API - Machine Account Subtypes
  version: v1
servers:
- description: This is the production API server.
  url: "https://{tenant}.api.identitynow.com"
  variables:
    tenant:
      default: sailpoint
      description: "This is the name of your tenant, typically your company's name."
- description: This is the versioned API server.
  url: "https://{apiUrl}"
  variables:
    apiUrl:
      default: sailpoint.api.identitynow.com
      description: This is the api url of your tenant
security:
- userAuth:
  - sp:scopes:all
tags:
- description: |
    Use this API to get, update, and delete machine account subtype for sources.
  name: Machine Account Subtypes
paths:
  /source-subtypes/v1/{subtypeId}:
    delete:
      description: |-
        Delete a machine account subtype by subtype ID.

        Note: If subtype has approval settings or entitlement for machine account creation enablement then it'll be also deleted.
      operationId: deleteMachineAccountSubtypeV1
      parameters:
      - description: The ID of the subtype.
        explode: false
        in: path
        name: subtypeId
        required: true
        schema:
          example: 6d28b7c1-620c-49c6-b6d5-cbf81eb4b5fa
          type: string
        style: simple
        x-sailpoint-resource-operation-id: listMachineAccountSubtypesV1
      responses:
        "204":
          description: Subtype deleted successfully.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Client Error - Returned if the request body is invalid.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getSourceSubtypeByIdV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getSourceSubtypeByIdV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              examples:
                "500":
                  summary: An example of a 500 response object
                  value:
                    detailCode: 500.0 Internal Fault
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: An internal fault occurred.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Internal Server Error - Returned if there is an unexpected
            error.
      security:
      - userAuth:
        - idn:sources:manage
      - applicationAuth:
        - idn:sources:manage
      summary: Delete subtype by ID
      tags:
      - Machine Account Subtypes
      x-sailpoint-userLevels:
      - ORG_ADMIN
      - SOURCE_ADMIN
      - SOURCE_SUBADMIN
    get:
      description: Get a machine account subtype by subtype ID.
      operationId: getSourceSubtypeByIdV1
      parameters:
      - description: The ID of the subtype.
        example: 6d28b7c1-620c-49c6-b6d5-cbf81eb4b5fa
        explode: false
        in: path
        name: subtypeId
        required: true
        schema:
          type: string
        style: simple
        x-sailpoint-resource-operation-id: listMachineAccountSubtypesV1
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sourcesubtypewithsource'
          description: Machine account subtype object.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Client Error - Returned if the request body is invalid.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getSourceSubtypeByIdV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "404":
          content:
            application/json:
              examples:
                "404":
                  summary: An example of a 404 response object
                  value:
                    detailCode: 404 Not found
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server did not find a current representation for the
                        target resource.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Not Found - returned if the request URL refers to a resource
            or object that does not exist
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getSourceSubtypeByIdV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              examples:
                "500":
                  summary: An example of a 500 response object
                  value:
                    detailCode: 500.0 Internal Fault
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: An internal fault occurred.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Internal Server Error - Returned if there is an unexpected
            error.
      security:
      - userAuth:
        - idn:sources:read
        - idn:sources:manage
      - applicationAuth:
        - idn:sources:read
        - idn:sources:manage
      summary: Get subtype by ID
      tags:
      - Machine Account Subtypes
      x-sailpoint-userLevels:
      - ORG_ADMIN
      - SOURCE_ADMIN
      - SOURCE_SUBADMIN
    patch:
      description: |-
        Update fields of a machine account subtype by subtype ID.
        Patchable fields only include: `displayName`, `description`.
      operationId: patchMachineAccountSubtypeV1
      parameters:
      - description: The ID of the subtype.
        explode: false
        in: path
        name: subtypeId
        required: true
        schema:
          example: 6d28b7c1-620c-49c6-b6d5-cbf81eb4b5fa
          type: string
        style: simple
        x-sailpoint-resource-operation-id: listMachineAccountSubtypesV1
      requestBody:
        content:
          application/json-patch+json:
            examples:
              Update display name:
                value:
                - op: replace
                  path: /displayName
                  value: Test New DisplayName
            schema:
              items:
                type: object
              type: array
        description: "A JSON of updated values [JSON Patch](https://tools.ietf.org/html/rfc6902)\
          \ standard."
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sourcesubtypewithsource'
          description: Updated machine account subtype.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Client Error - Returned if the request body is invalid.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getSourceSubtypeByIdV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getSourceSubtypeByIdV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              examples:
                "500":
                  summary: An example of a 500 response object
                  value:
                    detailCode: 500.0 Internal Fault
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: An internal fault occurred.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Internal Server Error - Returned if there is an unexpected
            error.
      security:
      - userAuth:
        - idn:sources:manage
      - applicationAuth:
        - idn:sources:manage
      summary: Patch subtype by ID
      tags:
      - Machine Account Subtypes
      x-sailpoint-userLevels:
      - ORG_ADMIN
      - SOURCE_ADMIN
      - SOURCE_SUBADMIN
components:
  responses:
    "400":
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorresponsedto'
      description: Client Error - Returned if the request body is invalid.
    "401":
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/getSourceSubtypeByIdV1_401_response'
      description: "Unauthorized - Returned if there is no authorization header, or\
        \ if the JWT token is expired."
    "403":
      content:
        application/json:
          examples:
            "403":
              summary: An example of a 403 response object
              value:
                detailCode: 403 Forbidden
                trackingId: b21b1f7ce4da4d639f2c62a57171b427
                messages:
                - locale: en-US
                  localeOrigin: DEFAULT
                  text: The server understood the request but refuses to authorize
                    it.
          schema:
            $ref: '#/components/schemas/errorresponsedto'
      description: "Forbidden - Returned if the user you are running as, doesn't have\
        \ access to this end-point."
    "404":
      content:
        application/json:
          examples:
            "404":
              summary: An example of a 404 response object
              value:
                detailCode: 404 Not found
                trackingId: b21b1f7ce4da4d639f2c62a57171b427
                messages:
                - locale: en-US
                  localeOrigin: DEFAULT
                  text: The server did not find a current representation for the target
                    resource.
          schema:
            $ref: '#/components/schemas/errorresponsedto'
      description: Not Found - returned if the request URL refers to a resource or
        object that does not exist
    "429":
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/getSourceSubtypeByIdV1_429_response'
      description: Too Many Requests - Returned in response to too many requests in
        a given period of time - rate limited. The Retry-After header in the response
        includes how long to wait before trying again.
    "500":
      content:
        application/json:
          examples:
            "500":
              summary: An example of a 500 response object
              value:
                detailCode: 500.0 Internal Fault
                trackingId: b21b1f7ce4da4d639f2c62a57171b427
                messages:
                - locale: en-US
                  localeOrigin: DEFAULT
                  text: An internal fault occurred.
          schema:
            $ref: '#/components/schemas/errorresponsedto'
      description: Internal Server Error - Returned if there is an unexpected error.
  schemas:
    sourcesubtypewithsource:
      example:
        sourceId: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        displayName: Mr Foo
        created: 2025-07-28T16:13:42.8013Z
        description: fighters
        modified: 2025-07-28T16:13:42.75085Z
        id: 38453251-6be2-5f8f-df93-5ce19e295838
        source:
          name: Test Source
          id: 6d0458373bec4b4b80460992b76016da
          type: SOURCE
        type: MACHINE
        technicalName: foo
      properties:
        id:
          description: Unique identifier for the subtype.
          example: 38453251-6be2-5f8f-df93-5ce19e295838
          format: uuid
          type: string
        sourceId:
          description: The ID of the source.
          format: uuid
          readOnly: true
          type: string
        technicalName:
          description: Technical name of the subtype.
          example: foo
          type: string
        displayName:
          description: Display name of the subtype.
          example: Mr Foo
          type: string
        description:
          description: Description of the subtype.
          example: fighters
          type: string
        created:
          description: Creation timestamp.
          example: 2025-07-28T16:13:42.8013Z
          format: date-time
          type: string
        modified:
          description: Last modified timestamp.
          example: 2025-07-28T16:13:42.75085Z
          format: date-time
          type: string
        type:
          description: Type of the subtype. Either MACHINE OR null.
          example: MACHINE
          type: string
        source:
          $ref: '#/components/schemas/sourcesubtypewithsource_source'
      type: object
    localeorigin:
      description: "An indicator of how the locale was selected. *DEFAULT* means the\
        \ locale is the system default. *REQUEST* means the locale was selected from\
        \ the request context (i.e., best match based on the *Accept-Language* header).\
        \ Additional values may be added in the future without notice."
      enum:
      - DEFAULT
      - REQUEST
      - null
      example: DEFAULT
      nullable: true
      type: string
    errormessagedto:
      example:
        localeOrigin: DEFAULT
        text: The request was syntactically correct but its content is semantically
          invalid.
        locale: en-US
      properties:
        locale:
          description: "The locale for the message text, a BCP 47 language tag."
          example: en-US
          nullable: true
          type: string
        localeOrigin:
          $ref: '#/components/schemas/localeorigin'
        text:
          description: Actual text of the error message in the indicated locale.
          example: The request was syntactically correct but its content is semantically
            invalid.
          type: string
      title: Error Message Dto
      type: object
    errorresponsedto:
      example:
        causes:
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        messages:
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        detailCode: 400.1 Bad Request Content
        trackingId: e7eab60924f64aa284175b9fa3309599
      properties:
        detailCode:
          description: Fine-grained error code providing more detail of the error.
          example: 400.1 Bad Request Content
          type: string
        trackingId:
          description: Unique tracking id for the error.
          example: e7eab60924f64aa284175b9fa3309599
          type: string
        messages:
          description: Generic localized reason for error
          items:
            $ref: '#/components/schemas/errormessagedto'
          type: array
        causes:
          description: Plain-text descriptive reasons to provide additional detail
            to the text provided in the messages field
          items:
            $ref: '#/components/schemas/errormessagedto'
          type: array
      title: Error Response Dto
      type: object
    getSourceSubtypeByIdV1_401_response:
      example:
        error: "JWT validation failed: JWT is expired"
      properties:
        error:
          description: A message describing the error
          example: "JWT validation failed: JWT is expired"
      type: object
    getSourceSubtypeByIdV1_429_response:
      example:
        message: ' Rate Limit Exceeded '
      properties:
        message:
          description: A message describing the error
          example: ' Rate Limit Exceeded '
      type: object
    sourcesubtypewithsource_source:
      description: Source reference of the subtype.
      example:
        name: Test Source
        id: 6d0458373bec4b4b80460992b76016da
        type: SOURCE
      properties:
        type:
          description: Type of the reference object.
          enum:
          - SOURCE
          example: SOURCE
          type: string
        id:
          description: Unique identifier for the source.
          example: 6d0458373bec4b4b80460992b76016da
          type: string
        name:
          description: Name of the source.
          example: Test Source
          type: string
      type: object
