openapi: 3.0.0
info:
  description: The NERM API accesss and modifies resources in your environment.
  license:
    name: MIT
  title: NERM API
  version: 1.0.0
servers:
- url: "https://{tenantName}.nonemployee.com/api"
  variables:
    tenantName:
      default: acmeco
      description: Tenant name assigned to customer
security:
- userAuth: []
paths:
  /ne_attributes:
    get:
      description: This endpoint can retrieve attribute data in bulk from Lifecycle
        or you can search for attributes using parameters
      operationId: getAttributes
      parameters:
      - description: The maximum number of items to return.
        in: query
        name: limit
        required: false
        schema:
          example: 5
          format: int32
          minimum: 1
          type: integer
      - description: The number of items to skip before starting to collect the result
          set.
        in: query
        name: offset
        required: false
        schema:
          example: 5
          format: int32
          minimum: 1
          type: integer
      - description: The field to order results by.
        in: query
        name: order
        required: false
        schema:
          example: created_at
          type: string
      - description: The attribute label to filter by
        in: query
        name: label
        required: false
        schema:
          example: birthday
          type: string
      - description: The attribute data type to filter by
        in: query
        name: data_type
        required: false
        schema:
          enum:
          - text field
          - text area
          - drop-down
          - radio buttons
          - check boxes
          - date
          - tags
          - attachment
          - profile select
          - profile search
          - owner select
          - owner search
          - contributor select
          - contributor search
          example: text field
          type: string
      - description: "Returns batching metadata in the response. This includes `total`\
          \ as the total quantity, `next` as the path of the following query url,\
          \ `limit` and `after_id` (if requested) with the next following id (null\
          \ if it is the last \"page\")."
        in: query
        name: metadata
        required: false
        schema:
          default: false
          example: true
          type: boolean
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getAttributes_200_response'
          description: Expected response to a valid request
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getAttributes_400_response'
          description: Bad Request - unable to complete.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getAttributes_500_response'
          description: Internal Server Error - returned on unhandled exceptions.
      summary: Get attribute data in bulk
      tags:
      - attributes
    post:
      description: This endpoint can create an attribute
      operationId: createAttribute
      requestBody:
        $ref: '#/components/requestBodies/Attribute'
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/createAttribute_201_response'
          description: Expected response to a valid request
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getAttributes_400_response'
          description: Bad Request - unable to complete.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getAttributes_500_response'
          description: Internal Server Error - returned on unhandled exceptions.
      summary: Create an attribute
      tags:
      - attributes
  /ne_attributes/{id}:
    delete:
      description: Delete attribute by id
      operationId: deleteAttributeById
      parameters:
      - description: "ID of the object to retrieve, update, or delete"
        in: path
        name: id
        required: true
        schema:
          example: 1246d8b3-ac29-4015-8154-dea4434a73fa
