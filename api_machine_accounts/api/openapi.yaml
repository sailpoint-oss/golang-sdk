      operationId: listMachineAccountsV1
      parameters:
      - description: |-
          Max number of results to return.
          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: 250
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 250
          format: int32
          maximum: 250
          minimum: 0
          type: integer
        style: form
      - description: |-
          Offset into the full result set. Usually specified with *limit* to paginate through the results.
          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: 0
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          format: int32
          minimum: 0
          type: integer
        style: form
      - description: |-
          If *true* it will populate the *X-Total-Count* response header with the number of results that would be returned if *limit* and *offset* were ignored.

          Since requesting a total count can have a performance impact, it is recommended not to send **count=true** if that value will not be used.

          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: true
        explode: true
        in: query
        name: count
        required: false
        schema:
          default: false
          type: boolean
        style: form
      - description: |-
          Filter results using the standard syntax described in [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#filtering-results)

          Filtering is supported for the following fields and operators:

          **id**: *eq, in*

          **name**: *eq, in, sw*

          **nativeIdentity**: *eq, in, sw*

          **uuid**: *eq, in*

          **description**: *eq, in, sw*

          **machineIdentity.id**: *eq, in*

          **machineIdentity.name**: *eq, in, sw*

          **subtype.technicalName**: *eq, in, sw*

          **subtype.displayName**: *eq, in, sw*

          **accessType**: *eq, in, sw*

          **environment**: *eq, in, sw*

          **ownerIdentity**: *eq, in*

          **ownerIdentity.id**: *eq, in*

          **ownerIdentity.name**: *eq, in, sw*

          **manuallyCorrelated**: *eq*

          **enabled**: *eq*

          **locked**: *eq*

          **hasEntitlements**: *eq*

          **attributes**: *eq*

          **source.id**: *eq, in*

          **source.name**: *eq, in, sw*

          **created**: *eq, gt, lt, ge, le*

          **modified**: *eq, gt, lt, ge, le*
        example: hasEntitlements eq true
        explode: true
        in: query
        name: filters
        required: false
        schema:
          type: string
        style: form
      - description: |-
          Sort results using the standard syntax described in [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#sorting-results)

          Sorting is supported for the following fields: **id, name, nativeIdentity, ownerIdentity, uuid, description, machineIdentity.id, machineIdentity.name, subtype.technicalName, subtype.displayName, accessType, environment, manuallyCorrelated, enabled, locked, hasEntitlements, ownerIdentity.id, ownerIdentity.name, attributes, source.id, source.name, created, modified**
        example: "id,name"
        explode: true
        in: query
        name: sorters
        required: false
        schema:
          format: comma-separated
          type: string
        style: form
      - description: Use this header to enable this experimental API.
        example: true
        explode: false
        in: header
        name: X-SailPoint-Experimental
        required: true
        schema:
          default: "true"
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/machineaccount'
                type: array
          description: List of machine account objects
        "400":
          content:
            application/json:
              schema:
