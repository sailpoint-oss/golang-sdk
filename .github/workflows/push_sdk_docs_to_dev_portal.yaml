name: "Push Go SDK Docs to Developer Portal"

permissions:
  contents: write
  actions: read

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: docs-sync-${{ github.repository }}
  cancel-in-progress: true

jobs:
  push_spec_workflow:
    name: Push API spec changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          path: golang-sdk

      - name: Checkout API Specs Repo
        uses: actions/checkout@v6
        with:
          repository: sailpoint-oss/developer.sailpoint.com
          path: developer-community
          ref: main
          token: ${{ secrets.DEVREL_SERVICE_TOKEN }}
          fetch-depth: 0

      - name: Sync local to remote main
        working-directory: developer-community
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Install rsync
        run: sudo apt update && sudo apt install -y rsync grsync

      - name: Sync files between folders
        run: |
          # Per-resource versioned partitions (api_*_v1)
          # Each partition directory follows the pattern api_{resource}_v1/
          for partition_dir in golang-sdk/api_*_v1; do
            [ -d "$partition_dir" ] || continue
            resource=$(basename "$partition_dir")
            rsync -cav --delete "$partition_dir/docs/Methods" "developer-community/docs/tools/sdk/go/Reference/$resource"
            rsync -cav --delete "$partition_dir/docs/Models"  "developer-community/docs/tools/sdk/go/Reference/$resource"
            if [ -f "$partition_dir/docs/Examples/go_code_examples_overlay.yaml" ]; then
              rsync -av "$partition_dir/docs/Examples/go_code_examples_overlay.yaml" "developer-community/static/code-examples/$resource/"
            fi
          done

      - name: Check for changes and commit if any
        working-directory: developer-community
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config --unset-all http.https://github.com/.extraheader || true
          git config --local user.email "devrel-service@sailpoint.com"
          git config --local user.name "developer-relations-sp"
          git add .
          git commit -m "Update Go SDK docs: ${{ github.run_id }}"
          git remote set-url origin https://${{ secrets.DEVREL_SERVICE_TOKEN }}@github.com/sailpoint-oss/developer.sailpoint.com.git

          # Rebase on latest remote main before pushing to avoid
          # non-fast-forward failures when another workflow has pushed
          # to developer.sailpoint.com in the meantime.
          MAX_RETRIES=3
          for i in $(seq 1 $MAX_RETRIES); do
            git fetch origin main
            git rebase origin/main && git push origin main && break
            echo "Push attempt $i failed, retrying..."
            if [ "$i" -eq "$MAX_RETRIES" ]; then
              echo "Failed after $MAX_RETRIES attempts"
              exit 1
            fi
            sleep 5
          done

  publish-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: push_spec_workflow
    if: ${{ always() && (needs.push_spec_workflow.result == 'failure' || needs.push_spec_workflow.result == 'timed_out') }}
    steps:
      - name: Invoke GithubNotificationsFunction Lambda
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{
              "workflowName": "${{ github.job }}",
              "repositoryName": "${{ github.event.repository.name }}",
              "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }' \
            "${{ secrets.NOTIFICATIONS_FUNCTION_URL }}"
