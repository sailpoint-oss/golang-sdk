name: "Build Go SDK"
description: "Build per-partition Go SDK packages from the versioned OpenAPI specs"

inputs:
  api-specs-path:
    description: "Path to the checked-out api-specs repository"
    required: false
    default: "api-specs"
  skip-tests:
    description: "Skip running tests after building"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version: "20"

    - name: Install Node dependencies
      shell: bash
      run: npm install

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: "temurin"
        java-version: "17"

    - name: Download OpenAPI Generator
      shell: bash
      run: |
        wget -q https://repo1.maven.org/maven2/org/openapitools/openapi-generator-cli/7.12.0/openapi-generator-cli-7.12.0.jar -O openapi-generator-cli.jar

    - name: Build Versioned SDK (per-partition)
      shell: bash
      run: |
        node sdk-resources/build-versioned-sdk.js \
          ${{ inputs.api-specs-path }}/idn/apis

    - name: Build Generic SDK
      shell: bash
      run: |
        rm -rf ./api_generic
        java -jar openapi-generator-cli.jar generate \
          -i sdk-resources/generic-api.yaml \
          -g go -o api_generic \
          --global-property skipFormModel=false,apiDocs=true,modelDocs=true \
          --config sdk-resources/generic-config.yaml
        node sdk-resources/postscript.js ./api_generic

    - name: Build NERM SDK
      shell: bash
      run: |
        rm -rf ./api_nerm
        java -jar openapi-generator-cli.jar generate \
          -i ${{ inputs.api-specs-path }}/nerm/openapi.yaml \
          -g go -o api_nerm \
          --global-property skipFormModel=false,apiDocs=true,modelDocs=true \
          --config sdk-resources/nerm-config.yaml
        node sdk-resources/postscript.js ./api_nerm

    - name: Build NERM V2025 SDK
      shell: bash
      run: |
        rm -rf ./api_nerm_v2025
        java -jar openapi-generator-cli.jar generate \
          -i ${{ inputs.api-specs-path }}/nerm/v2025/v2025.yaml \
          -g go -o api_nerm_v2025 \
          --global-property skipFormModel=false,apiDocs=true,modelDocs=true \
          --config sdk-resources/v2025-nerm-config.yaml
        node sdk-resources/postscript.js ./api_nerm_v2025

    - name: Wire Go workspace
      shell: bash
      run: |
        go work init . 2>/dev/null || true
        go work use -r .
        go work sync

    - name: Build and Test
      shell: bash
      run: |
        go build -o /dev/null .
        if [ "${{ inputs.skip-tests }}" != "true" ]; then
          go test ./...
        fi
