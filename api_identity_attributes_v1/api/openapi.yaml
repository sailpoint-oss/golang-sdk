      description: Use this API to get a collection of identity attributes.
      operationId: listIdentityAttributesV1
      parameters:
      - description: Include 'system' attributes in the response.
        example: false
        explode: true
        in: query
        name: includeSystem
        required: false
        schema:
          default: false
          type: boolean
        style: form
      - description: Include 'silent' attributes in the response.
        example: false
        explode: true
        in: query
        name: includeSilent
        required: false
        schema:
          default: false
          type: boolean
        style: form
      - description: Include only 'searchable' attributes in the response.
        example: false
        explode: true
        in: query
        name: searchableOnly
        required: false
        schema:
          default: false
          type: boolean
        style: form
      - description: |-
          If *true* it will populate the *X-Total-Count* response header with the number of results that would be returned if *limit* and *offset* were ignored.

          Since requesting a total count can have a performance impact, it is recommended not to send **count=true** if that value will not be used.

          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: true
        explode: true
        in: query
        name: count
        required: false
        schema:
          default: false
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/identityattribute-2'
                type: array
          description: List of identity attributes.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Client Error - Returned if the request body is invalid.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listIdentityAttributesV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "429":
