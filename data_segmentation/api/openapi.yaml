  /data-segments/v1:
    get:
      description: This API returns the segment specified by the given ID.
      operationId: listDataSegmentsV1
      parameters:
      - description: This boolean indicates whether the segment is currently active.
          Inactive segments have no effect.
        example: true
        explode: true
        in: query
        name: enabled
        required: false
        schema:
          default: true
          type: boolean
        style: form
      - description: This returns only one record if set to true and that would be
          the published record if exists.
        example: false
        explode: true
        in: query
        name: unique
        required: false
        schema:
          default: false
          type: boolean
        style: form
      - description: This boolean indicates whether the segment is being applied to
          the accounts. If unpublished its being actively modified until published
        example: true
        explode: true
        in: query
        name: published
        required: false
        schema:
          default: true
          type: boolean
        style: form
      - description: |-
          Max number of results to return.
          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: 250
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 250
          format: int32
          maximum: 250
          minimum: 0
          type: integer
        style: form
      - description: |-
          Offset into the full result set. Usually specified with *limit* to paginate through the results.
          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: 0
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          format: int32
          minimum: 0
          type: integer
        style: form
      - description: |-
          If *true* it will populate the *X-Total-Count* response header with the number of results that would be returned if *limit* and *offset* were ignored.

          Since requesting a total count can have a performance impact, it is recommended not to send **count=true** if that value will not be used.

          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: true
        explode: true
        in: query
        name: count
        required: false
        schema:
          default: false
          type: boolean
        style: form
      - description: |-
          Filter results using the standard syntax described in [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#filtering-results)

          Filtering is supported for the following fields and operators:

          **id**: *eq, in, sw*

          **name**: *eq, in, sw*
        explode: true
        in: query
        name: filters
        required: false
