          type: string
        style: simple
      - description: Use this header to enable this experimental API.
        example: true
        explode: false
        in: header
        name: X-SailPoint-Experimental
        required: true
        schema:
          default: "true"
          type: string
        style: simple
      requestBody:
        content:
          application/json-patch+json:
            examples:
              Set Visibility Criteria:
                description: Set the member filter
                value:
                - op: replace
                  path: /memberFilter
                  value:
                    expression:
                      operator: AND
                      children:
                      - operator: EQUALS
                        attribute: location
                        value:
                          type: STRING
                          value: Philadelphia
                      - operator: EQUALS
                        attribute: department
                        value:
                          type: STRING
                          value: HR
            schema:
              items:
                type: object
              type: array
        description: |
          A list of segment update operations according to the [JSON Patch](https://tools.ietf.org/html/rfc6902) standard.

          The following fields are patchable:
          * name
          * description
          * membership
          * memberFilter
          * memberSelection
          * scopes
          * enabled
        required: true
