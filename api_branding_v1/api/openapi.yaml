        standardLogoURL: ""
        emailFromAddress: no-reply@sailpoint.com
        actionButtonColor: 0074D9
        name: default
        navigationColor: 011E69
        productName: product name
        loginInformationalMessage: ""
        activeLinkColor: 011E69
      properties:
        name:
