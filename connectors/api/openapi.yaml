          - fi
          - sv
          - ru
          - pt
          - ko
          - zh-TW
          - en
          - it
          - fr
          - zh-CN
          - hu
          - es
          - cs
          - ja
          - pl
          - da
          - nl
          example: de
          type: string
        style: form
