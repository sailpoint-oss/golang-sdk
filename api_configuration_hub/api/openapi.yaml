              example:
              - id: 0f11f2a4-7c94-4bf3-a2bd-742580fe3bde
                created: 2024-08-16T14:16:58.389Z
                jobType: BACKUP
                content:
                  name: Backup Name
                  backupOptions:
                    includeTypes:
                    - SOURCE
                    - IDENTITY
                    objectOptions: []
                startTime: 2024-08-16T14:16:58.389Z
                cronString: 0 0 * * * *
