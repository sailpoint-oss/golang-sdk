      requestBody:
        content:
          application/json:
            example:
              patches:
                "603b1a61-d03d-4ed1-864f-a508fbd1995d":
                - op: replace
                  path: /enabled
                  value: true
                "00bece34-f50d-4227-8878-76f620b5a971":
                - op: replace
                  path: /targetValue
                  value: New Target Value
            schema:
              $ref: '#/components/schemas/objectmappingbulkpatchrequest'
        description: The object mapping request body.
        required: true
      responses:
