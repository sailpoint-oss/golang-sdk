          - IN_PROGRESS
          - COMPLETE
          - CANCELLED
          - FAILED
          example: COMPLETE
          type: string
        type:
          description: "Type of the job, will always be CONFIG_DEPLOY_DRAFT for this\
            \ type of job."
          enum:
          - CONFIG_DEPLOY_DRAFT
          example: CONFIG_DEPLOY_DRAFT
          type: string
        message:
          description: Message providing information about the outcome of the deploy
            process.
          example: Deploy creation message
          type: string
        requesterName:
          description: The name of the user that initiated the deploy process.
          example: requester.name
