      tags:
      - Configuration Hub
      x-sailpoint-userLevels:
      - ORG_ADMIN
    post:
      description: This API creates a new scheduled action for the current tenant.
      operationId: createScheduledActionV1
      requestBody:
        content:
          application/json:
            example:
              jobType: BACKUP
              startTime: 2024-08-16T14:16:58.389Z
              cronString: 0 0 * * * *
              timeZoneId: America/Chicago
              content:
                name: Daily Backup
                backupOptions:
                  includeTypes:
                  - SOURCE
                  - IDENTITY
                  objectOptions:
                    SOURCE:
                      includedNames:
                      - Source1
