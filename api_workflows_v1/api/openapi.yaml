  schemas:
    workflowmodifiedby:
      example:
        name: Thomas Edison
        id: 2c9180a46faadee4016fb4e018c20639
        type: IDENTITY
      properties:
        type:
          enum:
          - IDENTITY
          example: IDENTITY
          type: string
        id:
          description: Identity ID
          example: 2c9180a46faadee4016fb4e018c20639
          type: string
        name:
          description: Human-readable display name of identity.
          example: Thomas Edison
          type: string
      type: object
    workflowdefinition:
      description: The map of steps that the workflow will execute.
      example:
        start: Send Email Test
        steps:
          Send Email:
            actionId: sp:send-email
            attributes:
              body: This is a test
              from: sailpoint@sailpoint.com
              recipientId.$: $.identity.id
              subject: test
            nextStep: success
            selectResult: null
            type: ACTION
          success:
            type: success
      properties:
        start:
          description: The name of the starting step.
          example: Send Email Test
          type: string
        steps:
          additionalProperties: true
          description: One or more step objects that comprise this workflow.  Please
            see the Workflow documentation to see the JSON schema for each step type.
          example:
            Send Email:
              actionId: sp:send-email
              attributes:
                body: This is a test
                from: sailpoint@sailpoint.com
                recipientId.$: $.identity.id
                subject: test
              nextStep: success
              selectResult: null
              type: ACTION
            success:
              type: success
          type: object
      type: object
    workflowtrigger:
      description: The trigger that starts the workflow
      example:
        displayName: displayName
        attributes: "{}"
        type: EVENT
      properties:
        type:
          description: The trigger type
          enum:
          - EVENT
          - EXTERNAL
          - SCHEDULED
          - ""
          example: EVENT
          type: string
        displayName:
          description: The trigger display name
          nullable: true
          type: string
        attributes:
          description: Workflow Trigger Attributes.
          nullable: true
          type: object
      required:
      - attributes
      - type
      type: object
    workflowbody:
      properties:
        name:
          description: The name of the workflow
          example: Send Email
          type: string
        owner:
          $ref: '#/components/schemas/workflowbody_owner'
        description:
          description: Description of what the workflow accomplishes
          example: Send an email to the identity who's attributes changed.
          type: string
        definition:
          $ref: '#/components/schemas/workflowdefinition'
        enabled:
          default: false
          description: Enable or disable the workflow.  Workflows cannot be created
            in an enabled state.
          example: false
          type: boolean
        trigger:
          $ref: '#/components/schemas/workflowtrigger'
      type: object
    workflow:
      allOf:
      - properties:
          id:
            description: Workflow ID. This is a UUID generated upon creation.
            example: d201c5e9-d37b-4aff-af14-66414f39d569
            type: string
          executionCount:
            description: The number of times this workflow has been executed.
            example: 2
            format: int32
            type: integer
          failureCount:
            description: The number of times this workflow has failed during execution.
            example: 0
            format: int32
            type: integer
          created:
            description: The date and time the workflow was created.
            example: 2022-01-10T16:06:16.636381447Z
            format: date-time
            type: string
          modified:
            description: The date and time the workflow was modified.
            example: 2023-12-05T15:18:27.699132301Z
            format: date-time
            type: string
          modifiedBy:
            $ref: '#/components/schemas/workflowmodifiedby'
          creator:
            $ref: '#/components/schemas/workflow_allOf_creator'
        type: object
      - $ref: '#/components/schemas/workflowbody'
      example:
        owner:
          name: William Wilson
          id: 2c91808568c529c60168cca6f90c1313
          type: IDENTITY
        creator:
          name: Michael Michaels
          id: 2c7180a46faadee4016fb4e018c20642
          type: IDENTITY
        created: 2022-01-10T16:06:16.636381447Z
        description: Send an email to the identity who's attributes changed.
        trigger:
          displayName: displayName
          attributes: "{}"
          type: EVENT
        enabled: false
        name: Send Email
        executionCount: 2
        modified: 2023-12-05T15:18:27.699132301Z
        modifiedBy:
          name: Thomas Edison
          id: 2c9180a46faadee4016fb4e018c20639
          type: IDENTITY
        definition:
          start: Send Email Test
          steps:
            Send Email:
              actionId: sp:send-email
              attributes:
                body: This is a test
                from: sailpoint@sailpoint.com
                recipientId.$: $.identity.id
                subject: test
              nextStep: success
              selectResult: null
              type: ACTION
            success:
              type: success
        id: d201c5e9-d37b-4aff-af14-66414f39d569
        failureCount: 0
    localeorigin:
