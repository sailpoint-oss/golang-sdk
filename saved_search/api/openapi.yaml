          schema:
            $ref: '#/components/schemas/listSavedSearchesV1_429_response'
      description: Too Many Requests - Returned in response to too many requests in
        a given period of time - rate limited. The Retry-After header in the response
        includes how long to wait before trying again.
    "500":
      content:
        application/json:
          examples:
            "500":
              summary: An example of a 500 response object
              value:
                detailCode: 500.0 Internal Fault
                trackingId: b21b1f7ce4da4d639f2c62a57171b427
                messages:
                - locale: en-US
                  localeOrigin: DEFAULT
                  text: An internal fault occurred.
          schema:
            $ref: '#/components/schemas/errorresponsedto'
      description: Internal Server Error - Returned if there is an unexpected error.
  schemas:
    dtotype:
      description: An enumeration of the types of DTOs supported within the IdentityNow
        infrastructure.
      enum:
      - ACCOUNT_CORRELATION_CONFIG
      - ACCESS_PROFILE
      - ACCESS_REQUEST_APPROVAL
      - ACCOUNT
      - APPLICATION
      - CAMPAIGN
      - CAMPAIGN_FILTER
      - CERTIFICATION
      - CLUSTER
      - CONNECTOR_SCHEMA
      - ENTITLEMENT
      - GOVERNANCE_GROUP
      - IDENTITY
      - IDENTITY_PROFILE
      - IDENTITY_REQUEST
      - MACHINE_IDENTITY
      - LIFECYCLE_STATE
      - PASSWORD_POLICY
      - ROLE
      - RULE
      - SOD_POLICY
      - SOURCE
      - TAG
      - TAG_CATEGORY
      - TASK_RESULT
      - REPORT_RESULT
      - SOD_VIOLATION
      - ACCOUNT_ACTIVITY
      - WORKGROUP
      example: IDENTITY
      type: string
    typedreference:
      description: |
        A typed reference to the object.
      example:
        id: 2c91808568c529c60168cca6f90c1313
        type: IDENTITY
      properties:
        type:
          $ref: '#/components/schemas/dtotype'
        id:
          description: |
            The id of the object.
          example: 2c91808568c529c60168cca6f90c1313
          type: string
      required:
      - id
      - type
      type: object
    savedsearchname:
      properties:
        name:
          description: |
            The name of the saved search.
          example: Disabled accounts
          type: string
        description:
          description: |
            The description of the saved search.
          example: Disabled accounts
          nullable: true
          type: string
      type: object
    datetime:
      description: A date-time in ISO-8601 format
      example: 2018-06-25T20:22:28.104Z
      format: date-time
      nullable: true
      type: string
    index:
      description: |-
        Enum representing the currently supported indices.
        Additional values may be added in the future without notice.
      enum:
      - accessprofiles
      - accountactivities
      - entitlements
      - events
      - identities
      - roles
      - '*'
      example: identities
      type: string
    column:
      properties:
        field:
          description: |
            The name of the field.
          example: email
          type: string
        header:
          description: |
            The value of the header.
          example: Work Email
          type: string
      required:
      - field
      type: object
    filtertype:
      description: |-
        Enum representing the currently supported filter types.
        Additional values may be added in the future without notice.
      enum:
      - EXISTS
      - RANGE
      - TERMS
      example: RANGE
      type: string
    bound:
      example:
        inclusive: false
        value: "1"
      properties:
        value:
          description: The value of the range's endpoint.
          example: "1"
          type: string
        inclusive:
          default: false
          description: Indicates if the endpoint is included in the range.
          example: false
          type: boolean
      required:
      - value
      type: object
    range:
      description: The range of values to be filtered.
      example:
        lower:
          inclusive: false
          value: "1"
        upper:
          inclusive: false
          value: "1"
      properties:
        lower:
          $ref: '#/components/schemas/bound'
        upper:
          $ref: '#/components/schemas/bound'
      type: object
    filter:
      properties:
        type:
          $ref: '#/components/schemas/filtertype'
        range:
          $ref: '#/components/schemas/range'
        terms:
          description: The terms to be filtered.
          items:
            example: account_count
            type: string
          type: array
        exclude:
          default: false
          description: Indicates if the filter excludes results.
          example: false
          type: boolean
      type: object
    savedsearchdetail:
      properties:
        created:
          description: A date-time in ISO-8601 format
          example: 2018-06-25T20:22:28.104Z
          format: date-time
          nullable: true
          type: string
        modified:
          description: A date-time in ISO-8601 format
          example: 2018-06-25T20:22:28.104Z
          format: date-time
          nullable: true
          type: string
        indices:
          description: |
            The names of the Elasticsearch indices in which to search.
          example:
          - identities
          items:
            $ref: '#/components/schemas/index'
          type: array
        columns:
          additionalProperties:
            items:
              $ref: '#/components/schemas/column'
            type: array
          description: |
            The columns to be returned (specifies the order in which they will be presented) for each document type.

            The currently supported document types are: _accessprofile_, _accountactivity_, _account_, _aggregation_, _entitlement_, _event_, _identity_, and _role_.
          example:
            identity:
            - field: displayName
              header: Display Name
            - field: e-mail
              header: Work Email
          type: object
        query:
          description: |
            The search query using Elasticsearch [Query String Query](https://www.elastic.co/guide/en/elasticsearch/reference/5.2/query-dsl-query-string-query.html#query-string) syntax from the Query DSL.
          example: '@accounts(disabled:true)'
          type: string
        fields:
          description: |
            The fields to be searched against in a multi-field query.
          example:
          - disabled
          items:
            type: string
          nullable: true
          type: array
        orderBy:
          additionalProperties:
            items:
              type: string
            type: array
          description: |
            Sort by index. This takes precedence over the `sort` property.
          example:
            identity:
            - lastName
            - firstName
            role:
            - name
          nullable: true
          type: object
        sort:
          description: |
            The fields to be used to sort the search results.
          example:
          - displayName
          items:
            type: string
          nullable: true
          type: array
        filters:
          $ref: '#/components/schemas/savedsearchdetail_filters'
      required:
      - indices
      - query
      type: object
    savedsearch:
      allOf:
      - properties:
          id:
            description: |
              The saved search ID.
            example: 0de46054-fe90-434a-b84e-c6b3359d0c64
            type: string
          owner:
            $ref: '#/components/schemas/typedreference'
          ownerId:
            description: The ID of the identity that owns this saved search.
            example: 2c91808568c529c60168cca6f90c1313
            type: string
          public:
            default: false
            description: Whether this saved search is visible to anyone but the owner.
              This field will always be false as there is no way to set a saved search
              as public at this time.
            example: false
            type: boolean
        type: object
      - $ref: '#/components/schemas/savedsearchname'
      - $ref: '#/components/schemas/savedsearchdetail'
      example:
        owner:
          id: 2c91808568c529c60168cca6f90c1313
          type: IDENTITY
        created: 2018-06-25T20:22:28.104Z
        columns:
          identity:
          - field: displayName
            header: Display Name
          - field: e-mail
            header: Work Email
        query: '@accounts(disabled:true)'
        description: Disabled accounts
        orderBy:
          identity:
          - lastName
          - firstName
          role:
          - name
        sort:
        - displayName
        filters:
          terms:
          - account_count
          - account_count
          range:
            lower:
              inclusive: false
              value: "1"
            upper:
              inclusive: false
              value: "1"
          exclude: false
          type: RANGE
        ownerId: 2c91808568c529c60168cca6f90c1313
        indices:
        - identities
        public: false
        name: Disabled accounts
        modified: 2018-06-25T20:22:28.104Z
        id: 0de46054-fe90-434a-b84e-c6b3359d0c64
        fields:
        - disabled
      type: object
    localeorigin:
      description: "An indicator of how the locale was selected. *DEFAULT* means the\
        \ locale is the system default. *REQUEST* means the locale was selected from\
        \ the request context (i.e., best match based on the *Accept-Language* header).\
        \ Additional values may be added in the future without notice."
      enum:
      - DEFAULT
      - REQUEST
      - null
      example: DEFAULT
      nullable: true
      type: string
    errormessagedto:
      example:
        localeOrigin: DEFAULT
        text: The request was syntactically correct but its content is semantically
          invalid.
        locale: en-US
      properties:
        locale:
          description: "The locale for the message text, a BCP 47 language tag."
          example: en-US
          nullable: true
          type: string
        localeOrigin:
          $ref: '#/components/schemas/localeorigin'
        text:
          description: Actual text of the error message in the indicated locale.
          example: The request was syntactically correct but its content is semantically
            invalid.
          type: string
      title: Error Message Dto
      type: object
    errorresponsedto:
      example:
        causes:
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        messages:
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        detailCode: 400.1 Bad Request Content
        trackingId: e7eab60924f64aa284175b9fa3309599
      properties:
        detailCode:
          description: Fine-grained error code providing more detail of the error.
          example: 400.1 Bad Request Content
          type: string
        trackingId:
          description: Unique tracking id for the error.
          example: e7eab60924f64aa284175b9fa3309599
          type: string
        messages:
          description: Generic localized reason for error
          items:
            $ref: '#/components/schemas/errormessagedto'
          type: array
        causes:
          description: Plain-text descriptive reasons to provide additional detail
            to the text provided in the messages field
          items:
            $ref: '#/components/schemas/errormessagedto'
          type: array
      title: Error Response Dto
      type: object
    searcharguments:
      properties:
        scheduleId:
          description: |
            The ID of the scheduled search that triggered the saved search execution.
          example: 7a724640-0c17-4ce9-a8c3-4a89738459c8
          type: string
        owner:
          allOf:
          - $ref: '#/components/schemas/typedreference'
          description: |
            The owner of the scheduled search being tested.
        recipients:
          description: |
            The email recipients of the scheduled search being tested.
          items:
            $ref: '#/components/schemas/typedreference'
          type: array
      type: object
    listSavedSearchesV1_401_response:
      example:
        error: "JWT validation failed: JWT is expired"
      properties:
        error:
          description: A message describing the error
          example: "JWT validation failed: JWT is expired"
      type: object
    listSavedSearchesV1_429_response:
      example:
        message: ' Rate Limit Exceeded '
      properties:
        message:
          description: A message describing the error
          example: ' Rate Limit Exceeded '
      type: object
    createSavedSearchV1_request:
      allOf:
      - $ref: '#/components/schemas/savedsearchname'
      - $ref: '#/components/schemas/savedsearchdetail'
    savedsearchdetail_filters:
      allOf:
      - description: The filters to be applied for each filtered field name.
        example:
          attributes.cloudAuthoritativeSource:
            type: EXISTS
            exclude: true
          accessCount:
            type: RANGE
            range:
              lower:
                value: "3"
          created:
            type: RANGE
            range:
              lower:
                value: 2019-12-01
                inclusive: true
              upper:
                value: 2020-01-01
          source.name:
            type: TERMS
            terms:
            - HR Employees
            - Corporate Active Directory
            exclude: true
          protected:
            type: TERMS
            terms:
            - "true"
        type: object
      - $ref: '#/components/schemas/filter'
      example:
        terms:
        - account_count
        - account_count
        range:
          lower:
            inclusive: false
            value: "1"
          upper:
            inclusive: false
            value: "1"
        exclude: false
        type: RANGE
      nullable: true
