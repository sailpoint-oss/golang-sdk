  /access-requests/v1:
    post:
      description: "Use this API to submit an access request in Identity Security\
        \ Cloud (ISC), where it follows any ISC approval processes.\n\n>**Security:**\
        \ idn:access-request:manage is for ORG_ADMIN level. idn:access-request-self:manage\
        \ is for USER level.\n\n:::info\nThe ability to request access using this\
        \ API is constrained by the Access Request Segments defined in the API token's\
        \ user context.\n:::\n\nAccess requests are processed asynchronously by ISC.\
        \ A successful response from this endpoint means that the request\nhas been\
        \ submitted to ISC and is queued for processing. Because this endpoint is\
        \ asynchronous, it does not return an error\nif you submit duplicate access\
        \ requests in quick succession or submit an access request for access that\
        \ is already in progress, approved, or rejected.\n\nIt is best practice to\
        \ check for any existing access requests that reference the same access items\
        \ before submitting a new access request. This can\nbe accomplished by using\
        \ the [List Access Request Status](https://developer.sailpoint.com/idn/api/v3/list-access-request-status)\
        \ or the [Pending Access Request Approvals](https://developer.sailpoint.com/idn/api/v3/list-pending-approvals)\
        \ APIs. You can also\nuse the [Search API](https://developer.sailpoint.com/idn/api/v3/search)\
        \ to check the existing access items an identity has before submitting\nan\
        \ access request to ensure that you aren't requesting access that is already\
        \ granted. If you use this API to request access that an identity already\
        \ has, \nwithout changing the account details or end date information from\
        \ the existing assignment, \nthe API will cancel the request as a duplicate.\n\
        \nThere are two types of access request:\n\n__GRANT_ACCESS__\n* Can be requested\
        \ for multiple identities in a single request.\n* Supports self request and\
        \ request on behalf of other users. Refer to the [Get Access Request Configuration](https://developer.sailpoint.com/idn/api/v3/get-access-request-config)\
        \ endpoint for request configuration options.  \n* Allows any authenticated\
        \ token (except API) to call this endpoint to request to grant access to themselves.\
        \ Depending on the configuration, a user can request access for others.\n\
        * Roles, access profiles and entitlements can be requested.\n* You can specify\
        \ a `startDate` to set or alter a sunrise date-time on an assignment. The\
        \ startDate must be a future date-time, in the UTC timezone. Additionally,\
        \ if the user already has the access assigned with a sunrise date and its\
        \ yet to be provisioned, you can also submit a request without a `startDate`\
        \ to request immediate provisioning after approval.\n* If a `startDate` is\
        \ specified, then the requested role, access profile, or entitlement will\
        \ be provisioned on that date and time.\n* You can specify a `removeDate`\
        \ to set or alter a sunset date-time on an assignment. The removeDate must\
        \ be a future date-time, in the UTC timezone. Additionally, if the user already\
        \ has the access assigned with a sunset date, you can also submit a request\
        \ without a `removeDate` to request removal of the sunset date and time.\n\
        * If a `removeDate` is specified, then the requested role, access profile,\
        \ or entitlement will be removed on that date and time.\n* Now supports an\
        \ alternate field 'requestedForWithRequestedItems' for users to specify account\
        \ selections while requesting items where they have more than one account\
        \ on the source.\n\n:::caution\n\nIf any entitlements are being requested,\
        \ then the maximum number of entitlements that can be requested is 25, and\
        \ the maximum number of identities that can be requested for is 10. If you\
        \ exceed these limits, the request will fail with a 400 error. If you are\
        \ not requesting any entitlements, then there are no limits.\n\n:::\n\n__REVOKE_ACCESS__\n\
        * Can only be requested for a single identity at a time.\n* You cannot use\
        \ an access request to revoke access from an identity if that access has been\
        \ granted by role membership or by birthright provisioning. \n* Does not support\
        \ self request. Only manager can request to revoke access for their directly\
        \ managed employees.\n* If a `removeDate` is specified, then the requested\
        \ role, access profile, or entitlement will be removed on that date and time.\n\
        * Roles, access profiles, and entitlements can be requested for revocation.\n\
        * Revoke requests for entitlements are limited to 1 entitlement per access\
        \ request currently.\n* You cannot specify a 'startDate' in a REVOKE_ACCESS\
        \ request, as startDate is only applicable for GRANT_ACCESS requests to indicate\
        \ when the access should be provisioned, and it does not make sense in the\
        \ context of revoking access.\n* You can specify a `removeDate` to add or\
        \ alter a sunset date and time on an assignment. The `removeDate` must be\
        \ a future date-time, in the UTC timezone. If the user already has the access\
        \ assigned with a sunset date and time, the removeDate must be a date-time\
        \ earlier than the existing sunset date and time. \n* Allows a manager to\
        \ request to revoke access for direct employees. A user with ORG_ADMIN authority\
        \ can also request to revoke access from anyone.\n* Now supports REVOKE_ACCESS\
        \ requests for identities with multiple accounts on a single source, with\
        \ the help of 'assignmentId' and 'nativeIdentity' fields. These fields should\
        \ be used within the 'requestedItems' section for the revoke requests. \n\
        * Usage of 'requestedForWithRequestedItems' field is not supported for revoke\
        \ requests.\n"
      operationId: createAccessRequestV1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/accessrequest'
        required: true
      responses:
        "202":
          content:
