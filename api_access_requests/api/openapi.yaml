components:
  responses:
    "202":
      content:
        application/json:
          schema:
            type: object
      description: Accepted - Returned if the request was successfully accepted into
        the system.
    "400":
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorresponsedto'
      description: Client Error - Returned if the request body is invalid.
    "401":
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/getAccessRequestConfigV1_401_response'
      description: "Unauthorized - Returned if there is no authorization header, or\
        \ if the JWT token is expired."
    "403":
      content:
        application/json:
          examples:
            "403":
              summary: An example of a 403 response object
              value:
                detailCode: 403 Forbidden
                trackingId: b21b1f7ce4da4d639f2c62a57171b427
                messages:
                - locale: en-US
                  localeOrigin: DEFAULT
                  text: The server understood the request but refuses to authorize
                    it.
          schema:
            $ref: '#/components/schemas/errorresponsedto'
      description: "Forbidden - Returned if the user you are running as, doesn't have\
        \ access to this end-point."
    "404":
      content:
        application/json:
          examples:
            "404":
              summary: An example of a 404 response object
              value:
                detailCode: 404 Not found
                trackingId: b21b1f7ce4da4d639f2c62a57171b427
                messages:
                - locale: en-US
                  localeOrigin: DEFAULT
                  text: The server did not find a current representation for the target
                    resource.
          schema:
            $ref: '#/components/schemas/errorresponsedto'
      description: Not Found - returned if the request URL refers to a resource or
        object that does not exist
    "429":
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/getAccessRequestConfigV1_429_response'
      description: Too Many Requests - Returned in response to too many requests in
        a given period of time - rate limited. The Retry-After header in the response
        includes how long to wait before trying again.
    "500":
      content:
        application/json:
          examples:
            "500":
              summary: An example of a 500 response object
              value:
                detailCode: 500.0 Internal Fault
                trackingId: b21b1f7ce4da4d639f2c62a57171b427
                messages:
                - locale: en-US
                  localeOrigin: DEFAULT
                  text: An internal fault occurred.
          schema:
            $ref: '#/components/schemas/errorresponsedto'
      description: Internal Server Error - Returned if there is an unexpected error.
  schemas:
    requestonbehalfofconfig:
      example:
        allowRequestOnBehalfOfEmployeeByManager: true
        allowRequestOnBehalfOfAnyoneByAnyone: true
      properties:
        allowRequestOnBehalfOfAnyoneByAnyone:
          default: false
          description: "If this is true, anyone can request access for anyone."
          example: true
          type: boolean
        allowRequestOnBehalfOfEmployeeByManager:
          default: false
          description: "If this is true, a manager can request access for his or her\
            \ direct reports."
          example: true
          type: boolean
      title: Request On Behalf Of Config
      type: object
    identityreferencewithnameandemail:
      example:
        name: Alison Ferguso
        id: 5168015d32f890ca15812c9180835d2e
        type: IDENTITY
        email: alison.ferguso@identitysoon.com
      nullable: true
      properties:
        type:
          description: The type can only be IDENTITY. This is read-only.
          example: IDENTITY
          type: string
        id:
          description: Identity ID.
          example: 5168015d32f890ca15812c9180835d2e
          type: string
        name:
          description: Identity's human-readable display name. This is read-only.
          example: Alison Ferguso
          type: string
        email:
          description: Identity's email address. This is read-only.
          example: alison.ferguso@identitysoon.com
          nullable: true
          type: string
      title: Identity Reference With Name And Email
      type: object
    approvalreminderandescalationconfig:
      description: |
        Configuration for approval reminder and escalation behavior. Important: Modifying this object will override the sp-approval service's reminderConfig and escalationConfig settings. Changes made here take precedence over any configuration set directly in the sp-approval service.
      example:
        fallbackApproverRef:
          name: Alison Ferguso
          id: 5168015d32f890ca15812c9180835d2e
          type: IDENTITY
          email: alison.ferguso@identitysoon.com
        maxReminders: 1
        daysUntilEscalation: 0
        daysBetweenReminders: 0
      properties:
        daysUntilEscalation:
          description: "Number of days to wait before the first reminder. If no reminders\
            \ are configured, then this is the number of days to wait before escalation."
          example: 0
          format: int32
          nullable: true
          type: integer
        daysBetweenReminders:
          description: Number of days to wait between reminder notifications.
          example: 0
          format: int32
          nullable: true
          type: integer
        maxReminders:
          description: Maximum number of reminder notifications to send to the reviewer
            before approval escalation. The maximum allowed value is 20.
          example: 1
          format: int32
          maximum: 20
          minimum: 0
          nullable: true
          type: integer
        fallbackApproverRef:
          $ref: '#/components/schemas/identityreferencewithnameandemail'
      title: Approval Reminder And Escalation Config
      type: object
    entitlementapprovalscheme:
      example:
        approverId: e3eab852-8315-467f-9de7-70eda97f63c8
        approverType: GOVERNANCE_GROUP
      properties:
        approverType:
          description: "Describes the individual or group that is responsible for\
            \ an approval step. Values are as follows.\n\n**ENTITLEMENT_OWNER**: Owner\
            \ of the associated Entitlement\n\n**SOURCE_OWNER**: Owner of the associated\
            \ Source\n\n**MANAGER**: Manager of the Identity for whom the request\
            \ is being made\n\n**GOVERNANCE_GROUP**: A Governance Group, the ID of\
            \ which is specified by the **approverId** field\n\n**WORKFLOW**: A Workflow,\
            \ the ID of which is specified by the **approverId** field, Workflows\
            \ are exclusive to other types of approvals and License required.     "
          enum:
          - ENTITLEMENT_OWNER
          - SOURCE_OWNER
          - MANAGER
          - GOVERNANCE_GROUP
          - WORKFLOW
          example: GOVERNANCE_GROUP
          type: string
        approverId:
          description: "Id of the specific approver, used only when approverType is\
            \ GOVERNANCE_GROUP or WORKFLOW"
          example: e3eab852-8315-467f-9de7-70eda97f63c8
          nullable: true
          type: string
      title: Entitlement Approval Scheme
      type: object
    entitlementaccessrequestconfig:
      example:
        denialCommentRequired: false
        approvalSchemes:
        - approverId: e3eab852-8315-467f-9de7-70eda97f63c8
          approverType: GOVERNANCE_GROUP
        - approverId: e3eab852-8315-467f-9de7-70eda97f63c8
          approverType: GOVERNANCE_GROUP
        reauthorizationRequired: false
        requestCommentRequired: true
        requireEndDate: true
        maxPermittedAccessDuration:
          value: 5
          timeUnit: DAYS
      properties:
        approvalSchemes:
          description: Ordered list of approval steps for the access request. Empty
            when no approval is required.
          items:
            $ref: '#/components/schemas/entitlementapprovalscheme'
          type: array
        requestCommentRequired:
          default: false
          description: If the requester must provide a comment during access request.
          example: true
          type: boolean
        denialCommentRequired:
          default: false
          description: If the reviewer must provide a comment when denying the access
            request.
          example: false
          type: boolean
        reauthorizationRequired:
          default: false
          description: Is Reauthorization Required
          example: false
          type: boolean
        requireEndDate:
          default: false
          description: "If true, then remove date or sunset date is required in access\
            \ request of the entitlement."
          example: true
          type: boolean
        maxPermittedAccessDuration:
          $ref: '#/components/schemas/entitlementaccessrequestconfig_maxPermittedAccessDuration'
      title: Entitlement Access Request Config
      type: object
    entitlementrevocationrequestconfig:
      example:
        approvalSchemes:
        - approverId: e3eab852-8315-467f-9de7-70eda97f63c8
          approverType: GOVERNANCE_GROUP
        - approverId: e3eab852-8315-467f-9de7-70eda97f63c8
          approverType: GOVERNANCE_GROUP
      properties:
        approvalSchemes:
          description: Ordered list of approval steps for the access request. Empty
