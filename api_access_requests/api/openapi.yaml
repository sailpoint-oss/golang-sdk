          items:
            $ref: '#/components/schemas/entitlementapprovalscheme'
          type: array
      title: Entitlement Revocation Request Config
      type: object
    entitlementrequestconfig:
      example:
        accessRequestConfig:
          denialCommentRequired: false
          approvalSchemes:
          - approverId: e3eab852-8315-467f-9de7-70eda97f63c8
