openapi: 3.0.1
info:
  contact:
    name: Developer Relations
    url: https://developer.sailpoint.com/discuss/api-help
  description: "Use these APIs to interact with the Identity Security Cloud platform\
    \ to achieve repeatable, automated processes with greater scalability. We encourage\
    \ you to join the SailPoint Developer Community forum at https://developer.sailpoint.com/discuss\
    \ to connect with other developers using our APIs."
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://developer.sailpoint.com/discuss/tos
  title: Identity Security Cloud API - Role Propagation
  version: v1
servers:
- description: This is the production API server.
  url: "https://{tenant}.api.identitynow.com"
  variables:
    tenant:
      default: sailpoint
      description: "This is the name of your tenant, typically your company's name."
- description: This is the versioned API server.
  url: "https://{apiUrl}"
  variables:
    apiUrl:
      default: sailpoint.api.identitynow.com
      description: This is the api url of your tenant
security:
- userAuth:
  - sp:scopes:all
tags:
- description: "Role Change Propagation ensures that any changes to the composition\
    \ of a role’s access objects \n(entitlements, access profiles, or dimensions)\
    \ are applied to all member identities. \nFor example: If an entitlement is removed\
    \ from a role, all identities assigned to that role \nshould lose access to that\
    \ entitlement as part of this process.\n"
  name: Role Propagation
paths:
  /role-propagation/v1:
    post:
      description: |-
        This endpoint initiates a role change propagation process for a tenant asynchronously.  If all preconditions are met, the request is accepted and a rolePropagationId is returned which  can be used to view the status.
        API throws 4xx if any of the following conditions are met - Role propagation feature is disabled  - There is an ongoing role propagation for the tenant - Role refresh needs to be kicked off as part of the role propagation (skipRoleRefresh=false) and there is an ongoing refresh for the tenant
      operationId: startRolePropagationV1
      parameters:
      - description: "When true, the role refresh is not performed. Keeping it false\
          \ is recommended."
        example: true
        explode: true
        in: query
        name: skipRoleRefresh
        required: false
        schema:
          default: false
          type: boolean
        style: form
      - description: Use this header to enable this experimental API.
        example: true
        explode: false
        in: header
        name: X-SailPoint-Experimental
        required: true
        schema:
          default: "true"
          type: string
        style: simple
      responses:
        "202":
          content:
            application/json:
              example:
                rolePropagationId: 47b9fb02-e12e-42ba-8bfe-1860d78c88eb
              schema:
                $ref: '#/components/schemas/role-propagation-response'
          description: Role Propagation has sucessfully started.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Client Error - Returned if the request body is invalid.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/startRolePropagationV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/startRolePropagationV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              examples:
                "500":
                  summary: An example of a 500 response object
                  value:
                    detailCode: 500.0 Internal Fault
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: An internal fault occurred.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Internal Server Error - Returned if there is an unexpected
            error.
      security:
      - userAuth:
        - idn:role-propagation:write
      - applicationAuth:
        - idn:role-propagation:write
      summary: Initiate Role Propagation process
      tags:
      - Role Propagation
      x-sailpoint-userLevels:
      - ORG_ADMIN
      - ROLE_ADMIN
      - ROLE_SUBADMIN
      - API
      - HELPDESK
  /role-propagation/v1/{rolePropagationId}/status:
    get:
      description: |-
        This endpoint returns the information of the specified role change propagation process. The execution stage of the role propagation process can be one of the following:
            - PENDING - The role propagation process is queued to be executed.
            - DATA_AGGREGATION_RUNNING - The role propagation process is currently aggregating data.
            - LAUNCH_PROVISIONING - The role propagation process has started to provision the access to the identities.
            - SUCCEEDED - The role propagation process has successfully completed.
            - FAILED - The role propagation process has failed.
            - TERMINATED - The role propagation process was externally terminated.
      operationId: getRolePropagationStatusV1
      parameters:
      - description: Use this header to enable this experimental API.
        example: true
        explode: false
        in: header
        name: X-SailPoint-Experimental
        required: true
        schema:
          default: "true"
          type: string
        style: simple
      - description: The ID of the role propagation process to retrieve the status
          for.
        example: 47b9fb02-e12e-42ba-8bfe-1860d78c88eb
        explode: false
        in: path
        name: rolePropagationId
        required: true
        schema:
          type: string
        style: simple
        x-sailpoint-resource-operation-id: startRolePropagationV1
      responses:
        "200":
          content:
            application/json:
              example:
                id: 0210f50c-bc23-4f9d-9921-056f1a170471
                status: COMPLETED
                executionStage: SUCCEEDED
                launched: 2025-05-29T17:18:31Z
                launchedBy:
                  id: 3315765f71c44c849e41a9cb9b271d7b
                  type: IDENTITY
                  name: support
                completed: 2025-05-29T17:21:19Z
                skipRoleRefresh: false
              schema:
                $ref: '#/components/schemas/role-propagation-status-response'
          description: Information of the role propagation process.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Client Error - Returned if the request body is invalid.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/startRolePropagationV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "404":
          content:
            application/json:
              examples:
                "404":
                  summary: An example of a 404 response object
                  value:
                    detailCode: 404 Not found
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server did not find a current representation for the
                        target resource.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Not Found - returned if the request URL refers to a resource
            or object that does not exist
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/startRolePropagationV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              examples:
                "500":
                  summary: An example of a 500 response object
                  value:
                    detailCode: 500.0 Internal Fault
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: An internal fault occurred.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Internal Server Error - Returned if there is an unexpected
            error.
      security:
      - userAuth:
        - idn:role-propagation:read
      - applicationAuth:
        - idn:role-propagation:read
      summary: Get status of Role-Propagation process
      tags:
      - Role Propagation
      x-sailpoint-userLevels:
      - ORG_ADMIN
      - ROLE_ADMIN
      - ROLE_SUBADMIN
      - API
      - HELPDESK
  /role-propagation/v1/is-running:
    get:
      description: "This endpoint returns the information of ongoing role change propagation\
        \ process for a tenant. It returns the information whether the role propagation\
        \ process is currently running or not, If it is running it returns the details\
        \ of the ongoing role propagation process. The execution stage of the role\
        \ propagation process can be one of the following: - PENDING - The role propagation\
        \ process is queued to be executed. - DATA_AGGREGATION_RUNNING - The role\
        \ propagation process is currently aggregating data. - LAUNCH_PROVISIONING\
        \ - The role propagation process has started to provision the access to the\
        \ identities. - SUCCEEDED - The role propagation process has successfully\
        \ completed. - FAILED - The role propagation process has failed. - TERMINATED\
        \ - The role propagation process was externally terminated."
      operationId: getOngoingRolePropagationV1
      parameters:
      - description: Use this header to enable this experimental API.
        example: true
        explode: false
        in: header
        name: X-SailPoint-Experimental
        required: true
        schema:
          default: "true"
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              example:
                isRunning: true
                rolePropagationDetails:
                  id: f11f4239-d442-4261-a390-996a62d757e9
                  status: RUNNING
                  executionStage: DATA_AGGREGATION_RUNNING
                  launched: 2025-05-29T22:27:40Z
                  launchedBy:
                    id: 3315765f71c44c849e41a9cb9b271d7b
                    type: IDENTITY
                    name: support
                  skipRoleRefresh: false
              schema:
                $ref: '#/components/schemas/role-propagation-ongoing-response'
          description: Information of ongoing role propagation process.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Client Error - Returned if the request body is invalid.
        "401":
          content:
