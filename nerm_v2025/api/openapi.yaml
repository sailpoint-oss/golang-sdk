openapi: 3.0.0
info:
  description: The NERM API v2025 accesss and modifies resources in your environment.
  license:
    name: MIT
  title: NERM API v2025
  version: 1.0.0
servers:
- url: "https://{tenantName}.nonemployee.com/api/v2025"
  variables:
    tenantName:
      default: acmeco
      description: Tenant name assigned to customer
security:
- userAuth: []
paths:
  /delegations:
    get:
      description: "Returns a list of delegation records, optionally filtered by delegate,\
        \ delegator, or expiration status."
      parameters:
      - description: Filter by delegate ID
        in: query
        name: delegate_id
        required: false
        schema:
          default: "false"
          example: ac4aae0b-4140-49a4-a84c-126762fd0c8f
          type: string
      - description: Filter by delegator ID
        in: query
        name: delegator_id
        required: false
        schema:
          default: "false"
          example: ac4aae0b-4140-49a4-a84c-126762fd0c8f
          type: string
      - description: "Filter by expiration status (true for expired, false for not\
          \ expired)"
        in: query
        name: expired
        required: false
        schema:
          default: false
          example: true
          type: boolean
      - description: The maximum number of items to return.
        in: query
        name: limit
        required: false
        schema:
          example: 5
          format: int32
          minimum: 1
          type: integer
      - description: The number of items to skip before starting to collect the result
          set.
        in: query
        name: offset
        required: false
        schema:
          example: 5
          format: int32
          minimum: 1
          type: integer
      - description: "Include related resources body. For example, 'include=delegator,delegate'."
        in: query
        name: include
        required: false
        schema:
          default: ""
          example: "delegator,delegate"
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/_delegations_get_200_response'
          description: Expected response to a valid request
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/_delegations_get_500_response'
          description: Internal Server Error - returned on unhandled exceptions.
      summary: List delegations
      tags:
      - delegations
    post:
      description: Create a new delegation record.
      requestBody:
        $ref: '#/components/requestBodies/Delegation'
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/_delegations_post_201_response'
          description: Expected response to a valid request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/_delegations_post_404_response'
          description: Record Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/_delegations_get_500_response'
          description: Internal Server Error - returned on unhandled exceptions.
      summary: Create a delegation
      tags:
      - delegations
  /delegations/{id}:
    delete:
      description: Delete an existing delegation record.
      parameters:
      - description: "ID of the object to retrieve, update, or delete"
        in: path
        name: id
        required: true
        schema:
          example: 1246d8b3-ac29-4015-8154-dea4434a73fa
          format: uuid
          type: string
      responses:
        "200":
          description: The delegation record '<delegation_id>' has been destroyed.
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/_delegations_post_404_response'
          description: Record Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/_delegations_get_500_response'
          description: Internal Server Error - returned on unhandled exceptions.
      summary: Delete a delegation
      tags:
      - delegations
    get:
      description: Returns a single delegation record by its ID.
      parameters:
      - description: "ID of the object to retrieve, update, or delete"
        in: path
        name: id
        required: true
        schema:
          example: 1246d8b3-ac29-4015-8154-dea4434a73fa
          format: uuid
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/_delegations_post_201_response'
          description: Expected response to a valid request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/_delegations_post_404_response'
          description: Record Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/_delegations_get_500_response'
          description: Internal Server Error - returned on unhandled exceptions.
      summary: Get a single delegation
      tags:
      - delegations
    patch:
      description: Update an existing delegation record.
      parameters:
      - description: "ID of the object to retrieve, update, or delete"
        in: path
        name: id
        required: true
        schema:
          example: 1246d8b3-ac29-4015-8154-dea4434a73fa
          format: uuid
          type: string
      requestBody:
        $ref: '#/components/requestBodies/Delegation'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/_delegations_post_201_response'
          description: Expected response to a valid request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/_delegations_post_404_response'
          description: Record Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/_delegations_get_500_response'
          description: Internal Server Error - returned on unhandled exceptions.
      summary: Update a delegation
      tags:
      - delegations
