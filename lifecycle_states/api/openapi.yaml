          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        detailCode: 400.1 Bad Request Content
        trackingId: e7eab60924f64aa284175b9fa3309599
      properties:
        detailCode:
          description: Fine-grained error code providing more detail of the error.
          example: 400.1 Bad Request Content
          type: string
        trackingId:
          description: Unique tracking id for the error.
          example: e7eab60924f64aa284175b9fa3309599
          type: string
        messages:
          description: Generic localized reason for error
          items:
            $ref: '#/components/schemas/errormessagedto'
          type: array
        causes:
          description: Plain-text descriptive reasons to provide additional detail
            to the text provided in the messages field
          items:
            $ref: '#/components/schemas/errormessagedto'
          type: array
      title: Error Response Dto
      type: object
    basecommondto:
      properties:
        id:
          description: System-generated unique ID of the Object
          example: id12345
          readOnly: true
          type: string
        name:
          description: Name of the Object
          example: aName
          nullable: true
          type: string
        created:
          description: Creation date of the Object
          example: 2015-05-28T14:07:17Z
          format: date-time
          readOnly: true
          type: string
        modified:
          description: Last modification date of the Object
          example: 2015-05-28T14:07:17Z
          format: date-time
          readOnly: true
          type: string
      required:
      - name
      title: Base Common Dto
      type: object
    emailnotificationoption:
      description: This is used for representing email configuration for a lifecycle
        state
      example:
        notifyManagers: true
        notifySpecificUsers: true
        emailAddressList:
        - test@test.com
        - test2@test.com
        notifyAllAdmins: true
      properties:
        notifyManagers:
          default: false
          description: "If true, then the manager is notified of the lifecycle state\
            \ change."
          example: true
          type: boolean
        notifyAllAdmins:
          default: false
          description: "If true, then all the admins are notified of the lifecycle\
            \ state change."
          example: true
          type: boolean
        notifySpecificUsers:
          default: false
          description: "If true, then the users specified in \"emailAddressList\"\
            \ below are notified of lifecycle state change."
          example: true
          type: boolean
        emailAddressList:
          description: "List of user email addresses. If \"notifySpecificUsers\" option\
            \ is true, then these users are notified of lifecycle state change."
          example:
          - test@test.com
          - test2@test.com
          items:
            type: string
          type: array
      title: Email Notification Option
      type: object
    accountaction:
      description: Object for specifying Actions to be performed on a specified list
        of sources' account.
      example:
        allSources: true
        action: ENABLE
        excludeSourceIds:
        - 3b551ccf5566478b9b77f37de25303aa
        sourceIds:
        - 2c918084660f45d6016617daa9210584
        - 2c918084660f45d6016617daa9210500
      properties:
        action:
          description: "Describes if action will be enable, disable or delete."
          enum:
          - ENABLE
          - DISABLE
          - DELETE
          example: ENABLE
          type: string
        sourceIds:
          description: A unique list of specific source IDs to apply the action to.
            The sources must have the ENABLE feature or flat file source. Required
            if allSources is not true. Must not be provided if allSources is true.
            Cannot be used together with excludeSourceIds See "/sources" endpoint
            for source features.
          example:
          - 2c918084660f45d6016617daa9210584
          - 2c918084660f45d6016617daa9210500
          items:
            type: string
          nullable: true
          type: array
          uniqueItems: true
        excludeSourceIds:
          description: A list of source IDs to exclude from the action. Cannot be
            used together with sourceIds.
          example:
          - 3b551ccf5566478b9b77f37de25303aa
          items:
            type: string
          nullable: true
          type: array
          uniqueItems: true
        allSources:
          default: false
          description: "If true, the action applies to all available sources. If true,\
            \ sourceIds must not be provided. If false or not set, sourceIds is required."
          example: true
          type: boolean
      title: Account Action
      type: object
    accessactionconfiguration:
      description: This is used for access configuration for a lifecycle state
      example:
        removeAllAccessEnabled: true
      properties:
        removeAllAccessEnabled:
          default: false
          description: "If true, then all accesses are marked for removal."
          example: true
          type: boolean
      title: Access Action Configuration
      type: object
    lifecyclestate:
      allOf:
      - $ref: '#/components/schemas/basecommondto'
      - properties:
          enabled:
            default: false
            description: Indicates whether the lifecycle state is enabled or disabled.
            example: true
            type: boolean
          technicalName:
            description: The lifecycle state's technical name. This is for internal
              use.
            example: Technical Name
            type: string
          description:
            description: Lifecycle state's description.
            example: Lifecycle description
            nullable: true
            type: string
          identityCount:
            description: Number of identities that have the lifecycle state.
            example: 42
            format: int32
            readOnly: true
            type: integer
          emailNotificationOption:
            $ref: '#/components/schemas/emailnotificationoption'
          accountActions:
            items:
              $ref: '#/components/schemas/accountaction'
            type: array
          accessProfileIds:
            description: List of unique access-profile IDs that are associated with
              the lifecycle state.
            example:
            - 2c918084660f45d6016617daa9210584
            - 2c918084660f45d6016617daa9210500
            items:
              type: string
            type: array
            uniqueItems: true
          identityState:
            description: The lifecycle state's associated identity state. This field
              is generally 'null'.
            enum:
            - ACTIVE
            - INACTIVE_SHORT_TERM
            - INACTIVE_LONG_TERM
            example: INACTIVE_LONG_TERM
            nullable: true
            type: string
          accessActionConfiguration:
            $ref: '#/components/schemas/accessactionconfiguration'
          priority:
            description: Used to control the order of lifecycle states when listing
              with `?sorters=priority`. Lower numbers appear first (ascending order).
              Out-of-the-box lifecycle states are assigned priorities in increments
              of 10.
            example: 10
            format: int32
            nullable: true
            type: integer
        required:
        - technicalName
        type: object
      example:
        accessActionConfiguration:
          removeAllAccessEnabled: true
        accessProfileIds:
        - 2c918084660f45d6016617daa9210584
        - 2c918084660f45d6016617daa9210500
        emailNotificationOption:
          notifyManagers: true
          notifySpecificUsers: true
          emailAddressList:
          - test@test.com
          - test2@test.com
          notifyAllAdmins: true
        created: 2015-05-28T14:07:17Z
        description: Lifecycle description
        identityCount: 42
        priority: 10
        technicalName: Technical Name
        identityState: INACTIVE_LONG_TERM
        enabled: true
        name: aName
        modified: 2015-05-28T14:07:17Z
        accountActions:
        - allSources: true
          action: ENABLE
          excludeSourceIds:
          - 3b551ccf5566478b9b77f37de25303aa
          sourceIds:
          - 2c918084660f45d6016617daa9210584
          - 2c918084660f45d6016617daa9210500
        - allSources: true
          action: ENABLE
          excludeSourceIds:
          - 3b551ccf5566478b9b77f37de25303aa
          sourceIds:
          - 2c918084660f45d6016617daa9210584
          - 2c918084660f45d6016617daa9210500
        id: id12345
    lifecyclestatedeleted:
      description: Deleted lifecycle state.
      example:
        name: Contractor Lifecycle
        id: "12345"
        type: LIFECYCLE_STATE
      properties:
        type:
          description: Deleted lifecycle state's DTO type.
          enum:
          - LIFECYCLE_STATE
          - TASK_RESULT
          example: LIFECYCLE_STATE
          type: string
        id:
          description: Deleted lifecycle state ID.
          example: "12345"
          type: string
        name:
          description: Deleted lifecycle state's display name.
          example: Contractor Lifecycle
          type: string
      title: Lifecyclestate Deleted
      type: object
    jsonpatchoperation:
      description: "A JSONPatch Operation as defined by [RFC 6902 - JSON Patch](https://tools.ietf.org/html/rfc6902)"
      properties:
        op:
          description: The operation to be performed
          enum:
          - add
          - remove
          - replace
          - move
          - copy
          - test
          example: replace
          type: string
        path:
          description: A string JSON Pointer representing the target path to an element
            to be affected by the operation
          example: /description
          type: string
        value:
          $ref: '#/components/schemas/jsonpatchoperation_value'
      required:
      - op
      - path
      title: Json Patch Operation
      type: object
    setLifecycleStateV1_request:
      properties:
        lifecycleStateId:
          description: ID of the lifecycle state to set.
          example: 2c9180877a86e408017a8c19fefe046c
          type: string
      type: object
    setLifecycleStateV1_200_response:
      example:
        accountActivityId: 2c9180837ab5b716017ab7c6c9ef1e20
      properties:
        accountActivityId:
          description: "ID of the IdentityRequest object that is generated when the\
            \ workflow launches. To follow the IdentityRequest, you can provide this\
            \ ID with a [Get Account Activity request](https://developer.sailpoint.com/docs/api/v3/get-account-activity/).\
            \ The response will contain relevant information about the IdentityRequest,\
            \ such as its status."
          example: 2c9180837ab5b716017ab7c6c9ef1e20
          type: string
      type: object
    setLifecycleStateV1_401_response:
      example:
        error: "JWT validation failed: JWT is expired"
      properties:
        error:
          description: A message describing the error
          example: "JWT validation failed: JWT is expired"
      type: object
    setLifecycleStateV1_429_response:
      example:
        message: ' Rate Limit Exceeded '
      properties:
        message:
          description: A message describing the error
          example: ' Rate Limit Exceeded '
      type: object
    array_inner:
      anyOf:
      - type: string
      - type: integer
      - type: object
      example:
      - "001"
      - "002"
      - "003"
    jsonpatchoperation_value:
      description: "The value to be used for the operation, required for \"add\" and\
        \ \"replace\" operations"
      example: New description
      oneOf:
      - example: New description
        title: string
        type: string
      - example: true
        title: boolean
        type: boolean
      - example: 300
        title: integer
        type: integer
      - example:
          attributes:
            name: philip
        title: object
        type: object
      - items:
          $ref: '#/components/schemas/array_inner'
        title: array
        type: array
