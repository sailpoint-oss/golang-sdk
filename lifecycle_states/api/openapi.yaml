    patch:
      description: "Use this endpoint to update individual lifecycle state fields,\
        \ using the [JSON Patch](https://tools.ietf.org/html/rfc6902) standard."
      operationId: updateLifecycleStatesV1
      parameters:
      - description: Identity profile ID.
        example: 2b838de9-db9b-abcf-e646-d4f274ad4238
        explode: false
        in: path
        name: identity-profile-id
        required: true
        schema:
          type: string
        style: simple
        x-sailpoint-resource-operation-id: listIdentityProfilesV1
      - description: Lifecycle state ID.
        example: ef38f94347e94562b5bb8424a56397d8
        explode: false
        in: path
        name: lifecycle-state-id
        required: true
        schema:
          type: string
        style: simple
        x-sailpoint-resource-operation-id: getLifecycleStatesV1
      requestBody:
        content:
          application/json-patch+json:
            example:
            - op: replace
              path: /description
              value: Updated description!
            - op: replace
              path: /accessProfileIds
              value:
              - 2c918087742bab150174407a80f3125e
              - 2c918087742bab150174407a80f3124f
            - op: replace
              path: /accountActions
              value:
              - action: ENABLE
                sourceIds:
                - 2c9180846a2f82fb016a481c1b1560c5
                - 2c9180846a2f82fb016a481c1b1560cc
                excludeSourceIds: null
                allSources: false
              - action: DISABLE
                sourceIds: null
                excludeSourceIds:
                - 3b551ccf5566478b9b77f37de25303aa
                allSources: true
              - action: DELETE
                sourceIds:
                - 3c9180846a2f82fb016a481c1b1560c5
                - 8n9180846a2f82fb016a481c1b1560cc
                excludeSourceIds: null
                allSources: false
            - op: replace
              path: /emailNotificationOption
              value:
                notifyManagers: true
                notifyAllAdmins: false
                notifySpecificUsers: false
                emailAddressList: []
            - op: replace
              path: /accessActionConfiguration
              value:
                removeAllAccessEnabled: true
            schema:
              items:
                $ref: '#/components/schemas/jsonpatchoperation'
              type: array
        description: |
          A list of lifecycle state update operations according to the [JSON Patch](https://tools.ietf.org/html/rfc6902) standard.

          The following fields can be updated:
          * enabled
          * description
          * accountActions
          * accessProfileIds
          * emailNotificationOption
          * accessActionConfiguration
          * priority
        required: true
      responses:
        "200":
          content:
