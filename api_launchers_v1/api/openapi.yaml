          **description**: *sw*

          **disabled**: *eq*

          **name**: *sw*
        example: disabled eq "true"
        explode: true
        in: query
        name: filters
        required: false
        schema:
          type: string
        style: form
      - description: Pagination marker
        example: eyJuZXh0IjoxMjN9Cg==
        explode: true
        in: query
        name: next
        required: false
        schema:
          type: string
        style: form
      - description: Number of Launchers to return
        example: 42
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 10
          format: int32
          maximum: 100
          minimum: 1
          type: integer
        style: form
