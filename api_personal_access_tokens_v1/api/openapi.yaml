  schemas:
    patowner:
      description: Personal access token owner's identity.
      example:
        name: Support
        id: 2c9180a46faadee4016fb4e018c20639
        type: IDENTITY
      properties:
        type:
          description: Personal access token owner's DTO type.
          enum:
          - IDENTITY
          example: IDENTITY
          type: string
        id:
          description: Personal access token owner's identity ID.
          example: 2c9180a46faadee4016fb4e018c20639
          type: string
        name:
          description: Personal access token owner's human-readable display name.
          example: Support
          type: string
      title: Pat Owner
      type: object
    getpersonalaccesstokenresponse:
      example:
        owner:
          name: Support
          id: 2c9180a46faadee4016fb4e018c20639
          type: IDENTITY
        lastUsed: 2017-07-11T18:45:37.098Z
        created: 2017-07-11T18:45:37.098Z
        managed: false
        scope:
        - demo:personal-access-token-scope:first
        - demo:personal-access-token-scope:second
        accessTokenValiditySeconds: 36900
        name: NodeJS Integration
        id: 86f1dc6fe8f54414950454cbb11278fa
        userAwareTokenNeverExpires: false
        expirationDate: 2026-12-31T23:59:59.999Z
      properties:
        id:
          description: The ID of the personal access token (to be used as the username
            for Basic Auth).
          example: 86f1dc6fe8f54414950454cbb11278fa
          type: string
        name:
          description: The name of the personal access token. Cannot be the same as
            other personal access tokens owned by a user.
          example: NodeJS Integration
          type: string
        scope:
          description: Scopes of the personal  access token.
          example:
          - demo:personal-access-token-scope:first
          - demo:personal-access-token-scope:second
          items:
            default: sp:scopes:all
            type: string
          nullable: true
          type: array
        owner:
          $ref: '#/components/schemas/patowner'
        created:
          description: "The date and time, down to the millisecond, when this personal\
            \ access token was created."
          example: 2017-07-11T18:45:37.098Z
          format: date-time
          type: string
        lastUsed:
          description: "The date and time, down to the millisecond, when this personal\
            \ access token was last used to generate an access token. This timestamp\
            \ does not get updated on every PAT usage, but only once a day. This property\
            \ can be useful for identifying which PATs are no longer actively used\
            \ and can be removed."
          example: 2017-07-11T18:45:37.098Z
          format: date-time
          nullable: true
          type: string
        managed:
          default: false
          description: "If true, this token is managed by the SailPoint platform,\
            \ and is not visible in the user interface. For example, Workflows will\
            \ create managed personal access tokens for users who create workflows."
          example: false
          type: boolean
        accessTokenValiditySeconds:
          default: 43200
          description: "Number of seconds an access token is valid when generated\
            \ using this Personal Access Token. If no value is specified, the token\
            \ will be created with the default value of 43200."
          example: 36900
          format: int32
          type: integer
        expirationDate:
          description: |-
            Date and time, down to the millisecond, when this personal access token will expire.
            **Important:** When `expirationDate` is `null` or empty, the token will never expire (and `userAwareTokenNeverExpires` will be `true`).
            When `expirationDate` is provided, this value must be a future date. There is no upper limit on how far in the future the expiration date can be set.
          example: 2026-12-31T23:59:59.999Z
          format: date-time
          nullable: true
          type: string
        userAwareTokenNeverExpires:
          default: false
          description: |-
            Indicates that the user who created or updated this Personal Access Token is aware of and acknowledges the security implications of creating a token that will never expire. When `true`, this flag confirms that the user understood the security risks associated with non-expiring tokens at the time of creation or update.
            **Security Awareness:** This field serves as a record that the user acknowledged: * Tokens that never expire pose a greater security risk if compromised * Non-expiring tokens should be used only when necessary and with appropriate security measures * Regular rotation and monitoring of non-expiring tokens is recommended
            **Behavior:** * When `true`: Indicates that the user acknowledged they were creating a token that will never expire. When `expirationDate` is `null`, the token will never expire. * When `false`: The token follows normal expiration rules based on the `expirationDate` field and `accessTokenValiditySeconds` setting.
          example: false
          type: boolean
      required:
      - created
      - id
      - name
      - owner
      - scope
