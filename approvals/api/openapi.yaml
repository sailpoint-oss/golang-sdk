  schemas:
    approvalidentity:
      description: Approval Identity Object
      example:
        identityID: 17e633e7d57e481569df76323169deb6a
        members:
        - name: Bob Neil
          id: 17e633e7d57e481569df76323169deb6a
          type: IDENTITY
          email: mail@mail.com
        - name: Bob Neil
          id: 17e633e7d57e481569df76323169deb6a
          type: IDENTITY
          email: mail@mail.com
        name: Jim Bob
        ownerOf:
        - name: Access Request App
          id: string
          type: APPLICATION
        - name: Access Request App
          id: string
          type: APPLICATION
        serialOrder: 0
        type: IDENTITY
        email: mail@mail.com
      properties:
        email:
          description: Email address.
          example: mail@mail.com
          type: string
        identityID:
          description: Identity ID of the type of identity defined in the 'type' field.
          example: 17e633e7d57e481569df76323169deb6a
          type: string
        members:
          description: List of members of a governance group. Will be omitted if the
            identity is not a governance group.
          items:
            $ref: '#/components/schemas/approvalidentity_members_inner'
          type: array
        name:
          description: Name of the identity.
          example: Jim Bob
          type: string
        ownerOf:
          description: "List of owned items. For example, will show the items in which\
            \ a ROLE_OWNER owns. Omitted if not an owner of anything."
          items:
            $ref: '#/components/schemas/approvalidentity_ownerOf_inner'
          type: array
        serialOrder:
          description: The serial step of the identity in the approval. For example
            serialOrder 1 is the first identity to action in an approval request chain.
            Parallel approvals are set to 0.
          example: 0
          format: int64
          type: integer
        type:
          description: Type of identityID.
          enum:
          - IDENTITY
          - GOVERNANCE_GROUP
          - MANAGER_OF
          - ACCOUNT_OWNER
          - MACHINE_ACCOUNT_OWNER
          - MACHINE_IDENTITY_OWNER
          - MANAGER_OF_REQUESTED_TARGET_OWNER
          - MANAGER_OF_MACHINE_IDENTITY_OWNER
          - MANAGER_OF_ACCOUNT_OWNER
          - MANAGER_OF_MACHINE_ACCOUNT_OWNER
          - MANAGER_OF_REQUESTER
          - MANAGER_OF_REQUESTER_OWNER
          - MANAGER_OF_OWNER
          - ACCESS_PROFILE_OWNER
          - APPLICATION_OWNER
          - ENTITLEMENT_OWNER
          - ROLE_OWNER
          - SOURCE_OWNER
          - REQUESTED_TARGET_OWNER
          - ACCESS_PROFILE_PRIMARY_OWNER
          - APPLICATION_PRIMARY_OWNER
          - ENTITLEMENT_PRIMARY_OWNER
          - ROLE_PRIMARY_OWNER
          - SOURCE_PRIMARY_OWNER
          - REQUESTED_TARGET_PRIMARY_OWNER
          - ACCESS_PROFILE_SECONDARY_OWNER_GROUP
          - APPLICATION_SECONDARY_OWNER_GROUP
          - ENTITLEMENT_SECONDARY_OWNER_GROUP
          - ROLE_SECONDARY_OWNER_GROUP
          - SOURCE_SECONDARY_OWNER_GROUP
          - REQUESTED_TARGET_SECONDARY_OWNER_GROUP
          - ACCESS_PROFILE_ALL_OWNER_GROUP
          - APPLICATION_ALL_OWNER_GROUP
          - ENTITLEMENT_ALL_OWNER_GROUP
          - ROLE_ALL_OWNER_GROUP
          - SOURCE_ALL_OWNER_GROUP
          - REQUESTED_TARGET_ALL_OWNER_GROUP
          example: IDENTITY
          type: string
      title: Approval Identity
      type: object
    approvalname:
      description: Approval Name Object
      example:
        locale: en_US
        value: Audit DB Access
      properties:
        value:
          description: Name of the approval
          example: Audit DB Access
          type: string
        locale:
          description: What locale the name of the approval is using
          example: en_US
          type: string
      title: Approval Name
      type: object
    approvalbatch:
      description: Batch properties if an approval is sent via batching.
      example:
        batchId: 38453251-6be2-5f8f-df93-5ce19e295837
        batchSize: 100
      properties:
        batchId:
          description: ID of the batch
          example: 38453251-6be2-5f8f-df93-5ce19e295837
          type: string
        batchSize:
          description: How many approvals are going to be in this batch. Defaults
            to 1 if not provided.
          example: 100
          format: int64
          type: integer
      title: Approval Batch
      type: object
    approvalconfig:
      description: Approval config Object
      example:
        timeoutConfig:
          daysUntilTimeout: 2
          enabled: true
          timeoutResult: EXPIRED
        requiresComment: ALL
        cronTimezone:
          offset: ""
          location: America/New_York
        fallbackApprover:
          identityID: fdfda352157d4cc79bb749953131b457
          type: MANAGER_OF
        reminderConfig:
          reminderCronSchedule: 1 1 1 1 1
          daysUntilFirstReminder: 0
          maxReminders: 5
          enabled: false
        circumventApprovalProcess: false
        escalationConfig:
          escalationCronSchedule: '*/5 * * * *'
          escalationChain:
          - tier: 1
            identityType: IDENTITY
            identityId: fdfda352157d4cc79bb749953131b457
          - tier: 1
            identityType: IDENTITY
            identityId: fdfda352157d4cc79bb749953131b457
          daysUntilFirstEscalation: 2
          enabled: true
        serialChain:
        - tier: 1
          identityType: IDENTITY
          identityId: 2c9180858090ea8801809a0465e829da
        - tier: 1
          identityType: IDENTITY
          identityId: 2c9180858090ea8801809a0465e829da
        machineIdentityManagerAssignment: MACHINE_IDENTITY_OWNER
        autoApprove: "OFF"
      properties:
        reminderConfig:
          $ref: '#/components/schemas/approvalconfig_reminderConfig'
        escalationConfig:
          $ref: '#/components/schemas/approvalconfig_escalationConfig'
        timeoutConfig:
          $ref: '#/components/schemas/approvalconfig_timeoutConfig'
        cronTimezone:
          $ref: '#/components/schemas/approvalconfig_cronTimezone'
        serialChain:
          description: If the approval request has an approvalCriteria of SERIAL this
            chain will be used to determine the assignment order.
          items:
            $ref: '#/components/schemas/approvalconfig_serialChain_inner'
          type: array
        requiresComment:
          description: Determines whether a comment is required when approving or
            rejecting the approval request.
          enum:
          - APPROVAL
          - REJECTION
          - ALL
          - "OFF"
          example: ALL
          type: string
        fallbackApprover:
          $ref: '#/components/schemas/approvalconfig_fallbackApprover'
        machineIdentityManagerAssignment:
          default: MANAGER_OF_REQUESTER
          description: Specifies how to treat the identity type "MANAGER_OF" when
            the requestee is a machine identity.
          enum:
          - MANAGER_OF_REQUESTER
          - MACHINE_IDENTITY_OWNER
          - MANAGER_OF_MACHINE_IDENTITY_OWNER
          - REQUESTED_TARGET_OWNER
          - MANAGER_OF_REQUESTED_TARGET_OWNER
          - ACCOUNT_OWNER
          - MANAGER_OF_ACCOUNT_OWNER
          example: MACHINE_IDENTITY_OWNER
          type: string
        circumventApprovalProcess:
          default: false
          description: "When true, all approvals will be created with the status \"\
            PASSED\"."
          example: false
          type: boolean
        autoApprove:
          description: "OFF will prevent the approval request from being assigned\
            \ to the requester or requestee by assigning it to their manager instead.\
            \ DIRECT will cause approval requests to be auto-approved when assigned\
            \ directly and only to the requester. INDIRECT will auto-approve when\
            \ the requester appears anywhere in the list of approvers, including in\
            \ a governance group. This field will only be effective if requestedTarget.reauthRequired\
            \ is set to false, otherwise the approval will have to be manually approved."
          enum:
          - "OFF"
          - DIRECT
          - INDIRECT
          example: "OFF"
          type: string
      type: object
    approvaldescription:
      description: The description of what the approval is asking for
      example:
        locale: en_US
        value: This access allows viewing and editing of workflow resource
      properties:
        value:
          description: The description of what the approval is asking for
          example: This access allows viewing and editing of workflow resource
          type: string
        locale:
          description: What locale the description of the approval is using
          example: en_US
          type: string
      title: Approval Description
      type: object
    approvalcomment-3:
      description: Comments Object
      example:
        createdDate: 2023-04-12T23:20:50.52Z
        author:
          identityID: 17e633e7d57e481569df76323169deb6a
          members:
          - name: Bob Neil
            id: 17e633e7d57e481569df76323169deb6a
            type: IDENTITY
            email: mail@mail.com
          - name: Bob Neil
            id: 17e633e7d57e481569df76323169deb6a
            type: IDENTITY
            email: mail@mail.com
          name: Jim Bob
          ownerOf:
          - name: Access Request App
            id: string
            type: APPLICATION
          - name: Access Request App
            id: string
            type: APPLICATION
          serialOrder: 0
          type: IDENTITY
          email: mail@mail.com
        commentId: 38453251-6be2-5f8f-df93-5ce19e295837
        comment: Looks good
      properties:
        author:
          $ref: '#/components/schemas/approvalidentity'
        comment:
          description: Comment to be left on an approval
          example: Looks good
          type: string
        createdDate:
          description: Date the comment was created
          example: 2023-04-12T23:20:50.52Z
          type: string
        commentId:
          description: ID of the comment
          example: 38453251-6be2-5f8f-df93-5ce19e295837
          type: string
      title: Approval Comment
      type: object
    approvalreference:
      description: Reference objects related to the approval
      example:
        name: Access Request
        id: 64012350-8fd9-4f6c-a170-1fe123683899
        serialOrder: 0
        type: AccessRequestId
        email: user@example.com
      properties:
        id:
          description: Id of the reference object
          example: 64012350-8fd9-4f6c-a170-1fe123683899
          type: string
        type:
          description: What reference object does this ID correspond to
          example: AccessRequestId
          type: string
        name:
          description: Name of the reference object
          example: Access Request
          type: string
        email:
          description: Email associated with the reference object
          example: user@example.com
          format: email
          type: string
        serialOrder:
          description: The serial step of the identity in the approval. For example
            serialOrder 1 is the first identity to action in an approval request chain.
            Parallel approvals are set to 0.
          example: 0
          format: int64
          type: integer
      title: Approval Reference
      type: object
    approvalidentityrecord:
      description: Identity Record Object
      example:
        identityID: 17e633e7d57e481569df76323169deb6a
        members:
        - name: Access Request
          id: 64012350-8fd9-4f6c-a170-1fe123683899
          serialOrder: 0
          type: AccessRequestId
          email: user@example.com
        - name: Access Request
          id: 64012350-8fd9-4f6c-a170-1fe123683899
          serialOrder: 0
          type: AccessRequestId
          email: user@example.com
        name: Jim Bob
        type: IDENTITY
        email: user@example.com
        actionedAs:
        - name: Access Request
          id: 64012350-8fd9-4f6c-a170-1fe123683899
          serialOrder: 0
          type: AccessRequestId
          email: user@example.com
        - name: Access Request
          id: 64012350-8fd9-4f6c-a170-1fe123683899
          serialOrder: 0
          type: AccessRequestId
          email: user@example.com
        decisionDate: 2023-04-12T23:20:50.52Z
      properties:
        identityID:
          description: Identity ID.
          example: 17e633e7d57e481569df76323169deb6a
          type: string
        type:
          description: Type of identity.
          enum:
          - IDENTITY
          example: IDENTITY
          type: string
        name:
          description: Name of the identity.
          example: Jim Bob
          type: string
        actionedAs:
          description: List of references representing actions taken by the identity.
          items:
            $ref: '#/components/schemas/approvalreference'
          type: array
        members:
          description: List of references representing members of the identity.
          items:
            $ref: '#/components/schemas/approvalreference'
          type: array
        decisionDate:
          description: Date when the decision was made.
          example: 2023-04-12T23:20:50.52Z
          format: date-time
          type: string
        email:
          description: Email associated with the identity.
          example: user@example.com
          format: email
          type: string
      type: object
    approvalreassignmenthistory:
      description: ReassignmentHistoryRecord holds a history record of reassignment
        and escalation actions for an approval request
      example:
        reassignedTo:
          identityID: 17e633e7d57e481569df76323169deb6a
          members:
          - name: Bob Neil
            id: 17e633e7d57e481569df76323169deb6a
