openapi: 3.0.1
info:
  contact:
    name: Developer Relations
    url: https://developer.sailpoint.com/discuss/api-help
  description: "Use these APIs to interact with the Identity Security Cloud platform\
    \ to achieve repeatable, automated processes with greater scalability. We encourage\
    \ you to join the SailPoint Developer Community forum at https://developer.sailpoint.com/discuss\
    \ to connect with other developers using our APIs."
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://developer.sailpoint.com/discuss/tos
  title: Identity Security Cloud API - Approvals
  version: v1
servers:
- description: This is the production API server.
  url: "https://{tenant}.api.identitynow.com"
  variables:
    tenant:
      default: sailpoint
      description: "This is the name of your tenant, typically your company's name."
- description: This is the versioned API server.
  url: "https://{apiUrl}"
  variables:
    apiUrl:
      default: sailpoint.api.identitynow.com
      description: This is the api url of your tenant
security:
- userAuth:
  - sp:scopes:all
tags:
- description: "Use this API to implement approval functionality. With this functionality\
    \ in place, you can get generic approvals and modify them. \n\nThe main advantages\
    \ this API has vs [Access Request Approvals](https://developer.sailpoint.com/docs/api/v2025/access-request-approvals)\
    \ are that you can use it to get generic approvals individually or in batches\
    \ and make changes to those approvals. \n"
  name: Approvals
paths:
  /generic-approvals/v1:
    get:
      description: "Gets a list of approvals.\n\nOne of the following query parameters\
        \ should be present: 'mine', 'approverId', 'requesterId', 'requesteeId'.\n\
        \nThe absence of all query parameters for non admins will default to mine=true\
        \ (which is the equivalent of 'approverId=[your_identity_id]') \nwhile admins\
        \ will default to mine=false (which will show all approvals in the org).\n\
        \nFor lookups by access request ID please use the following:\n\n'/generic-approvals?mine=false&filters=referenceType+eq+\"\
        accessRequestId\"+and+referenceId+eq+\"12345678901234567890123456789012\"'"
      operationId: getApprovalsV1
      parameters:
      - description: "Determines whether to return the list of approvals assigned\
          \ to the current caller or all approvals in the org. Defaults to false if\
          \ admin, true otherwise (which is the equivalent of 'approverId=[your_identity_id]')."
        example: "true"
        explode: true
        in: query
        name: mine
        required: false
        schema:
          default: false
          type: boolean
        style: form
      - description: Returns the list of approvals for a given requester ID. Must
          match the calling user's identity ID unless they are an admin.
        example: 17e633e7d57e481569df76323169deb6a
        explode: true
        in: query
        name: requesterId
        required: false
        schema:
          type: string
        style: form
      - description: Returns the list of approvals for a given requesteeId ID. Must
          match the calling user's identity ID unless they are an admin.
        example: 27e6334g757e481569df76323169db9sc
        explode: true
        in: query
        name: requesteeId
        required: false
        schema:
          type: string
        style: form
      - description: Returns the list of approvals for a given approverId ID. Must
          match the calling user's identity ID unless they are an admin.
        example: 37e6334g557e481569df7g2d3169db9sb
        explode: true
        in: query
        name: approverId
        required: false
        schema:
          type: string
        style: form
      - description: Adds X-Total-Count to the header to give the amount of total
          approvals returned from the query.
        example: "true"
        explode: true
        in: query
        name: count
        required: false
        schema:
          default: false
          type: boolean
        style: form
      - description: Adds X-Total-Count to the header to give the amount of total
          approvals returned from the query. Only returns the count and no approval
          objects.
        example: "true"
        explode: true
        in: query
        name: count-only
        required: false
        schema:
          default: false
          type: boolean
        style: form
      - description: "If set to true in the query, the approval requests returned\
          \ will include comments."
        example: "true"
        explode: true
        in: query
        name: include-comments
        required: false
        schema:
          default: false
          type: boolean
        style: form
      - description: "If set to true in the query, the approval requests returned\
          \ will include approvers."
        example: "true"
        explode: true
        in: query
        name: include-approvers
        required: false
        schema:
          default: false
          type: boolean
        style: form
      - description: "If set to true in the query, the approval requests returned\
          \ will include reassignment history."
        example: "true"
        explode: true
        in: query
        name: include-reassignment-history
        required: false
        schema:
          default: false
          type: boolean
        style: form
      - description: "If set to true in the query, the approval requests returned\
          \ will include batch information."
        example: "true"
        explode: true
        in: query
        name: include-batch-info
        required: false
        schema:
          default: false
          type: boolean
        style: form
      - description: |-
          Filter results using the standard syntax described in [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#filtering-results)

          Filtering is supported for the following fields and operators:

          **status**: *eq, ne, in, co, sw*

          **name**: *eq, ne, in, co, sw*

          **priority**: *eq, ne, in, co, sw*

          **type**: *eq, ne, in, co, sw*

          **medium**: *eq, ne, in, co, sw*

          **description**: *eq, ne, in, co, sw*

          **batchId**: *eq, ne, in, co, sw*

          **createdDate**: *eq, ne, in, co, sw, gt, ge, lt, le*

          **dueDate**: *eq, ne, in, co, sw, gt, ge, lt, le*

          **completedDate**: *eq, ne, in, co, sw, gt, ge, lt, le*

          **search**: *eq, ne, in, co, sw*

          **referenceId**: *eq, ne, in, co, sw*

          **referenceType**: *eq, ne, in, co, sw*

          **referenceName**: *eq, ne, in, co, sw*

          **requestedTargetId**: *eq, ne, in, co, sw*

          **requestedTargetType**: *eq, ne, in, co, sw*

          **requestedTargetName**: *eq, ne, in, co, sw*

          **requestedTargetRequestType**: *eq, ne, in, co, sw*

          **modifiedDate**: *eq, ne, in, co, sw, gt, ge, lt, le*

          **decisionDate**: *eq, ne, in, co, sw, gt, ge, lt, le*

          **approvalId**: *eq, ne, in, co, sw*

          **requesterId**: *eq, ne, in, co, sw*

          **requesteeId**: *eq, ne, in, co, sw*

          **approverId**: *eq, ne, in, co, sw*
        example: filters=status eq "PENDING" and type eq "ACCESS_REQUEST_APPROVAL"
        explode: true
        in: query
        name: filters
        required: false
        schema:
          type: string
        style: form
      - description: |-
          Max number of results to return.
          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: 250
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 250
          format: int32
          maximum: 250
          minimum: 0
          type: integer
        style: form
      - description: |-
          Offset into the full result set. Usually specified with *limit* to paginate through the results.
          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: 0
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          format: int32
          minimum: 0
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/approval-2'
                type: array
          description: List of approvals.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Client Error - Returned if the request body is invalid.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getApprovalsV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getApprovalsV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              examples:
                "500":
                  summary: An example of a 500 response object
                  value:
                    detailCode: 500.0 Internal Fault
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: An internal fault occurred.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Internal Server Error - Returned if there is an unexpected
            error.
      security:
      - userAuth:
        - idn:access-request-approvals:read
        - idn:access-request-administration:read
        - idn:access-request-approvals:manage
      summary: Get approvals
      tags:
      - Approvals
      x-sailpoint-userLevels:
      - APPROVAL_OWNER
  /generic-approvals/v1/{id}:
    get:
      description: |-
        Fetches an approval request by it's approval ID. For lookups by access request ID please use the following:
        /generic-approvals?filters=referenceType+eq+"accessRequestId"+and+referenceId+eq+"12345678901234567890123456789012"
