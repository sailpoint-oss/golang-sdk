  /generic-approvals/v1/{id}/approve:
    post:
      description: |-
        Approves a specified approval request on behalf of the caller. The approval request must be in a state that allows it to be approved. This endpoint does not support access request IDs.
        If called by an admin and the admin is not listed as an approver, the approval request will be reassigned from a random approver to the admin user.
      operationId: approveApprovalV1
      parameters:
      - description: Approval ID that correlates to an existing approval request that
          a user wants to approve.
        example: 38453251-6be2-5f8f-df93-5ce19e295837
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
        x-sailpoint-resource-operation-id: getApprovalsV1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/approvalapproverequest'
        required: false
