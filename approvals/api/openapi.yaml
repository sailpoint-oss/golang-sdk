  /generic-approvals/v1/{id}/reassign:
    post:
      description: Reassigns an approval request to another identity resulting in
        that identity being added as an authorized approver. This endpoint does not
        support access request IDs.
      operationId: updateApprovalsReassignV1
      parameters:
      - description: Approval ID that correlates to an existing approval request that
          a user wants to reassign.
        example: 38453251-6be2-5f8f-df93-5ce19e295837
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
        x-sailpoint-resource-operation-id: getApprovalsV1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/approvalreassignrequest'
        required: true
