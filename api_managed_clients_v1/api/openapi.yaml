          type: string
        clusterId:
          description: Cluster ID the health report belongs to
          example: c2a2139cbc754e42b4279a69ec5f58ec
          type: string
        apiUser:
          description: API user ID sending the health data
          example: 9fe8f1cc-2fd2-4675-a8cf-af4b43488ca2
          type: string
