openapi: 3.0.1
info:
  contact:
    name: Developer Relations
    url: https://developer.sailpoint.com/discuss/api-help
  description: "Use these APIs to interact with the Identity Security Cloud platform\
    \ to achieve repeatable, automated processes with greater scalability. We encourage\
    \ you to join the SailPoint Developer Community forum at https://developer.sailpoint.com/discuss\
    \ to connect with other developers using our APIs."
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://developer.sailpoint.com/discuss/tos
  title: Identity Security Cloud API - Prompt Insights
  version: v1
servers:
- description: This is the production API server.
  url: "https://{tenant}.api.identitynow.com"
  variables:
    tenant:
      default: sailpoint
      description: "This is the name of your tenant, typically your company's name."
- description: This is the versioned API server.
  url: "https://{apiUrl}"
  variables:
    apiUrl:
      default: sailpoint.api.identitynow.com
      description: This is the api url of your tenant
security:
- userAuth:
  - sp:scopes:all
tags:
- description: |
    Use this API to retrieve prompt security insights and aggregate metrics for AI agent prompt activity.
    With this functionality in place, administrators can review prompt events and their policy decisions,
    filter insights by policy decision, category, severity, and other attributes, and view summary metrics
    for scanned and redacted prompts over configurable time windows.

    Policy decisions indicate whether a prompt was allowed or redacted. Insight categories include anomalies,
    data uploads, and MCP tool calls. Supported filter fields include policy decision, category, severity,
    user, agent, reason, rule, and policy.
  name: Prompt Insights
paths:
  /prompt-insights/v1/metrics:
    get:
      description: Returns aggregate prompt insights metrics for the requested time
        window.
      operationId: getPromptInsightsMetricsV1
      parameters:
      - description: Relative lookback window for metrics aggregation.
        example: -7d
        explode: true
        in: query
        name: interval
        required: true
        schema:
          enum:
          - -1h
          - -1d
          - -7d
          - -30d
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              example:
                promptsScanned: 125000
                promptsRedacted: 89
              schema:
                $ref: '#/components/schemas/promptinsightsmetrics'
          description: Aggregate prompt insights metrics for the requested interval.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Client Error - Returned if the request body is invalid.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getPromptInsightsMetricsV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getPromptInsightsMetricsV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              examples:
                "500":
                  summary: An example of a 500 response object
                  value:
                    detailCode: 500.0 Internal Fault
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: An internal fault occurred.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Internal Server Error - Returned if there is an unexpected
            error.
      security:
      - userAuth:
        - idn:prompt-insights:read
      - applicationAuth:
        - idn:prompt-insights:read
      summary: Get prompt insights metrics
      tags:
      - Prompt Insights
      x-sailpoint-userLevels:
      - ORG_ADMIN
  /prompt-insights/v1:
    get:
      description: "Returns a paginated list of prompt insights within a lookback\
        \ window, with optional structured filters. Results are sorted by timestamp\
        \ descending (most recent first)."
      operationId: listPromptInsightsV1
      parameters:
      - description: Relative lookback window for prompt insights.
        example: -30d
        explode: true
        in: query
        name: interval
        required: true
        schema:
          enum:
          - -1h
          - -1d
          - -7d
          - -30d
          type: string
        style: form
      - description: |-
          Max number of results to return.
          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: 250
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 250
          format: int32
          maximum: 250
          minimum: 0
          type: integer
        style: form
      - description: |-
          Offset into the full result set. Usually specified with *limit* to paginate through the results.
          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: 0
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          format: int32
          minimum: 0
          type: integer
        style: form
      - description: |-
          Filter results using the standard syntax described in [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#filtering-results)

          Filtering is supported for the following fields and operators:

          **policyDecision**: *eq*

          **category**: *eq*

          **severity**: *eq*

          **user**: *eq, sw, co*

          **agent**: *eq, sw, co*

          **reason**: *eq, sw, co*

          **rule**: *eq, sw, co*

          **policy**: *eq, sw, co*
        example: policyDecision eq "REDACTED" and severity eq "CRITICAL"
        explode: true
        in: query
        name: filters
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              example:
              - timestamp: 2026-05-14T10:01:02.345Z
                user: jdoe@example.com
                agent: ChatGPT
                policyDecision: REDACTED
                category: ANOMALIES
                severity: HIGH
                reason: Policy matched suspicious system override pattern
                rule: Prompt Guard - Clean
                policy: PG-INFO:None
              schema:
                items:
                  $ref: '#/components/schemas/promptinsight'
                type: array
          description: A paginated list of prompt insight events.
          headers:
            X-Total-Count:
              description: "Total matching insights for the interval and filters,\
                \ not limited by limit or offset."
              explode: false
              schema:
                example: 1
                format: int32
                type: integer
              style: simple
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Client Error - Returned if the request body is invalid.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getPromptInsightsMetricsV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getPromptInsightsMetricsV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              examples:
                "500":
                  summary: An example of a 500 response object
                  value:
                    detailCode: 500.0 Internal Fault
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: An internal fault occurred.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Internal Server Error - Returned if there is an unexpected
            error.
      security:
      - userAuth:
        - idn:prompt-insights:read
      - applicationAuth:
        - idn:prompt-insights:read
      summary: List prompt insights
      tags:
      - Prompt Insights
      x-sailpoint-userLevels:
      - ORG_ADMIN
components:
  parameters:
    limit:
      description: |-
        Max number of results to return.
        See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
      example: 250
      explode: true
      in: query
      name: limit
      required: false
      schema:
        default: 250
        format: int32
        maximum: 250
        minimum: 0
        type: integer
      style: form
    offset:
      description: |-
        Offset into the full result set. Usually specified with *limit* to paginate through the results.
        See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
      example: 0
      explode: true
      in: query
      name: offset
      required: false
      schema:
        default: 0
        format: int32
        minimum: 0
        type: integer
      style: form
  responses:
    "400":
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorresponsedto'
      description: Client Error - Returned if the request body is invalid.
    "401":
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/getPromptInsightsMetricsV1_401_response'
      description: "Unauthorized - Returned if there is no authorization header, or\
        \ if the JWT token is expired."
    "403":
      content:
        application/json:
          examples:
            "403":
              summary: An example of a 403 response object
              value:
                detailCode: 403 Forbidden
                trackingId: b21b1f7ce4da4d639f2c62a57171b427
                messages:
                - locale: en-US
                  localeOrigin: DEFAULT
                  text: The server understood the request but refuses to authorize
                    it.
          schema:
            $ref: '#/components/schemas/errorresponsedto'
      description: "Forbidden - Returned if the user you are running as, doesn't have\
        \ access to this end-point."
    "429":
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/getPromptInsightsMetricsV1_429_response'
      description: Too Many Requests - Returned in response to too many requests in
        a given period of time - rate limited. The Retry-After header in the response
        includes how long to wait before trying again.
    "500":
      content:
        application/json:
          examples:
            "500":
              summary: An example of a 500 response object
              value:
                detailCode: 500.0 Internal Fault
                trackingId: b21b1f7ce4da4d639f2c62a57171b427
                messages:
                - locale: en-US
                  localeOrigin: DEFAULT
                  text: An internal fault occurred.
          schema:
            $ref: '#/components/schemas/errorresponsedto'
      description: Internal Server Error - Returned if there is an unexpected error.
  schemas:
    promptinsightsmetrics:
      description: Aggregate prompt insights metrics for the requested time window.
      example:
        promptsScanned: 125000
        promptsRedacted: 89
      properties:
        promptsScanned:
          description: Count of prompts scanned in the interval.
          example: 125000
          format: int64
          minimum: 0
          type: integer
        promptsRedacted:
          description: Count of prompts redacted in the interval.
          example: 89
          format: int64
          minimum: 0
          type: integer
      title: Prompt Insights Metrics
      type: object
    localeorigin:
      description: "An indicator of how the locale was selected. *DEFAULT* means the\
        \ locale is the system default. *REQUEST* means the locale was selected from\
        \ the request context (i.e., best match based on the *Accept-Language* header).\
        \ Additional values may be added in the future without notice."
      enum:
      - DEFAULT
      - REQUEST
      - null
      example: DEFAULT
      nullable: true
      type: string
    errormessagedto:
      example:
        localeOrigin: DEFAULT
        text: The request was syntactically correct but its content is semantically
          invalid.
        locale: en-US
      properties:
        locale:
          description: "The locale for the message text, a BCP 47 language tag."
          example: en-US
          nullable: true
          type: string
        localeOrigin:
          $ref: '#/components/schemas/localeorigin'
        text:
          description: Actual text of the error message in the indicated locale.
          example: The request was syntactically correct but its content is semantically
            invalid.
          type: string
      title: Error Message Dto
      type: object
    errorresponsedto:
      example:
        causes:
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        messages:
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        detailCode: 400.1 Bad Request Content
        trackingId: e7eab60924f64aa284175b9fa3309599
      properties:
        detailCode:
          description: Fine-grained error code providing more detail of the error.
          example: 400.1 Bad Request Content
          type: string
        trackingId:
          description: Unique tracking id for the error.
          example: e7eab60924f64aa284175b9fa3309599
          type: string
        messages:
          description: Generic localized reason for error
          items:
            $ref: '#/components/schemas/errormessagedto'
          type: array
        causes:
          description: Plain-text descriptive reasons to provide additional detail
            to the text provided in the messages field
          items:
            $ref: '#/components/schemas/errormessagedto'
          type: array
      title: Error Response Dto
      type: object
    promptinsight:
      description: A prompt security insight event.
      example:
        severity: HIGH
        reason: Policy matched suspicious system override pattern
        agent: ChatGPT
        policyDecision: REDACTED
        rule: Prompt Guard - Clean
        category: ANOMALIES
        user: john.doe@mail.com
        timestamp: 2026-05-14T10:01:02.345Z
        policy: PG-INFO:None
      properties:
        timestamp:
          description: Event time in UTC.
          example: 2026-05-14T10:01:02.345Z
          format: date-time
          type: string
        user:
          description: User identifier or display name.
          example: john.doe@mail.com
          type: string
        agent:
          description: The AI agent that processed the prompt.
          example: ChatGPT
          type: string
        policyDecision:
          description: The policy decision applied to the prompt.
          enum:
          - ALLOWED
          - REDACTED
          example: REDACTED
          type: string
        category:
          description: The category of the prompt security finding.
          enum:
          - ANOMALIES
          - DATA_UPLOADS
          - MCP_TOOL_CALLS
          example: ANOMALIES
          type: string
        severity:
          description: The severity of the prompt security finding.
          enum:
          - LOW
          - MEDIUM
          - HIGH
          - CRITICAL
          example: HIGH
          type: string
        reason:
          description: Human-readable or structured reason for the policy decision.
          example: Policy matched suspicious system override pattern
          type: string
        rule:
          description: The rule that matched the prompt.
          example: Prompt Guard - Clean
          type: string
        policy:
          description: The policy that matched the prompt.
          example: PG-INFO:None
          type: string
      title: Prompt Insight
      type: object
    getPromptInsightsMetricsV1_401_response:
      example:
        error: "JWT validation failed: JWT is expired"
      properties:
        error:
          description: A message describing the error
          example: "JWT validation failed: JWT is expired"
      type: object
    getPromptInsightsMetricsV1_429_response:
      example:
        message: ' Rate Limit Exceeded '
      properties:
        message:
          description: A message describing the error
          example: ' Rate Limit Exceeded '
      type: object
