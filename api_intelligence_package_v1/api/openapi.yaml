openapi: 3.0.1
info:
  contact:
    name: Developer Relations
    url: https://developer.sailpoint.com/discuss/api-help
  description: "Use these APIs to interact with the Identity Security Cloud platform\
    \ to achieve repeatable, automated processes with greater scalability. We encourage\
    \ you to join the SailPoint Developer Community forum at https://developer.sailpoint.com/discuss\
    \ to connect with other developers using our APIs."
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://developer.sailpoint.com/discuss/tos
  title: Identity Security Cloud API - Intelligence Package
  version: v1
servers:
- description: This is the production API server.
  url: "https://{tenant}.api.identitynow.com"
  variables:
    tenant:
      default: sailpoint
      description: "This is the name of your tenant, typically your company's name."
- description: This is the versioned API server.
  url: "https://{apiUrl}"
  variables:
    apiUrl:
      default: sailpoint.api.identitynow.com
      description: This is the api url of your tenant
security:
- userAuth:
  - sp:scopes:all
tags:
- description: |
    Read-only HTTP API that returns the Intelligence Package (identity context)
    for SecOps enrichment use cases (SIEM/SOAR connectors, MCP, browser
    extension). Backed by Atlas internal-REST calls to MICE, Shelby List Accounts,
    SDS Search, and identity-history.
  name: Intelligence Package
paths:
  /intelligence/v1/identities:
    get:
      description: "Requires tenant license idn:response-and-remediation.\n\nReturns\
        \ the Intelligence Package envelope for the identity that matches the SCIM-style\
        \ filters expression.\nSupported queryable fields are id and email only.\n\
        \nA single match returns HTTP 200 with IntelIdentityResponse.\n\nZero matches\
        \ returns HTTP 404 with detailCode IDC_IDENTITY_NOT_FOUND. \n\nMultiple matches\
        \ returns HTTP 409 with detailCode IDC_IDENTITY_AMBIGUOUS and candidates listing\
        \ each match.\n"
      operationId: searchIntelIdentitiesV1
      parameters:
      - description: |-
          Filter results using the standard syntax described in [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#filtering-results)

          Filtering is supported for the following fields and operators:

          **id**: *eq*

          **email**: *eq*
        examples:
          byId:
            value: id eq "00000000-0000-0000-0000-000000000000"
          byEmail:
            value: email eq "user@example.com"
        explode: true
        in: query
        name: filters
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              examples:
                human:
                  value:
                    id: 00000000-0000-0000-0000-000000000000
                    type: HUMAN
                    displayName: Pat Example
                    subtype: Employee
                    timestamps:
                      createdAt: 2026-05-12T08:00:00Z
                      modifiedAt: 2026-05-12T09:15:30Z
                    human:
                      alias: pat.example
                      email: pat@example.com
                      identityStatus: ENABLED
                      isProtected: false
                      isManager: false
                    _links:
                      access:
                        href: /v2026/intelligence/identities/00000000-0000-0000-0000-000000000000/access
                      accessHistory:
                        href: /v2026/intelligence/identities/00000000-0000-0000-0000-000000000000/access-history
                machine:
                  value:
                    id: e1feccee-a9d4-4909-8131-6ed67d79ff07
                    type: MACHINE
                    displayName: DEMO_AGENT1
                    subtype: AI Agent
                    timestamps:
                      createdAt: 2026-03-31T08:20:53.031936Z
                      modifiedAt: 2026-03-31T08:20:52.969356Z
                    machine:
                      nativeIdentity: DEMO_AGENT1
                      sourceId: 8433902684054f09ae024c06cf5091c1
                      source:
                        id: 8433902684054f09ae024c06cf5091c1
                        name: Snowflake SaaS - Suraj2
                        type: SOURCE
                      existsOnSource: true
                      manuallyCreated: false
                      manuallyEdited: false
              schema:
                $ref: '#/components/schemas/intelidentityresponse'
          description: One identity matched.
        "400":
          content:
            application/json:
              example:
                detailCode: INVALID_REQUEST
                message: filters must be supplied and non-empty
              schema:
                $ref: '#/components/schemas/errorbody'
          description: Missing or invalid filters.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/searchIntelIdentitiesV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "404":
          content:
            application/json:
              example:
                detailCode: IDC_IDENTITY_NOT_FOUND
                message: no identity matched the supplied filter
              schema:
                $ref: '#/components/schemas/intelidentitynotfoundbody'
          description: No identity matched the filter.
        "409":
          content:
            application/json:
              example:
                detailCode: IDC_IDENTITY_AMBIGUOUS
                message: multiple identities matched the supplied filter
                candidates:
                - id: cand-1
                  displayName: Pat A
                - id: cand-2
                  displayName: Pat B
              schema:
                $ref: '#/components/schemas/intelidentityambiguousbody'
          description: Multiple identities matched the filter.
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/searchIntelIdentitiesV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorbody'
          description: Upstream or internal failure.
      security:
      - userAuth:
        - sp:identity-sec-intel:read
      - applicationAuth:
        - sp:identity-sec-intel:read
      summary: Resolve one identity by filter
      tags:
      - Intelligence Package
      x-required-right: sp:identity-sec-intel:read
      x-sailpoint-userLevels:
      - Any
  /intelligence/v1/identities/{identityID}/access:
    get:
      description: |
        Requires tenant license idn:response-and-remediation.

        Client-facing pagination (limit, offset, count) is not supported on this route.
        The service issues one Shelby List Accounts request at the upstream maximum page size
        and one SDS Search request per identity.
      operationId: getIntelIdentityAccessV1
      parameters:
      - description: Non-empty identity id path segment for Intelligence Package sub-resources.
        example: ef38f94347e94562b5bb8424a56397d8
        explode: false
        in: path
        name: identityID
        required: true
        schema:
          maxLength: 128
          minLength: 1
          pattern: "^([0-9a-fA-F]{32}|[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12})$"
          type: string
        style: simple
        x-sailpoint-resource-operation-id: listIdentities
      responses:
        "200":
          content:
            application/json:
              example:
                accounts:
                - id: acc-1
                  name: pat.example
                  source:
                    id: src-1
                    name: Active Directory
                  disabled: false
                  locked: false
                  uncorrelated: false
                  authoritative: false
                  systemAccount: false
                  isMachine: false
                  hasEntitlements: true
                  manuallyCorrelated: false
                  connectionType: direct
                  nativeIdentity: "CN=pat,OU=users"
                  created: 2026-01-01T00:00:00Z
                  modified: 2026-05-01T00:00:00Z
                privilegedAccessItems:
                - privileged: true
                  displayName: Absence_Administrator
                  name: Absence_Administrator
                  standalone: true
                  id: ent-1
                  source:
                    name: Workday
                    id: src-2
                  attribute: USER_BASED_SECURITY_GROUPS
                  type: ENTITLEMENT
                  value: Absence_Administrator
              schema:
                $ref: '#/components/schemas/intelidentityaccessbody'
          description: Accounts response.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorbody'
          description: Invalid path parameter.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/searchIntelIdentitiesV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/searchIntelIdentitiesV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorbody'
          description: Internal or upstream server failure.
        "4XX":
          description: Upstream non-success passed through as-is.
      security:
      - userAuth:
        - sp:identity-sec-intel-access:read
      - applicationAuth:
        - sp:identity-sec-intel-access:read
      summary: Accounts merged with privileged data
      tags:
      - Intelligence Package
      x-required-right: sp:identity-sec-intel-access:read
      x-sailpoint-userLevels:
      - Any
  /intelligence/v1/identities/{identityID}/access-history:
    get:
      description: |
        Requires tenant license idn:response-and-remediation.

        Events are relayed from identity-history; optional limit, offset, and count
        are forwarded to the upstream when supplied.
      operationId: getIntelIdentityAccessHistoryV1
      parameters:
      - description: Non-empty identity id path segment for Intelligence Package sub-resources.
        example: ef38f94347e94562b5bb8424a56397d8
        explode: false
        in: path
        name: identityID
        required: true
        schema:
          maxLength: 128
          minLength: 1
          pattern: "^([0-9a-fA-F]{32}|[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12})$"
          type: string
        style: simple
        x-sailpoint-resource-operation-id: listIdentities
      - description: Maximum number of historical events to return in this page of
          results.
        example: 100
        explode: true
        in: query
        name: limit
        required: false
        schema:
          format: int32
          minimum: 1
          type: integer
        style: form
      - description: Zero-based index of the first event row to return for pagination.
        example: 0
        explode: true
        in: query
        name: offset
        required: false
        schema:
          format: int32
          minimum: 0
          type: integer
        style: form
      - description: "When true, the service may include total count metadata alongside\
          \ the result list."
        example: false
        explode: true
        in: query
        name: count
        required: false
        schema:
          default: false
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              example:
                events:
                - dateTime: 2026-05-04T12:00:00Z
                  eventType: ACCESS_GRANTED
                  identityId: 00000000-0000-0000-0000-000000000000
                - dateTime: 2026-05-06T08:00:00Z
                  eventType: ACCESS_REVOKED
                  identityId: 00000000-0000-0000-0000-000000000000
              schema:
                $ref: '#/components/schemas/intelidentityaccesshistorybody'
          description: Events relayed from identity-history.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorbody'
          description: Invalid path or query parameters.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/searchIntelIdentitiesV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/searchIntelIdentitiesV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorbody'
          description: Internal or upstream server failure.
        "4XX":
          description: Upstream non-success passed through as-is.
      security:
      - userAuth:
        - sp:identity-sec-intel-access-history:read
      - applicationAuth:
        - sp:identity-sec-intel-access-history:read
      summary: Return identity access-history events
      tags:
      - Intelligence Package
      x-required-right: sp:identity-sec-intel-access-history:read
      x-sailpoint-userLevels:
      - Any
components:
  parameters:
    intelligence-identity-id-path:
      description: Non-empty identity id path segment for Intelligence Package sub-resources.
      example: ef38f94347e94562b5bb8424a56397d8
      explode: false
      in: path
      name: identityID
      required: true
      schema:
        maxLength: 128
        minLength: 1
        pattern: "^([0-9a-fA-F]{32}|[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12})$"
        type: string
      style: simple
      x-sailpoint-resource-operation-id: listIdentities
  responses:
    "401":
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/searchIntelIdentitiesV1_401_response'
      description: "Unauthorized - Returned if there is no authorization header, or\
        \ if the JWT token is expired."
    "403":
      content:
        application/json:
          examples:
            "403":
              summary: An example of a 403 response object
              value:
                detailCode: 403 Forbidden
                trackingId: b21b1f7ce4da4d639f2c62a57171b427
                messages:
                - locale: en-US
                  localeOrigin: DEFAULT
                  text: The server understood the request but refuses to authorize
                    it.
          schema:
            $ref: '#/components/schemas/errorresponsedto'
      description: "Forbidden - Returned if the user you are running as, doesn't have\
        \ access to this end-point."
    "429":
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/searchIntelIdentitiesV1_429_response'
      description: Too Many Requests - Returned in response to too many requests in
        a given period of time - rate limited. The Retry-After header in the response
        includes how long to wait before trying again.
  schemas:
    intelidentitytimestamps:
      properties:
        createdAt:
          description: Timestamp when the identity record was first created in Identity
            Security Cloud.
          example: 2024-01-15T10:30:00Z
          format: date-time
          type: string
        modifiedAt:
          description: Timestamp when the identity record was last modified in Identity
            Security Cloud.
          example: 2024-06-20T14:45:00Z
          format: date-time
          type: string
      required:
      - createdAt
      - modifiedAt
      type: object
    intelhuman:
      properties:
        alias:
          description: Primary login or account alias for the human identity.
          example: jdoe
          type: string
        email:
          description: Primary business email address for the human identity.
          example: john.doe@example.com
          format: email
          type: string
        identityStatus:
          description: Current identity lifecycle status label from Identity Security
            Cloud.
          example: Active
          type: string
        lifecycleState:
          description: Lifecycle state name assigned through provisioning policy when
            present.
          example: contractor
          nullable: true
          type: string
        processingState:
          description: Processing state for outstanding identity change operations
            when present.
          example: pending
          nullable: true
          type: string
        isProtected:
          description: True when the identity is marked protected from automated changes.
          example: false
          type: boolean
        manager:
          description: Legacy manager identity identifier or display reference when
            assigned.
          example: ef38f94347e94562b5bb8424a56397d9
          nullable: true
          type: string
        managerId:
          description: Manager identity identifier when correlated in Identity Security
            Cloud.
          example: ef38f94347e94562b5bb8424a56397d9
          nullable: true
          type: string
        managerName:
          description: Manager display name when available from identity services.
          example: Alex Manager
          nullable: true
          type: string
        isManager:
          description: True when the identity is flagged as a people manager in the
            organization.
          example: true
          type: boolean
        lastRefreshAt:
          description: Timestamp of the last successful identity refresh from sources
            when known.
          example: 2024-05-01T08:00:00Z
          format: date-time
          nullable: true
          type: string
      required:
      - alias
      - email
      - identityStatus
      - isManager
      - isProtected
      type: object
    intelmachinesource:
      properties:
        id:
          description: Unique identifier of the correlated source in Identity Security
            Cloud.
          example: 2c9180835d2e5168015d32f890301e89
          type: string
        name:
          description: Display name of the source as configured in Identity Security
            Cloud.
          example: Active Directory
          type: string
        type:
          description: Connector or source type classification for the backing system.
          example: LDAP
          type: string
      type: object
    intelmachine:
      description: MACHINE-specific block; subtype is only on the top-level IntelIdentityResponse.
      properties:
        businessApplication:
          description: Business application name associated with the non-human identity.
          example: Payroll Bot
          type: string
        nativeIdentity:
          description: Native identifier value on the authoritative source for the
            machine identity.
          example: DEMO_AGENT1
          type: string
        uuid:
          description: Optional globally unique identifier for the machine identity
            when assigned.
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
          nullable: true
          type: string
        sourceId:
          description: Identifier of the correlated source for this machine identity.
          example: 8433902684054f09ae024c06cf5091c1
          type: string
        source:
          allOf:
          - $ref: '#/components/schemas/intelmachinesource'
          description: Correlated source summary for the machine identity when available.
          type: object
        datasetId:
          description: Dataset identifier used by machine identity correlation logic.
          example: dataset-001
          type: string
        existsOnSource:
          default: false
          description: True when a matching account still exists on the connected
            source.
          example: true
          type: boolean
        manuallyCreated:
          default: false
          description: True when the machine identity was created through a manual
            administrative action.
          example: false
          type: boolean
        manuallyEdited:
          default: false
          description: True when the machine identity attributes were manually edited
            after creation.
          example: false
          type: boolean
        owners:
          description: Structured owner references for the machine identity when populated
            by the service.
          example: {}
          type: object
        userEntitlements:
          description: Entitlements or fine-grained rights linked to the machine identity
            when available.
          items:
            description: Opaque entitlement payload element returned from upstream
              services.
            example: {}
            type: object
          type: array
      type: object
    intelhref:
      properties:
        href:
          description: Target URI for the related Intelligence Package sub-resource
            or operation.
          example: /v2026/intelligence/identities/ef38f94347e94562b5bb8424a56397d8/access
          type: string
      required:
      - href
      type: object
    intelidentitylinks:
      properties:
        access:
          allOf:
          - $ref: '#/components/schemas/intelhref'
          description: Hyperlink to the Intelligence Package access document for this
            identity.
          example:
            href: /v2026/intelligence/identities/ef38f94347e94562b5bb8424a56397d8/access
          type: object
        accessHistory:
          allOf:
          - $ref: '#/components/schemas/intelhref'
          description: Hyperlink to the Intelligence Package access history document
            for this identity.
          example:
            href: /v2026/intelligence/identities/ef38f94347e94562b5bb8424a56397d8/access-history
          type: object
      required:
      - access
      - accessHistory
      type: object
    intelidentityresponse:
      description: |
        HUMAN responses include human, top-level subtype (NERM classification:
        Employee, Non Employee, or Cannot Determine), and _links (access and accessHistory only).
        MACHINE responses include machine and top-level subtype (connector subtype string);
        _links is omitted.
      example:
        subtype: Employee
        _links: "{}"
        displayName: Jane Example
        timestamps: "{}"
        machine: "{}"
        description: Contractor identity for example project work.
        owners: governance-group-001
        attributes:
          department: Engineering
          region: US
        id: ef38f94347e94562b5bb8424a56397d8
        type: HUMAN
        human: "{}"
      properties:
        id:
          description: Identity Security Cloud identifier for this identity.
          example: ef38f94347e94562b5bb8424a56397d8
          type: string
        type:
          description: Discriminator indicating whether this identity is human or
            machine backed.
          enum:
          - HUMAN
          - MACHINE
          example: HUMAN
          type: string
        displayName:
          description: Preferred display name for the identity across administrative
            experiences.
          example: Jane Example
          type: string
        description:
          description: Optional free-text description assigned to the identity profile
            when present.
          example: Contractor identity for example project work.
          nullable: true
          type: string
        subtype:
          description: |
            For HUMAN identities, NERM classification (Employee, Non Employee, or Cannot Determine).
            For MACHINE identities, connector subtype string from the authoritative source.
          example: Employee
          nullable: true
          type: string
        owners:
          description: Serialized owner reference information when populated by upstream
            identity services.
          example: governance-group-001
          nullable: true
          type: string
        attributes:
          additionalProperties: true
          description: Arbitrary SCIM-style attribute bag returned for the identity
            context view.
          example:
            department: Engineering
            region: US
          type: object
        timestamps:
          allOf:
          - $ref: '#/components/schemas/intelidentitytimestamps'
          description: Created and modified timestamps for the identity record in
            Identity Security Cloud.
          type: object
        human:
          allOf:
          - $ref: '#/components/schemas/intelhuman'
          description: Human identity extension payload when type is HUMAN.
          nullable: true
          type: object
        machine:
          allOf:
          - $ref: '#/components/schemas/intelmachine'
          description: Machine identity extension payload when type is MACHINE.
          nullable: true
          type: object
        _links:
          allOf:
          - $ref: '#/components/schemas/intelidentitylinks'
          description: Hyperlinks to related Intelligence Package sub-resources; present
            for HUMAN only.
          nullable: true
          type: object
      required:
      - id
      - timestamps
      - type
      type: object
    errorbody:
      example:
        message: The filters query parameter is required and cannot be empty.
        detailCode: IDC_BAD_REQUEST
      properties:
        detailCode:
          description: Machine-readable error code returned by the Intelligence Package
            service.
          example: IDC_BAD_REQUEST
          type: string
        message:
          description: Human-readable explanation of the error suitable for client
            logging.
          example: The filters query parameter is required and cannot be empty.
          type: string
      type: object
    localeorigin:
      description: "An indicator of how the locale was selected. *DEFAULT* means the\
        \ locale is the system default. *REQUEST* means the locale was selected from\
        \ the request context (i.e., best match based on the *Accept-Language* header).\
        \ Additional values may be added in the future without notice."
      enum:
      - DEFAULT
      - REQUEST
      - null
      example: DEFAULT
      nullable: true
      type: string
    errormessagedto:
      example:
        localeOrigin: DEFAULT
        text: The request was syntactically correct but its content is semantically
          invalid.
        locale: en-US
      properties:
        locale:
