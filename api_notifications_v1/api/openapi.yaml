          nullable: true
          type: string
        email:
          description: The verified sender email address
          example: sender@example.com
          type: string
        isVerifiedByDomain:
          default: false
          description: Whether the sender address is verified by domain
          example: false
          type: boolean
        verificationStatus:
          description: The verification status of the sender address
          enum:
          - PENDING
          - SUCCESS
          - FAILED
          - NA
          example: SUCCESS
          type: string
        region:
          description: The AWS SES region the sender address is associated with
          example: us-east-1
          nullable: true
          type: string
