openapi: 3.0.1
info:
  contact:
    name: Developer Relations
    url: https://developer.sailpoint.com/discuss/api-help
  description: "Use these APIs to interact with the Identity Security Cloud platform\
    \ to achieve repeatable, automated processes with greater scalability. We encourage\
    \ you to join the SailPoint Developer Community forum at https://developer.sailpoint.com/discuss\
    \ to connect with other developers using our APIs."
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://developer.sailpoint.com/discuss/tos
  title: Identity Security Cloud API - Notifications
  version: v1
servers:
- description: This is the production API server.
  url: "https://{tenant}.api.identitynow.com"
  variables:
    tenant:
      default: sailpoint
      description: "This is the name of your tenant, typically your company's name."
- description: This is the versioned API server.
  url: "https://{apiUrl}"
  variables:
    apiUrl:
      default: sailpoint.api.identitynow.com
      description: This is the api url of your tenant
security:
- userAuth:
  - sp:scopes:all
tags:
- name: Notifications
paths:
  /notification-template-variables/v1/{key}/{medium}:
    get:
      description: |
        Returns global variables and template-specific variables for a given notification template key and medium.
        Use these variable names in template content; they are replaced at send time with the corresponding values.
        Variable lists can be sorted by key, type, or description via the sorters query parameter (default ascending by key).
      operationId: getNotificationTemplateVariablesV1
      parameters:
      - description: |-
          Sort results using the standard syntax described in [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#sorting-results)

          Sorting is supported for the following fields: **key, type, description**
        example: -description
        explode: true
        in: query
        name: sorters
        required: false
        schema:
          format: comma-separated
          type: string
        style: form
      - description: |
          The notification template key. Valid keys (and key/medium pairs) are available from the list notification templates operation.
        example: approval_request_notification
        explode: false
        in: path
        name: key
        required: true
        schema:
          type: string
        style: simple
        x-sailpoint-resource-operation-id: listNotificationTemplates
      - description: |
          The notification template medium (e.g. EMAIL, SLACK, TEAMS). Valid key/medium pairs are available from the list notification templates operation.
        example: EMAIL
        explode: false
        in: path
        name: medium
        required: true
        schema:
          enum:
          - EMAIL
          - SLACK
          - TEAMS
          type: string
        style: simple
        x-sailpoint-resource-operation-id: listNotificationTemplates
      responses:
        "200":
          content:
            application/json:
              example:
                key: approval_request_notification
                medium: EMAIL
                globalVariables:
                - key: __esc.html()
                  type: function
                  description: "Escapes the characters in a string using HTML entities\
                    \ (e.g. &quot;, &amp;)."
                  example: $__esc.html($value)
                - key: __global.productName
                  type: string
                  description: The human-readable name of the product or application.
                  example: SailPoint Identity Security Cloud
                - key: __global.standardLogoURL
                  type: string
                  description: URL for the standard size logo displayed on various
                    pages.
                  example: null
                templateVariables:
                - key: approvalName
                  type: string
                  description: Display name of the approval request
                  example: Request for Access to Sales Application
                - key: requester
                  type: object
                  description: Identity who submitted the approval request
                  example:
                    identityID: 4701645331ee4e578ca7884da99452fc
                    type: IDENTITY
                    name: Rebecca Requester
                    email: rebecca@testmail.identitysoon.com
              schema:
                $ref: '#/components/schemas/templatevariablesdto'
          description: Global and template-specific variables for the given key and
            medium.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Client Error - Returned if the request body is invalid.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getNotificationTemplateVariablesV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "404":
          content:
            application/json:
              examples:
                "404":
                  summary: An example of a 404 response object
                  value:
                    detailCode: 404 Not found
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server did not find a current representation for the
                        target resource.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Not Found - returned if the request URL refers to a resource
            or object that does not exist
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getNotificationTemplateVariablesV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              examples:
                "500":
                  summary: An example of a 500 response object
                  value:
                    detailCode: 500.0 Internal Fault
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: An internal fault occurred.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Internal Server Error - Returned if there is an unexpected
            error.
      security:
      - userAuth:
        - idn:notification-templates:read
      summary: Get notification template variables
      tags:
      - Notifications
      x-sailpoint-userLevels:
      - ORG_ADMIN
      - USER
