      description: "This will update notification templates that are available in\
        \ your tenant. \nNote that you cannot create new templates in your tenant,\
        \ but you can use this to create custom notifications from existing templates.\
        \  First, copy the response body from the [get notification template endpoint](https://developer.sailpoint.com/idn/api/beta/get-notification-template)\
