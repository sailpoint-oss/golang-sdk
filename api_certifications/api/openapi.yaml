        \ so its appearance can vary largely between different clients/customers."
      example:
        rights: HereIsRight1
        target: SYS.GV_$TRANSACTION
      properties:
        rights:
          description: All the rights (e.g. actions) that this permission allows on
            the target
          example: HereIsRight1
          items:
