          type: string
        style: simple
      requestBody:
        content:
          application/json-patch+json:
            example:
            - op: replace
              path: /pruneThreshold
              value: "83"
            - op: replace
              path: /minNumIdentitiesInPotentialRole
              value: "10"
            - op: replace
              path: /saved
              value: "false"
            - op: replace
              path: /name
              value: RM Session - 07/10/22
            - op: add
              path: /name
              value: RM Session - 07/10/22
            schema:
              items:
                $ref: '#/components/schemas/jsonpatchoperation'
              type: array
