      description: Returns all role mining sessions that match the query parameters
      operationId: getRoleMiningSessionsV1
      parameters:
      - description: |-
          Filter results using the standard syntax described in [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#filtering-results)

          Filtering is supported for the following fields and operators:

          **saved**: *eq*

          **name**: *eq, sw*
        example: saved eq "true" and name sw "RM Session"
        explode: true
        in: query
        name: filters
        required: false
        schema:
          type: string
        style: form
      - description: |-
          Sort results using the standard syntax described in [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#sorting-results)

          Sorting is supported for the following fields: **createdBy, createdDate**
        example: "createdBy,createdDate"
        explode: true
        in: query
        name: sorters
        required: false
        schema:
          format: comma-separated
          type: string
        style: form
      - description: |-
          Offset into the full result set. Usually specified with *limit* to paginate through the results.
          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: 0
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          format: int32
          minimum: 0
          type: integer
        style: form
      - description: |-
          Max number of results to return.
          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: 250
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 250
          format: int32
          maximum: 250
          minimum: 0
          type: integer
        style: form
      - description: |-
          If *true* it will populate the *X-Total-Count* response header with the number of results that would be returned if *limit* and *offset* were ignored.

          Since requesting a total count can have a performance impact, it is recommended not to send **count=true** if that value will not be used.

          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: true
        explode: true
        in: query
        name: count
        required: false
        schema:
          default: false
          type: boolean
        style: form
      - description: Use this header to enable this experimental API.
        example: true
        explode: false
        in: header
        name: X-SailPoint-Experimental
        required: true
        schema:
          default: "true"
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/roleminingsessiondto'
                type: array
          description: Succeeded. Returns all role mining sessions that match the
            query parameters.
        "400":
