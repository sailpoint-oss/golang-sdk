openapi: 3.0.1
info:
  contact:
    name: Developer Relations
    url: https://developer.sailpoint.com/discuss/api-help
  description: "Use these APIs to interact with the Identity Security Cloud platform\
    \ to achieve repeatable, automated processes with greater scalability. We encourage\
    \ you to join the SailPoint Developer Community forum at https://developer.sailpoint.com/discuss\
    \ to connect with other developers using our APIs."
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://developer.sailpoint.com/discuss/tos
  title: Identity Security Cloud API - Org Config
  version: v1
servers:
- description: This is the production API server.
  url: "https://{tenant}.api.identitynow.com"
  variables:
    tenant:
      default: sailpoint
      description: "This is the name of your tenant, typically your company's name."
- description: This is the versioned API server.
  url: "https://{apiUrl}"
  variables:
    apiUrl:
      default: sailpoint.api.identitynow.com
      description: This is the api url of your tenant
security:
- userAuth:
  - sp:scopes:all
tags:
- description: "Use this API to implement organization configuration functionality.\
    \ \nAdministrators can use this functionality to manage organization settings,\
    \ such as time zones. \n"
  name: Org Config
paths:
  /org-config/v1:
    get:
      description: "Get the current organization's configuration settings, only external\
        \ accessible properties."
      operationId: getOrgConfigV1
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/orgconfig'
          description: Request succeeded.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Client Error - Returned if the request body is invalid.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getOrgConfigV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "404":
          content:
            application/json:
              examples:
                "404":
                  summary: An example of a 404 response object
                  value:
                    detailCode: 404 Not found
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server did not find a current representation for the
                        target resource.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Not Found - returned if the request URL refers to a resource
            or object that does not exist
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getOrgConfigV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              examples:
                "500":
                  summary: An example of a 500 response object
                  value:
                    detailCode: 500.0 Internal Fault
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: An internal fault occurred.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Internal Server Error - Returned if there is an unexpected
            error.
      security:
      - userAuth:
        - idn:org-configs:read
        - idn:org-configs:manage
      - applicationAuth:
        - idn:org-configs:read
        - idn:org-configs:manage
      summary: Get org config settings
      tags:
      - Org Config
      x-sailpoint-userLevels:
      - ORG_ADMIN
    patch:
      description: "Patch the current organization's configuration, using http://jsonpatch.com/\
        \ syntax. This is commonly used to changing an organization's time zone."
      operationId: patchOrgConfigV1
      requestBody:
        content:
          application/json-patch+json:
            example:
            - op: replace
              path: /timeZone
              value: America/Toronto
            schema:
              items:
                $ref: '#/components/schemas/jsonpatchoperation'
              type: array
        description: "A list of schema attribute update operations according to the\
          \ [JSON Patch](https://tools.ietf.org/html/rfc6902) standard."
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/orgconfig'
          description: Successfully patched org config.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Client Error - Returned if the request body is invalid.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getOrgConfigV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "404":
          content:
            application/json:
              examples:
                "404":
                  summary: An example of a 404 response object
                  value:
                    detailCode: 404 Not found
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server did not find a current representation for the
                        target resource.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Not Found - returned if the request URL refers to a resource
            or object that does not exist
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getOrgConfigV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              examples:
                "500":
                  summary: An example of a 500 response object
                  value:
                    detailCode: 500.0 Internal Fault
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: An internal fault occurred.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Internal Server Error - Returned if there is an unexpected
            error.
      security:
      - userAuth:
        - idn:org-configs:manage
      summary: Patch org config
      tags:
      - Org Config
      x-sailpoint-userLevels:
      - ORG_ADMIN
  /org-config/v1/valid-time-zones:
    get:
      description: List the valid time zones that can be set in organization configurations.
      operationId: getValidTimeZonesV1
      parameters:
      - description: Use this header to enable this experimental API.
        example: true
        explode: false
        in: header
        name: X-SailPoint-Experimental
        required: true
        schema:
          default: "true"
          type: string
        style: simple
      - description: |-
          Note that for this API the maximum value for limit is 50.
          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: 50
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 50
          format: int32
          maximum: 50
          minimum: 0
          type: integer
        style: form
      - description: |-
          Offset into the full result set. Usually specified with *limit* to paginate through the results.
          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: 0
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          format: int32
          minimum: 0
          type: integer
        style: form
      - description: |-
          If *true* it will populate the *X-Total-Count* response header with the number of results that would be returned if *limit* and *offset* were ignored.

          Since requesting a total count can have a performance impact, it is recommended not to send **count=true** if that value will not be used.

          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: true
        explode: true
        in: query
        name: count
        required: false
        schema:
          default: false
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              example:
              - Etc/GMT-6
              - Etc/GMT+8
              - EST
              - America/Chicago
              - America/Toronto
              - Asia/Gaza
              - Europe/Brussels
              - Europe/Kiev
              schema:
                items:
                  type: string
                type: array
          description: Request successful.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Client Error - Returned if the request body is invalid.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getOrgConfigV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getOrgConfigV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              examples:
                "500":
                  summary: An example of a 500 response object
                  value:
                    detailCode: 500.0 Internal Fault
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: An internal fault occurred.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Internal Server Error - Returned if there is an unexpected
            error.
      security:
      - userAuth:
        - idn:org-configs:read
        - idn:org-configs-user:read
      - applicationAuth:
        - idn:org-configs:read
        - idn:org-configs-user:read
      summary: Get valid time zones
      tags:
      - Org Config
      x-sailpoint-userLevels:
      - ORG_ADMIN
components:
  parameters:
    limit50:
      description: |-
        Note that for this API the maximum value for limit is 50.
        See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
      example: 50
      explode: true
      in: query
      name: limit
      required: false
      schema:
        default: 50
        format: int32
        maximum: 50
        minimum: 0
        type: integer
      style: form
    offset:
      description: |-
        Offset into the full result set. Usually specified with *limit* to paginate through the results.
        See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
      example: 0
      explode: true
      in: query
      name: offset
      required: false
      schema:
        default: 0
        format: int32
        minimum: 0
        type: integer
      style: form
    count:
      description: |-
        If *true* it will populate the *X-Total-Count* response header with the number of results that would be returned if *limit* and *offset* were ignored.

        Since requesting a total count can have a performance impact, it is recommended not to send **count=true** if that value will not be used.

        See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
      example: true
      explode: true
      in: query
      name: count
      required: false
      schema:
        default: false
        type: boolean
      style: form
  responses:
    "400":
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorresponsedto'
      description: Client Error - Returned if the request body is invalid.
    "401":
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/getOrgConfigV1_401_response'
      description: "Unauthorized - Returned if there is no authorization header, or\
        \ if the JWT token is expired."
    "403":
      content:
        application/json:
          examples:
            "403":
              summary: An example of a 403 response object
              value:
                detailCode: 403 Forbidden
                trackingId: b21b1f7ce4da4d639f2c62a57171b427
                messages:
                - locale: en-US
                  localeOrigin: DEFAULT
                  text: The server understood the request but refuses to authorize
                    it.
          schema:
            $ref: '#/components/schemas/errorresponsedto'
      description: "Forbidden - Returned if the user you are running as, doesn't have\
        \ access to this end-point."
    "404":
      content:
        application/json:
          examples:
            "404":
              summary: An example of a 404 response object
              value:
                detailCode: 404 Not found
                trackingId: b21b1f7ce4da4d639f2c62a57171b427
                messages:
                - locale: en-US
                  localeOrigin: DEFAULT
                  text: The server did not find a current representation for the target
                    resource.
          schema:
            $ref: '#/components/schemas/errorresponsedto'
      description: Not Found - returned if the request URL refers to a resource or
        object that does not exist
    "429":
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/getOrgConfigV1_429_response'
      description: Too Many Requests - Returned in response to too many requests in
        a given period of time - rate limited. The Retry-After header in the response
        includes how long to wait before trying again.
    "500":
      content:
        application/json:
          examples:
            "500":
              summary: An example of a 500 response object
              value:
                detailCode: 500.0 Internal Fault
                trackingId: b21b1f7ce4da4d639f2c62a57171b427
                messages:
                - locale: en-US
                  localeOrigin: DEFAULT
                  text: An internal fault occurred.
          schema:
            $ref: '#/components/schemas/errorresponsedto'
      description: Internal Server Error - Returned if there is an unexpected error.
  schemas:
    reportconfigdto:
      example:
        included: false
        required: true
        columnName: SOD Business Name
        order: 2
      properties:
        columnName:
          description: Name of column in report
          example: SOD Business Name
          type: string
        required:
          default: false
          description: "If true, column is required in all reports, and this entry\
            \ is immutable. A 400 error will result from any attempt to modify the\
            \ column's definition."
          example: true
          type: boolean
        included:
          default: false
          description: "If true, column is included in the report. A 400 error will\
            \ be thrown if an attempt is made to set included=false if required==true."
          example: false
          type: boolean
        order:
          description: Relative sort order for the column. Columns will be displayed
            left-to-right in nondecreasing order.
          example: 2
          format: int32
          maximum: 2147483647
          minimum: 0
          type: integer
      title: Report Config DTO
      type: object
    orgconfig:
      description: DTO class for OrgConfig data accessible by customer external org
        admin ("ORG_ADMIN") users
      example:
        armAuth: epiYNTRYA2S7swisDWk1Zv4VMNgvqEjiBh5_ufuCWsma2m-5XADijqBg0ijXLby5nS6lxZNXabhGnAPGeDGc4V3jQKrhwV-UHypRLs8ZLgOjiQNus9NimS0uPdKomRW6TFWqXyfnYd-znNgbbVuwUy9GyD9ebDVJSntPastxSx7UcyGuWBqfNZYpuxKRWe_7TVY60qL55jUqyz8N4XUbbdcxdbZ0uik6ut-Bv90MKTbZexBW_PR4qcgIkaEs4kIenLyBxnGziYo7AO0tJ8bGHO8FJRkibCpAQIt7PISLo7Gg_Xf9j10dKq2YDgy4pPTvz3fE2ZHYnXCXvXFSA-vVag==
        armCustomerId: DE38E75A-5FF6-4A65-5DC7-08D64426B09E
        orgName: acme-solar
        lcsChangeHonorsSourceEnableFeature: false
        armDb: EU
        iaiEnableCertificationRecommendations: true
        timeZone: America/Toronto
        armSsoUrl: https://your-arm-sso-url
        sodReportConfigs:
        - included: false
          required: true
          columnName: SOD Business Name
          order: 2
        - included: false
          required: true
          columnName: SOD Business Name
          order: 2
        armSapSystemIdMappings: "[{\"sourceId\":\"2c91808c791a94e501792388b0d62659\"\
          ,\"systemId\":\"1556\"},{\"sourceId\":\"2_2c91808c791a94e501792388b0d62659\"\
          ,\"systemId\":\"2_1556\"},{\"sourceId\":\"3_2c91808c791a94e501792388b0d62659\"\
          ,\"systemId\":\"3_1556\"}]"
      properties:
        orgName:
          description: The name of the org.
          example: acme-solar
          type: string
        timeZone:
          description: The selected time zone which is to be used for the org.  This
            directly affects when scheduled tasks are executed.  Valid options can
            be found at /beta/org-config/valid-time-zones
          example: America/Toronto
          type: string
        lcsChangeHonorsSourceEnableFeature:
          description: Flag to determine whether the LCS_CHANGE_HONORS_SOURCE_ENABLE_FEATURE
            flag is enabled for the current org.
          example: false
          type: boolean
        armCustomerId:
          description: ARM Customer ID
          example: DE38E75A-5FF6-4A65-5DC7-08D64426B09E
          nullable: true
          type: string
        armSapSystemIdMappings:
          description: A list of IDN::sourceId to ARM::systemId mappings.
          example: "[{\"sourceId\":\"2c91808c791a94e501792388b0d62659\",\"systemId\"\
            :\"1556\"},{\"sourceId\":\"2_2c91808c791a94e501792388b0d62659\",\"systemId\"\
            :\"2_1556\"},{\"sourceId\":\"3_2c91808c791a94e501792388b0d62659\",\"systemId\"\
            :\"3_1556\"}]"
          nullable: true
          type: string
        armAuth:
          description: ARM authentication string
          example: epiYNTRYA2S7swisDWk1Zv4VMNgvqEjiBh5_ufuCWsma2m-5XADijqBg0ijXLby5nS6lxZNXabhGnAPGeDGc4V3jQKrhwV-UHypRLs8ZLgOjiQNus9NimS0uPdKomRW6TFWqXyfnYd-znNgbbVuwUy9GyD9ebDVJSntPastxSx7UcyGuWBqfNZYpuxKRWe_7TVY60qL55jUqyz8N4XUbbdcxdbZ0uik6ut-Bv90MKTbZexBW_PR4qcgIkaEs4kIenLyBxnGziYo7AO0tJ8bGHO8FJRkibCpAQIt7PISLo7Gg_Xf9j10dKq2YDgy4pPTvz3fE2ZHYnXCXvXFSA-vVag==
          nullable: true
          type: string
        armDb:
          description: ARM database name
          example: EU
          nullable: true
          type: string
        armSsoUrl:
          description: ARM SSO URL
          example: https://your-arm-sso-url
          nullable: true
          type: string
        iaiEnableCertificationRecommendations:
          description: Flag to determine whether IAI Certification Recommendations
            are enabled for the current org
          example: true
          type: boolean
        sodReportConfigs:
          items:
            $ref: '#/components/schemas/reportconfigdto'
          type: array
      title: Org Config
      type: object
    localeorigin:
      description: "An indicator of how the locale was selected. *DEFAULT* means the\
        \ locale is the system default. *REQUEST* means the locale was selected from\
        \ the request context (i.e., best match based on the *Accept-Language* header).\
        \ Additional values may be added in the future without notice."
      enum:
      - DEFAULT
      - REQUEST
      - null
      example: DEFAULT
      nullable: true
      type: string
    errormessagedto:
      example:
        localeOrigin: DEFAULT
        text: The request was syntactically correct but its content is semantically
          invalid.
        locale: en-US
      properties:
        locale:
          description: "The locale for the message text, a BCP 47 language tag."
          example: en-US
          nullable: true
          type: string
        localeOrigin:
          $ref: '#/components/schemas/localeorigin'
        text:
          description: Actual text of the error message in the indicated locale.
          example: The request was syntactically correct but its content is semantically
            invalid.
          type: string
      title: Error Message Dto
      type: object
    errorresponsedto:
      example:
        causes:
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        messages:
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        detailCode: 400.1 Bad Request Content
        trackingId: e7eab60924f64aa284175b9fa3309599
      properties:
        detailCode:
          description: Fine-grained error code providing more detail of the error.
          example: 400.1 Bad Request Content
          type: string
        trackingId:
          description: Unique tracking id for the error.
          example: e7eab60924f64aa284175b9fa3309599
          type: string
        messages:
          description: Generic localized reason for error
          items:
            $ref: '#/components/schemas/errormessagedto'
          type: array
        causes:
          description: Plain-text descriptive reasons to provide additional detail
            to the text provided in the messages field
          items:
            $ref: '#/components/schemas/errormessagedto'
          type: array
      title: Error Response Dto
      type: object
    jsonpatchoperation:
      description: "A JSONPatch Operation as defined by [RFC 6902 - JSON Patch](https://tools.ietf.org/html/rfc6902)"
      properties:
        op:
          description: The operation to be performed
          enum:
          - add
          - remove
          - replace
          - move
          - copy
          - test
          example: replace
          type: string
        path:
          description: A string JSON Pointer representing the target path to an element
            to be affected by the operation
          example: /description
          type: string
        value:
          $ref: '#/components/schemas/jsonpatchoperation_value'
      required:
      - op
      - path
      title: Json Patch Operation
      type: object
    getOrgConfigV1_401_response:
      example:
        error: "JWT validation failed: JWT is expired"
      properties:
        error:
          description: A message describing the error
          example: "JWT validation failed: JWT is expired"
      type: object
    getOrgConfigV1_429_response:
      example:
        message: ' Rate Limit Exceeded '
      properties:
        message:
          description: A message describing the error
          example: ' Rate Limit Exceeded '
      type: object
    array_inner:
      anyOf:
      - type: string
      - type: integer
      - type: object
      example:
      - "001"
      - "002"
      - "003"
    jsonpatchoperation_value:
      description: "The value to be used for the operation, required for \"add\" and\
        \ \"replace\" operations"
      example: New description
      oneOf:
      - example: New description
        title: string
        type: string
      - example: true
        title: boolean
        type: boolean
      - example: 300
        title: integer
        type: integer
      - example:
          attributes:
            name: philip
        title: object
        type: object
      - items:
          $ref: '#/components/schemas/array_inner'
        title: array
        type: array
