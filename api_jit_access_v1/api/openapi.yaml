openapi: 3.0.1
info:
  contact:
    name: Developer Relations
    url: https://developer.sailpoint.com/discuss/api-help
  description: "Use these APIs to interact with the Identity Security Cloud platform\
    \ to achieve repeatable, automated processes with greater scalability. We encourage\
    \ you to join the SailPoint Developer Community forum at https://developer.sailpoint.com/discuss\
    \ to connect with other developers using our APIs."
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://developer.sailpoint.com/discuss/tos
  title: Identity Security Cloud API - JIT Access
  version: v1
servers:
- description: This is the production API server.
  url: "https://{tenant}.api.identitynow.com"
  variables:
    tenant:
      default: sailpoint
      description: "This is the name of your tenant, typically your company's name."
- description: This is the versioned API server.
  url: "https://{apiUrl}"
  variables:
    apiUrl:
      default: sailpoint.api.identitynow.com
      description: This is the api url of your tenant
security:
- userAuth:
  - sp:scopes:all
tags:
- description: |
    Use these APIs to configure JIT provisioning activation policy for the tenant.
    OAuth scopes: **idn:jit-policy:read** and **idn:jit-policy:manage** (get config), **idn:jit-policy:update** and **idn:jit-policy:manage** (update config). JIT activation workflow APIs use **idn:jit-activation-workflow:*** scopes (activate, extend, deactivate, manage, and **idn:jit-activation-workflow-internal:manage**).
    For REST contract details, use the JIT Access operations in this specification and the [SailPoint API documentation](https://developer.sailpoint.com/idn/api/).
  name: JIT Access
paths:
  /jit-activation-config/v1/{configType}:
    get:
      description: |
        Returns the tenant's current JIT activation policy configuration, including governed entitlement IDs, activation and extension time limits, default periods, notification settings, and whether the policy applies to future assignments.

        The tenant comes from the authenticated request context (not the URL). Use **configType** to select which configuration to read. Returns **404** if that configuration has not been stored yet.

        **User level:** POLICY_ADMIN (policy administrator).
      operationId: getJitActivationConfigV1
      parameters:
      - description: |
          Configuration kind to read. Only **policy** (JIT activation policy) is supported today.
        example: policy
        explode: false
        in: path
        name: configType
        required: true
        schema:
          enum:
          - policy
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/jitactivationconfigresponse'
          description: "Current JIT activation policy configuration, including limits,\
            \ entitlements in scope, and notification-related fields."
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Client Error - Returned if the request body is invalid.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getJitActivationConfigV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "404":
          content:
            application/json:
              examples:
                "404":
                  summary: An example of a 404 response object
                  value:
                    detailCode: 404 Not found
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server did not find a current representation for the
                        target resource.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Not Found - returned if the request URL refers to a resource
            or object that does not exist
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getJitActivationConfigV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              examples:
                "500":
                  summary: An example of a 500 response object
                  value:
                    detailCode: 500.0 Internal Fault
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: An internal fault occurred.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Internal Server Error - Returned if there is an unexpected
            error.
      security:
      - userAuth:
        - idn:jit-policy:read
        - idn:jit-policy:manage
      summary: Get JIT activation policy configuration
      tags:
      - JIT Access
      x-sailpoint-userLevels:
      - POLICY_ADMIN
    patch:
      description: |
        Updates the tenant's JIT activation policy configuration by applying one or more **replace** operations (same shape as JSON Patch: **op**, **path**, **value**). Use this to change entitlement lists, max/default activation and extension durations, notification recipients or template, and the apply-to-future-assignments flag.

        The body must be a non-empty array. Only **replace** is supported; each **path** must be one of the values documented on the request item schema. The tenant is taken from the request context. **configType** selects which configuration to update. Returns **404** if the configuration does not exist, or **400** for an empty body, unknown **configType**, or invalid path/value.

        **User level:** POLICY_ADMIN (policy administrator).
      operationId: patchJitActivationConfigV1
      parameters:
      - description: |
          Configuration kind to update. Only **policy** (JIT activation policy) is supported today.
        example: policy
        explode: false
        in: path
        name: configType
        required: true
        schema:
          enum:
          - policy
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              items:
                $ref: '#/components/schemas/jitaccessoperationrequest'
              minItems: 1
              type: array
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/jitactivationconfigresponse'
          description: Full JIT activation policy configuration after applying all
            requested replace operations.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Client Error - Returned if the request body is invalid.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getJitActivationConfigV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "404":
          content:
            application/json:
              examples:
                "404":
                  summary: An example of a 404 response object
                  value:
                    detailCode: 404 Not found
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server did not find a current representation for the
                        target resource.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Not Found - returned if the request URL refers to a resource
            or object that does not exist
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getJitActivationConfigV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              examples:
                "500":
                  summary: An example of a 500 response object
                  value:
                    detailCode: 500.0 Internal Fault
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: An internal fault occurred.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Internal Server Error - Returned if there is an unexpected
            error.
      security:
      - userAuth:
        - idn:jit-policy:update
        - idn:jit-policy:manage
      summary: Update JIT activation policy configuration
      tags:
      - JIT Access
      x-sailpoint-userLevels:
      - POLICY_ADMIN
components:
  responses:
    "400":
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorresponsedto'
      description: Client Error - Returned if the request body is invalid.
    "401":
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/getJitActivationConfigV1_401_response'
      description: "Unauthorized - Returned if there is no authorization header, or\
        \ if the JWT token is expired."
    "403":
      content:
        application/json:
          examples:
            "403":
              summary: An example of a 403 response object
              value:
                detailCode: 403 Forbidden
                trackingId: b21b1f7ce4da4d639f2c62a57171b427
                messages:
                - locale: en-US
                  localeOrigin: DEFAULT
                  text: The server understood the request but refuses to authorize
                    it.
          schema:
            $ref: '#/components/schemas/errorresponsedto'
      description: "Forbidden - Returned if the user you are running as, doesn't have\
        \ access to this end-point."
    "404":
      content:
        application/json:
          examples:
            "404":
              summary: An example of a 404 response object
              value:
                detailCode: 404 Not found
                trackingId: b21b1f7ce4da4d639f2c62a57171b427
                messages:
                - locale: en-US
                  localeOrigin: DEFAULT
                  text: The server did not find a current representation for the target
                    resource.
          schema:
            $ref: '#/components/schemas/errorresponsedto'
      description: Not Found - returned if the request URL refers to a resource or
        object that does not exist
    "429":
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/getJitActivationConfigV1_429_response'
      description: Too Many Requests - Returned in response to too many requests in
        a given period of time - rate limited. The Retry-After header in the response
        includes how long to wait before trying again.
    "500":
      content:
        application/json:
          examples:
            "500":
              summary: An example of a 500 response object
              value:
                detailCode: 500.0 Internal Fault
                trackingId: b21b1f7ce4da4d639f2c62a57171b427
                messages:
                - locale: en-US
                  localeOrigin: DEFAULT
                  text: An internal fault occurred.
          schema:
            $ref: '#/components/schemas/errorresponsedto'
      description: Internal Server Error - Returned if there is an unexpected error.
  schemas:
    jitactivationconfigresponse:
      example:
        entitlementIds:
        - ae735f40-4de9-4163-801d-4a1444e59d35
        - 38439bbc-264b-447b-acac-a182a466b0e9
        defaultMaxActivationPeriodMins: 60
        maxActivationPeriodMins: 120
        defaultMaxActivationPeriodExtensionMins: 15
        applyToFutureAssignments: true
        maxActivationPeriodExtensionMins: 30
        notificationRecipients:
        - owner@example.com
        id: 6d38a587-302a-41d1-a3b1-ffae2c25c960
        notificationTemplate: jit-activation-default
      properties:
        id:
          description: |
            Unique identifier of this JIT activation configuration instance (persisted config id).
          example: 6d38a587-302a-41d1-a3b1-ffae2c25c960
          format: uuid
          type: string
        entitlementIds:
          description: |
            Entitlement IDs governed by JIT activation policy. May be a single-element array when only one entitlement is in scope.
          example:
          - ae735f40-4de9-4163-801d-4a1444e59d35
          - 38439bbc-264b-447b-acac-a182a466b0e9
          items:
            format: uuid
            type: string
          type: array
        maxActivationPeriodMins:
          description: "Maximum allowed JIT activation duration for a single grant,\
            \ in minutes; null if unset."
          example: 120
          format: int32
          nullable: true
          type: integer
        maxActivationPeriodExtensionMins:
          description: "Maximum allowed extension of an active JIT activation, in\
            \ minutes; null if unset."
          example: 30
          format: int32
          nullable: true
          type: integer
        defaultMaxActivationPeriodMins:
          description: "Default activation duration offered when a user requests JIT\
            \ access, in minutes; null if unset."
          example: 60
          format: int32
          nullable: true
          type: integer
        defaultMaxActivationPeriodExtensionMins:
          description: "Default extension duration offered for an active JIT activation,\
            \ in minutes; null if unset."
          example: 15
          format: int32
          nullable: true
          type: integer
        notificationRecipients:
          description: |
            Email addresses notified for JIT activation events (for example policy owners or a shared mailbox).
          example:
          - owner@example.com
          items:
            format: email
            type: string
          type: array
        notificationTemplate:
          description: Name or key of the email template used for JIT activation notifications;
            null if unset.
          example: jit-activation-default
          nullable: true
          type: string
        applyToFutureAssignments:
          description: Whether the policy applies to future entitlement assignments.
          example: true
          type: boolean
      required:
      - applyToFutureAssignments
      - id
      type: object
    localeorigin:
      description: "An indicator of how the locale was selected. *DEFAULT* means the\
        \ locale is the system default. *REQUEST* means the locale was selected from\
        \ the request context (i.e., best match based on the *Accept-Language* header).\
        \ Additional values may be added in the future without notice."
      enum:
      - DEFAULT
      - REQUEST
      - null
      example: DEFAULT
      nullable: true
      type: string
    errormessagedto:
      example:
        localeOrigin: DEFAULT
        text: The request was syntactically correct but its content is semantically
          invalid.
        locale: en-US
      properties:
        locale:
          description: "The locale for the message text, a BCP 47 language tag."
          example: en-US
          nullable: true
          type: string
        localeOrigin:
          $ref: '#/components/schemas/localeorigin'
        text:
          description: Actual text of the error message in the indicated locale.
          example: The request was syntactically correct but its content is semantically
            invalid.
          type: string
      title: Error Message Dto
      type: object
    errorresponsedto:
      example:
        causes:
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        messages:
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        detailCode: 400.1 Bad Request Content
        trackingId: e7eab60924f64aa284175b9fa3309599
      properties:
        detailCode:
          description: Fine-grained error code providing more detail of the error.
          example: 400.1 Bad Request Content
          type: string
        trackingId:
          description: Unique tracking id for the error.
          example: e7eab60924f64aa284175b9fa3309599
          type: string
        messages:
          description: Generic localized reason for error
          items:
            $ref: '#/components/schemas/errormessagedto'
          type: array
        causes:
          description: Plain-text descriptive reasons to provide additional detail
            to the text provided in the messages field
          items:
            $ref: '#/components/schemas/errormessagedto'
          type: array
      title: Error Response Dto
      type: object
    jitaccessoperationrequest:
      description: |
        A single replace operation applied to JIT activation configuration.
        Only **replace** is supported. **path** must be one of the allowed JSON Pointer-style paths.
      properties:
        op:
          default: replace
          description: Operation type. Defaults to `replace` if omitted.
          enum:
          - replace
          example: replace
          type: string
        path:
          description: |
            Path to replace. Only the following JSON Pointer-style paths are supported.
          enum:
          - /entitlementIds
          - /maxActivationPeriodMins
          - /maxActivationPeriodExtensionMins
          - /defaultMaxActivationPeriodMins
          - /defaultMaxActivationPeriodExtensionMins
          - /notificationRecipients
          - /notificationTemplate
          - /applyToFutureAssignments
          example: /maxActivationPeriodMins
          type: string
        value:
          $ref: '#/components/schemas/jitaccessoperationrequest_value'
      required:
      - path
      - value
      type: object
    getJitActivationConfigV1_401_response:
      example:
        error: "JWT validation failed: JWT is expired"
      properties:
        error:
          description: A message describing the error
          example: "JWT validation failed: JWT is expired"
      type: object
    getJitActivationConfigV1_429_response:
      example:
        message: ' Rate Limit Exceeded '
      properties:
        message:
          description: A message describing the error
          example: ' Rate Limit Exceeded '
      type: object
    jitaccessoperationrequest_value:
      description: |
        New value. Type depends on **path**: arrays of strings for `/entitlementIds` and `/notificationRecipients`,
        integer for `*Mins` paths, string for `/notificationTemplate`, boolean for `/applyToFutureAssignments`.
        Use `null` when clearing nullable fields (for example `/notificationTemplate` or `*Mins` paths).
      example: 60
      nullable: true
      oneOf:
      - description: Value for `/entitlementIds` or `/notificationRecipients`.
        example:
        - 2c9180837dfe6949017e208e25967b22
        items:
          type: string
        type: array
      - description: Value for `*Mins` paths (minutes).
        example: 60
        format: int32
        type: integer
      - description: Value for `/notificationTemplate`.
        example: jit-activation-default
        type: string
      - description: Value for `/applyToFutureAssignments`.
        example: true
        type: boolean
