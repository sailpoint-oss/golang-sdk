openapi: 3.0.1
info:
  contact:
    name: Developer Relations
    url: https://developer.sailpoint.com/discuss/api-help
  description: "Use these APIs to interact with the Identity Security Cloud platform\
    \ to achieve repeatable, automated processes with greater scalability. We encourage\
    \ you to join the SailPoint Developer Community forum at https://developer.sailpoint.com/discuss\
    \ to connect with other developers using our APIs."
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://developer.sailpoint.com/discuss/tos
  title: Identity Security Cloud API - Account Deletion Requests
  version: v1
servers:
- description: This is the production API server.
  url: "https://{tenant}.api.identitynow.com"
  variables:
    tenant:
      default: sailpoint
      description: "This is the name of your tenant, typically your company's name."
- description: This is the versioned API server.
  url: "https://{apiUrl}"
  variables:
    apiUrl:
      default: sailpoint.api.identitynow.com
      description: This is the api url of your tenant
security:
- userAuth:
  - sp:scopes:all
tags:
- name: Account Deletion Requests
paths:
  /account-requests/v1/deletion:
    get:
      description: "Retrieves a paginated list of account deletion requests filtered\
        \ by the provided query parameters. When the \"mine\" parameter is set to\
        \ true, the response includes only those deletion requests that were initiated\
        \ by the currently authenticated user. If \"mine\" is false or not specified,\
        \ the endpoint returns all account deletion requests associated with the current\
        \ tenant, regardless of the initiator. This allows both users and administrators\
        \ to view relevant deletion requests based on their access level and intent."
      operationId: getAccountDeletionRequestsV1
      parameters:
      - description: |-
          Max number of results to return.
          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: 250
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 250
          format: int32
          maximum: 250
          minimum: 0
          type: integer
        style: form
      - description: |-
          Offset into the full result set. Usually specified with *limit* to paginate through the results.
          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: 0
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          format: int32
          minimum: 0
          type: integer
        style: form
      - description: |-
          If *true* it will populate the *X-Total-Count* response header with the number of results that would be returned if *limit* and *offset* were ignored.

          Since requesting a total count can have a performance impact, it is recommended not to send **count=true** if that value will not be used.

          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: true
        explode: true
        in: query
        name: count
        required: false
        schema:
          default: false
          type: boolean
        style: form
      - description: "Determines whether to return only the account deletion requests\
          \ initiated by the currently authenticated user. If set to true, the response\
          \ includes only deletion requests created by the logged-in user. If set\
          \ to false or not provided, the response includes all deletion requests\
          \ for the tenant, regardless of the initiator. This parameter allows users\
          \ to view their own requests, while administrators can view all requests\
          \ within the tenant."
        example: true
        explode: true
        in: query
        name: mine
        required: false
        schema:
          default: false
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              example:
              - accountRequestId: 18104e7e499b4e23882d6323344ab6bc
                requestType: DELETE_ACCOUNT
                createdAt: 2026-01-14T08:08:27.195Z
                completedAt: 2026-01-14T08:38:45.932Z
                overallStatus: SUCCESS
                requester:
                  type: IDENTITY
                  id: 85131bd73fdc423599e57f40b29f01fe
                  name: SailPoint Support
                requesterComments: Delete Machine Account with subtype and account
                  owner Happy Path Test#1
                accountDetails:
                  accountId: 4542bb255921482fb36f6a5550e23a99
                  accountName: "machine102,"
                  accountNativeIdentity: "CN=machine 102,OU=megapod-useast1-vivek-e2e,OU=org-data-service,DC=TestAutomationAD,DC=local"
                  accountUuid: bcde4ff4-087a-4af4-b5e4-95c85e386276
                  accountType: MACHINE
                  accountSubtypeId: d7ae9ea3-507f-4d00-9d4f-b4464b344b88
                  accountSubtype: null
                  description: null
                  sourceId: a03caa629a624cee90f94048252034cf
                  sourceName: Active Directory
                  hasEntitlements: false
                  disabled: false
                  locked: false
                  ownerIdentity:
                    type: IDENTITY
                    id: 28ca01acdd3648b4b0890ab2e0af8839
                    name: walter.white
                correlatedIdentity:
                  id: c2353ef10dd54a8e9725beff360c0be2
                  name: machine102
                  status: null
                  email: machine.102@testmail.identitysoon.com
                managerReference:
                  id: 117e169acf21f4ae28e8a06198ce7f69
                  name: manager
                  email: manager@testmail.identitysoon.com
                  status: ACTIVE
                approvalRequestId: 90a7b947-578b-4285-98dc-5d5d01c7b736
                accountRequestPhases:
                - name: APPROVAL_PHASE
                  state: APPROVED
                  started: 2026-01-14T08:08:28.644090559Z
                  finished: 2026-01-14T08:38:42.707043142Z
                - name: PROVISIONING_PHASE
                  state: PASSED
                  started: 2026-01-14T08:38:42.785577841Z
                  finished: 2026-01-14T08:38:45.932606296Z
                approvalDetails:
                  approverType: SOURCE_OWNER
                  approver:
                    id: 85131bd73fdc423599e57f40b29f01fe
                    type: IDENTITY
                    name: SailPoint Support
                  actionedBy:
                    id: 85131bd73fdc423599e57f40b29f01fe
                    type: IDENTITY
                    name: SailPoint Support
                  comments: Yes this can be deleted.
                  decisionDate: 2026-01-14T08:38:41.733779Z
                  serialOrder: 1
                  status: APPROVED
                errorDetails: null
              schema:
                items:
                  $ref: '#/components/schemas/accountactionrequestdto'
                type: array
          description: Account Action Request objects.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Client Error - Returned if the request body is invalid.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getAccountDeletionRequestsV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "404":
          content:
            application/json:
              examples:
                "404":
                  summary: An example of a 404 response object
                  value:
                    detailCode: 404 Not found
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server did not find a current representation for the
                        target resource.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Not Found - returned if the request URL refers to a resource
            or object that does not exist
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getAccountDeletionRequestsV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              examples:
                "500":
                  summary: An example of a 500 response object
                  value:
                    detailCode: 500.0 Internal Fault
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: An internal fault occurred.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Internal Server Error - Returned if there is an unexpected
            error.
      security:
      - userAuth:
        - idn:account-requests:read
        - idn:account-requests:management
      summary: List of Account Deletion Requests
      tags:
      - Account Deletion Requests
      x-sailpoint-userLevels:
      - ORG_ADMIN
      - SOURCE_ADMIN
      - SOURCE_SUBADMIN
      - USER
  /account-requests/v1/account/{accountId}/delete:
    post:
      description: "Initiates an account deletion request for the specified account.\n\
        This method validates the input data, processes the deletion request,\nand\
        \ generates an asynchronous result containing a tracking ID. \n>**NOTE: You\
        \ can only delete accounts from sources of the \"Connected\" type. which supports\
        \ account deletion**"
      operationId: deleteAccountRequestV1
      parameters:
      - description: Account ID.
        example: ef38f94347e94562b5bb8424a56498d8
        explode: false
        in: path
        name: accountId
        required: true
        schema:
          type: string
        style: simple
        x-sailpoint-resource-operation-id: listAccountsV1
      requestBody:
        content:
          application/json:
            example:
              comments: I requested this account deletion.
            schema:
              $ref: '#/components/schemas/accountdeleterequestinput'
        required: false
      responses:
        "202":
          content:
            application/json:
              example:
                accountRequestId: 2d81808474683da6017468693c260196
              schema:
                $ref: '#/components/schemas/accountrequestasyncresult'
          description: Account deletion request details.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Client Error - Returned if the request body is invalid.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getAccountDeletionRequestsV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "404":
          content:
            application/json:
              examples:
                "404":
                  summary: An example of a 404 response object
                  value:
                    detailCode: 404 Not found
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server did not find a current representation for the
                        target resource.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Not Found - returned if the request URL refers to a resource
            or object that does not exist
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getAccountDeletionRequestsV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              examples:
                "500":
                  summary: An example of a 500 response object
                  value:
                    detailCode: 500.0 Internal Fault
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: An internal fault occurred.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Internal Server Error - Returned if there is an unexpected
            error.
      security:
      - userAuth:
        - idn:account-requests:create
      summary: Delete account
      tags:
      - Account Deletion Requests
      x-sailpoint-userLevels:
      - ORG_ADMIN
      - SOURCE_ADMIN
      - SOURCE_SUBADMIN
      - USER
components:
  parameters:
    limit:
      description: |-
        Max number of results to return.
        See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
      example: 250
      explode: true
      in: query
      name: limit
      required: false
      schema:
        default: 250
        format: int32
        maximum: 250
        minimum: 0
        type: integer
      style: form
    offset:
      description: |-
        Offset into the full result set. Usually specified with *limit* to paginate through the results.
        See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
      example: 0
      explode: true
      in: query
      name: offset
      required: false
      schema:
        default: 0
        format: int32
        minimum: 0
        type: integer
      style: form
    count:
      description: |-
        If *true* it will populate the *X-Total-Count* response header with the number of results that would be returned if *limit* and *offset* were ignored.

        Since requesting a total count can have a performance impact, it is recommended not to send **count=true** if that value will not be used.

        See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
