    "429":
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/getAccountDeletionRequestsV1_429_response'
      description: Too Many Requests - Returned in response to too many requests in
        a given period of time - rate limited. The Retry-After header in the response
        includes how long to wait before trying again.
    "500":
      content:
        application/json:
          examples:
            "500":
              summary: An example of a 500 response object
              value:
                detailCode: 500.0 Internal Fault
                trackingId: b21b1f7ce4da4d639f2c62a57171b427
                messages:
                - locale: en-US
                  localeOrigin: DEFAULT
                  text: An internal fault occurred.
          schema:
            $ref: '#/components/schemas/errorresponsedto'
      description: Internal Server Error - Returned if there is an unexpected error.
  schemas:
    dtotype:
      description: An enumeration of the types of DTOs supported within the IdentityNow
        infrastructure.
      enum:
      - ACCOUNT_CORRELATION_CONFIG
      - ACCESS_PROFILE
      - ACCESS_REQUEST_APPROVAL
      - ACCOUNT
      - APPLICATION
      - CAMPAIGN
      - CAMPAIGN_FILTER
      - CERTIFICATION
      - CLUSTER
      - CONNECTOR_SCHEMA
      - ENTITLEMENT
      - GOVERNANCE_GROUP
      - IDENTITY
      - IDENTITY_PROFILE
      - IDENTITY_REQUEST
      - MACHINE_IDENTITY
      - LIFECYCLE_STATE
      - PASSWORD_POLICY
      - ROLE
      - RULE
      - SOD_POLICY
      - SOURCE
      - TAG
      - TAG_CATEGORY
      - TASK_RESULT
      - REPORT_RESULT
      - SOD_VIOLATION
      - ACCOUNT_ACTIVITY
      - WORKGROUP
      example: IDENTITY
      type: string
    basereferencedto:
      properties:
        type:
          $ref: '#/components/schemas/dtotype'
        id:
          description: ID of the object to which this reference applies
          example: 2c91808568c529c60168cca6f90c1313
          type: string
        name:
          description: Human-readable display name of the object to which this reference
            applies
          example: William Wilson
          type: string
      title: Base Reference Dto
      type: object
    accountdetails:
      description: Account Details
      properties:
        id:
          description: unique id of this object
          example: 2c91808474683da6017468693c260195
          type: string
        name:
          type: string
        accountId:
          example: 4191808474683da6017468693c260195
          type: string
        description:
          type: string
        nativeIdentity:
          type: string
        uuid:
          type: string
        displayName:
          type: string
        disabled:
          type: boolean
        locked:
          type: boolean
        uncorrelated:
          type: boolean
        systemAccount:
          type: boolean
        authoritative:
          type: boolean
        supportsPasswordChange:
          type: boolean
        attributes:
          type: object
        application:
          type: object
        identity:
          type: object
        schema:
          type: object
        pendingAccessRequestIds:
          items:
            type: string
          type: array
        features:
          items:
            enum:
            - AUTHENTICATE
            - COMPOSITE
            - DIRECT_PERMISSIONS
            - DISCOVER_SCHEMA
            - ENABLE
            - MANAGER_LOOKUP
            - NO_RANDOM_ACCESS
            - PROXY
            - SEARCH
            - TEMPLATE
            - UNLOCK
            - UNSTRUCTURED_TARGETS
            - SHAREPOINT_TARGET
            - PROVISIONING
            - GROUP_PROVISIONING
            - SYNC_PROVISIONING
            - PASSWORD
            - CURRENT_PASSWORD
            - ACCOUNT_ONLY_REQUEST
            - ADDITIONAL_ACCOUNT_REQUEST
            - NO_AGGREGATION
            - GROUPS_HAVE_MEMBERS
            - NO_PERMISSIONS_PROVISIONING
            - NO_GROUP_PERMISSIONS_PROVISIONING
            - NO_UNSTRUCTURED_TARGETS_PROVISIONING
            - NO_DIRECT_PERMISSIONS_PROVISIONING
            type: string
          type: array
        meta:
          type: object
      title: Account Details
      type: object
    identityreference:
      description: The manager for the identity.
      nullable: true
      properties:
        type:
          $ref: '#/components/schemas/dtotype'
        id:
          description: Identity id
          example: 2c9180a46faadee4016fb4e018c20639
          type: string
        name:
          description: Human-readable display name of identity.
          example: Thomas Edison
          type: string
      title: Identity Reference
      type: object
    accountrequestphasestate:
      description: "The current phase state of the account request, indicating its\
        \ progress or outcome in the approval workflow."
      enum:
      - PENDING
      - CANCELLED
      - APPROVED
      - REJECTED
      - PASSED
      - FAILED
      - NOT_STARTED
      example: APPROVED
      type: string
    accountrequestphase:
      description: "Contains detailed information about each phase in the account\
        \ request process, including its type, current state, and relevant timestamps."
      properties:
        name:
          description: Enum of account request phase type
          enum:
          - APPROVAL_PHASE
          - PROVISIONING_PHASE
          example: APPROVAL_PHASE
          title: AccountRequestPhaseType
          type: string
        state:
          $ref: '#/components/schemas/accountrequestphasestate'
        started:
          description: Start date of account request phase.
          example: 2026-01-21T11:43:22.432Z
          format: date-time
          readOnly: true
          type: string
        finished:
          description: Finish date of account request phase.
          example: 2026-01-21T11:45:22.432Z
          format: date-time
          readOnly: true
          type: string
      title: Account Request phase
      type: object
    approverreference:
      properties:
        id:
          description: "Id of supported DtoType like IDENTITY, MACHINE_IDENTITY etc."
          example: 85131bd73fdc423599e57f40b29f01fe
          type: string
        type:
          description: Type of Dto
          example: IDENTITY
          type: string
        name:
          description: "Display name of DtoType like IDENTITY, MACHINE_IDENTITY etc"
          example: SailPoint Support
          type: string
      title: ApproverReference
      type: object
    approverdto:
      description: "Contains detailed information about the approver, including their\
        \ identity, contact details, type, and references to related identities such\
        \ as owners, actioned identities, and members."
      properties:
        identityID:
          description: Identity ID and it cannot be null.
          example: 22efd140d88a4ceeab32c8829973244c
          nullable: false
          type: string
        id:
          description: Optional id
          nullable: true
          type: string
        name:
          description: Identity display name
          example: SailPoint Support
          type: string
        email:
          description: Email address of identity
          example: support@testmail.identitysoon.com
          type: string
        type:
          description: Used to mention type of data transfer object in this case it
            is used to transfer IDENTITY data.
          example: IDENTITY
          type: string
        ownerOf:
          description: List of reference of identity type dto for account owner identities
          items:
            $ref: '#/components/schemas/approverreference'
          nullable: true
          type: array
        actionedAs:
          description: List of reference of identity type dto who acted on behalf
            of other identities.
          items:
            $ref: '#/components/schemas/approverreference'
          nullable: true
          type: array
        members:
          description: List of reference of identity type dto for member identities.
          items:
            $ref: '#/components/schemas/approverreference'
          nullable: true
          type: array
      title: Approver Dto
      type: object
    approvaldetails:
      description: "Contains comprehensive details about the approval process, including\
        \ the approver's information, comments, decision date, serial order, and the\
        \ current status of the approval request."
      properties:
        approver:
          $ref: '#/components/schemas/approverdto'
        approverComments:
          description: Comments added by approver while rejecting or approving the
            account deletion request.
          example: Approving account deletion request due to long term inactivity
            of account.
          type: string
        decisionDate:
          description: Decision date of approval rejected or approved.
          example: 2026-01-21T11:43:22.432Z
          format: date-time
          readOnly: true
          type: string
        serialOrder:
          description: SerialOrder of approval details.
          example: 12345
          format: int64
          type: integer
        status:
          $ref: '#/components/schemas/accountrequestphasestate'
      title: Approval Details
      type: object
    accountactionrequestdto:
      description: "Represents a request to perform an action on an account, such\
        \ as deletion or modification."
      example:
        requester:
          name: William Wilson
          id: 2c91808568c529c60168cca6f90c1313
          type: IDENTITY
        accountRequestId: 2d8180a46faadee4016fb4e018c20648
        completedAt: 2026-01-20T21:35:00Z
        approvalDetails:
        - identityID: 85131bd73fdc423599e57f40b29f01fe
          id: 85131bd73fdc423599e57f40b29f01fe
          name: SailPoint Support
          email: support@testmail.identitysoon.com
          type: IDENTITY
          ownerOf:
            email: Alfred.255e71dfc6e@testmail.identitysoon.com
            type: IDENTITY
            id: 7ec252acbd4245548bc25df22348cb75
            name: Alfred
          actionedAs:
            email: Alfred.255e71dfc6e@testmail.identitysoon.com
            type: IDENTITY
            id: 7ec252acbd4245548bc25df22348cb75
