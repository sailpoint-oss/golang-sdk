openapi: 3.0.1
info:
  contact:
    name: Developer Relations
    url: https://developer.sailpoint.com/discuss/api-help
  description: "Use these APIs to interact with the Identity Security Cloud platform\
    \ to achieve repeatable, automated processes with greater scalability. We encourage\
    \ you to join the SailPoint Developer Community forum at https://developer.sailpoint.com/discuss\
    \ to connect with other developers using our APIs."
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://developer.sailpoint.com/discuss/tos
  title: Identity Security Cloud API - Dimensions
  version: v1
servers:
- description: This is the production API server.
  url: "https://{tenant}.api.identitynow.com"
  variables:
    tenant:
      default: sailpoint
      description: "This is the name of your tenant, typically your company's name."
- description: This is the versioned API server.
  url: "https://{apiUrl}"
  variables:
    apiUrl:
      default: sailpoint.api.identitynow.com
      description: This is the api url of your tenant
security:
- userAuth:
  - sp:scopes:all
tags:
- description: |-
    Use this API to implement and customize dynamic role functionality. With this functionality in place, administrators can create dimensions and configure them for use throughout Identity Security Cloud. Identity Security Cloud can use established criteria to automatically assign the dimensions to qualified users. This enables users to get all the access they need quickly and securely and administrators to spend their time on other tasks. Entitlements represent the most granular level of access in Identity Security Cloud.
    Access profiles represent the next level and often group entitlements. Dimension represent access selectively based on the evaluation of contextual information that is available or provided. Each Dimension include context attributes and access selection expressions which map criteria to access right assignments. Each dimension can contain up to 5 context attributes. Dynamic Access Roles represent the broadest level of access and often group access profiles ,entitlements and dimensions.Each Dynamic Access Role may contain one or more Dimensions.
  name: Dimensions
paths:
  /roles/v1/{roleId}/dimensions:
    get:
      description: |-
        This API returns a list of dimensions under a specified role.

        A token with API, ORG_ADMIN, ROLE_ADMIN, or ROLE_SUBADMIN authority is required to call this API.
      operationId: listDimensionsV1
      parameters:
      - description: Parent Role Id of the dimension.
        example: 6603fba3004f43c687610a29195252ce
        explode: false
        in: path
        name: roleId
        required: true
        schema:
          type: string
        style: simple
        x-sailpoint-resource-operation-id: listRolesV1
      - description: "If provided, filters the returned list according to what is\
          \ visible to the indicated ROLE_SUBADMIN Identity. The value of the parameter\
          \ is either an Identity ID, or the special value **me**, which is shorthand\
          \ for the calling Identity's ID. A 400 Bad Request error is returned if\
          \ the **for-subadmin** parameter is specified for an Identity that is not\
          \ a subadmin."
        example: 5168015d32f890ca15812c9180835d2e
        explode: true
        in: query
        name: for-subadmin
        required: false
        schema:
          type: string
        style: form
      - description: |-
          Note that for this API the maximum value for limit is 50.
          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: 50
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 50
          format: int32
          maximum: 50
          minimum: 0
          type: integer
        style: form
      - description: |-
          Offset into the full result set. Usually specified with *limit* to paginate through the results.
          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: 0
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          format: int32
          minimum: 0
          type: integer
        style: form
      - description: |-
          If *true* it will populate the *X-Total-Count* response header with the number of results that would be returned if *limit* and *offset* were ignored.

          Since requesting a total count can have a performance impact, it is recommended not to send **count=true** if that value will not be used.

          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: true
        explode: true
        in: query
        name: count
        required: false
        schema:
          default: false
          type: boolean
        style: form
      - description: |-
          Filter results using the standard syntax described in [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#filtering-results)

          Filtering is supported for the following fields and operators:

          **id**: *eq, in*

          **name**: *eq, sw*

          **created**: *gt, lt, ge, le*

          **modified**: *gt, lt, ge, le*

          **owner.id**: *eq, in*
        example: id eq '2c918086749d78830174a1a40e121518'
        explode: true
        in: query
        name: filters
        required: false
        schema:
          type: string
        style: form
      - description: |-
          Sort results using the standard syntax described in [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#sorting-results)

          Sorting is supported for the following fields: **name, created, modified**
        example: "name,-modified"
        explode: true
        in: query
        name: sorters
        required: false
        schema:
          format: comma-separated
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/dimension'
                type: array
          description: List of Dimensions
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Client Error - Returned if the request body is invalid.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listDimensionsV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listDimensionsV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              examples:
                "500":
                  summary: An example of a 500 response object
                  value:
                    detailCode: 500.0 Internal Fault
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: An internal fault occurred.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Internal Server Error - Returned if there is an unexpected
            error.
      security:
      - userAuth:
        - idn:role-unchecked:read
        - idn:role-unchecked:manage
        - idn:role-checked:manage
        - idn:role-checked:read
      summary: List dimensions
      tags:
      - Dimensions
      x-sailpoint-userLevels:
      - ORG_ADMIN
      - ROLE_ADMIN
      - ROLE_SUBADMIN
    post:
      description: "This API creates a dimension.\nYou must have a token with API,\
        \ ORG_ADMIN, ROLE_ADMIN, or ROLE_SUBADMIN authority to call this API. \nAdditionally,\
        \ a ROLE_SUBADMIN cannot create a dimension that includes an access profile\
        \ or entitlement if that access profile or entitlement is linked to a source\
        \ that the ROLE_SUBADMIN is not associated with. \nThe maximum supported length\
        \ for the description field is 2000 characters."
      operationId: createDimensionV1
      parameters:
      - description: Parent Role Id of the dimension.
        example: 6603fba3004f43c687610a29195252ce
        explode: false
        in: path
        name: roleId
        required: true
        schema:
          type: string
        style: simple
        x-sailpoint-resource-operation-id: listRolesV1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/dimension'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dimension'
          description: Dimension created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Client Error - Returned if the request body is invalid.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listDimensionsV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listDimensionsV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              examples:
                "500":
                  summary: An example of a 500 response object
                  value:
                    detailCode: 500.0 Internal Fault
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: An internal fault occurred.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Internal Server Error - Returned if there is an unexpected
            error.
      security:
      - userAuth:
        - idn:role-unchecked:manage
        - idn:role-checked:manage
      summary: Create a dimension
      tags:
      - Dimensions
      x-sailpoint-userLevels:
      - ORG_ADMIN
      - ROLE_ADMIN
      - ROLE_SUBADMIN
  /roles/v1/{roleId}/dimensions/{dimensionId}:
    delete:
      description: |-
        This API deletes a Dimension by its ID.
        A token with API, ORG_ADMIN, ROLE_ADMIN, or ROLE_SUBADMIN authority is required to call this API. In addition, a token with ROLE_SUBADMIN authority may only call this API if all Access Profiles/Entitlements included in the Dimension are associated to Sources with management workgroups of which the ROLE_SUBADMIN is a member.
      operationId: deleteDimensionV1
      parameters:
      - description: Parent Role Id of the dimension.
        example: 6603fba3004f43c687610a29195252ce
        explode: false
        in: path
        name: roleId
        required: true
        schema:
          type: string
        style: simple
        x-sailpoint-resource-operation-id: listRolesV1
      - description: Id of the Dimension
        example: 2c9180835d191a86015d28455b4a2329
        explode: false
        in: path
        name: dimensionId
        required: true
        schema:
          type: string
        style: simple
        x-sailpoint-resource-operation-id: listDimensionsV1
      responses:
        "204":
          description: No content - indicates the request was successful but there
            is no content to be returned in the response.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Client Error - Returned if the request body is invalid.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listDimensionsV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listDimensionsV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              examples:
                "500":
                  summary: An example of a 500 response object
                  value:
                    detailCode: 500.0 Internal Fault
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: An internal fault occurred.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Internal Server Error - Returned if there is an unexpected
            error.
      security:
      - userAuth:
        - idn:role-unchecked:manage
        - idn:role-checked:manage
      summary: Delete a dimension
      tags:
      - Dimensions
      x-sailpoint-userLevels:
      - ORG_ADMIN
      - ROLE_ADMIN
      - ROLE_SUBADMIN
    get:
      description: |-
        This API returns a Dimension by its ID.

        A token with API, ORG_ADMIN, ROLE_ADMIN, or ROLE_SUBADMIN authority is required to call this API. In addition, a token with ROLE_SUBADMIN authority may only call this API if all Access Profiles or Entitlements included in the Dimension or Parent Role are associated to Sources with management workgroups of which the ROLE_SUBADMIN is a member.
      operationId: getDimensionV1
      parameters:
      - description: Parent Role Id of the dimension.
        example: 6603fba3004f43c687610a29195252ce
        explode: false
        in: path
        name: roleId
        required: true
        schema:
          type: string
        style: simple
        x-sailpoint-resource-operation-id: listRolesV1
      - description: Id of the Dimension
        example: 2c9180835d191a86015d28455b4a2329
        explode: false
        in: path
        name: dimensionId
        required: true
        schema:
          type: string
        style: simple
        x-sailpoint-resource-operation-id: listDimensionsV1
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dimension'
          description: Dimension
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Client Error - Returned if the request body is invalid.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listDimensionsV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listDimensionsV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              examples:
                "500":
                  summary: An example of a 500 response object
                  value:
                    detailCode: 500.0 Internal Fault
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: An internal fault occurred.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Internal Server Error - Returned if there is an unexpected
            error.
      security:
      - userAuth:
        - idn:role-unchecked:read
        - idn:role-unchecked:manage
        - idn:role-checked:manage
        - idn:role-checked:read
      summary: Get a dimension under role.
      tags:
      - Dimensions
      x-sailpoint-userLevels:
      - ORG_ADMIN
      - ROLE_ADMIN
      - ROLE_SUBADMIN
    patch:
      description: |-
        This API updates an existing dimension using [JSON Patch](https://tools.ietf.org/html/rfc6902) syntax.
        The following fields are patchable: **name** **description** **owner** **accessProfiles** **entitlements** **membership**
        A token with API, ORG_ADMIN, ROLE_ADMIN, or ROLE_SUBADMIN authority is required to call this API. In addition, a token with ROLE_SUBADMIN authority may only call this API if all access profiles/entitlements included in the dimension are associated to Sources with management workgroups of which the ROLE_SUBADMIN is a member.
        The maximum supported length for the description field is 2000 characters.
        When you use this API to modify a dimension's membership identities, you can only modify up to a limit of 500 membership identities at a time.
      operationId: patchDimensionV1
      parameters:
      - description: Parent Role Id of the dimension.
        example: 6603fba3004f43c687610a29195252ce
        explode: false
        in: path
        name: roleId
        required: true
        schema:
          type: string
        style: simple
        x-sailpoint-resource-operation-id: listRolesV1
      - description: Id of the Dimension
        example: 2c9180835d191a86015d28455b4a2329
        explode: false
        in: path
        name: dimensionId
        required: true
        schema:
          type: string
        style: simple
        x-sailpoint-resource-operation-id: listDimensionsV1
      requestBody:
        content:
          application/json-patch+json:
            examples:
              Update a Dimension name and description field in One Call:
                description: This example shows how multiple fields may be updated
                  with a single patch call.
                value:
                - op: replace
                  path: /description
                  value: Test Description
                - op: replace
                  path: /name
                  value: new name
              Set the Membership Selection Criteria to a List of Identities:
                description: "This example shows how to define a Dimension's membershp\
                  \ by providing a list of Identities, referenced by their IDs."
                value:
                - op: replace
                  path: /membership
                  value:
                    type: IDENTITY_LIST
                    identities:
                    - id: 2c91808973fe906c0174262092014ed9
                    - id: 2c918086262092014ed94fb8a47612f3
              Set the Membership Selection Criteria to a Standard Expression:
                description: "This example shows how to define a Dimensions's membership\
                  \ using STANDARD criteria. In this case, the Dimension will be granted\
                  \ to all Identities which have the *Engineering* attribute from\
                  \ the indicated Source."
                value:
                - op: replace
                  path: /membership
                  value:
                    type: STANDARD
                    criteria:
                      operation: OR
                      children:
                      - operation: EQUALS
                        key:
                          type: ENTITLEMENT
                          property: attribute.memberOf
                          sourceId: 2c9180887701fb2014213e122092014e
                        stringValue: Engineering
              Add a New Clause as the Child of an Existing Standard Expression:
                description: This example shows how to add a child clause to an existing
                  STANDARD criteria expression.
                value:
                - op: add
                  path: /membership/criteria/children/-
                  value:
                    operation: ENDS_WITH
                    key:
                      type: IDENTITY
                      property: attribute.email
                    stringValue: '@identitynow.com'
            schema:
              items:
                $ref: '#/components/schemas/jsonpatchoperation'
              type: array
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dimension'
          description: Responds with the Dimension as updated.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Client Error - Returned if the request body is invalid.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listDimensionsV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listDimensionsV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              examples:
                "500":
                  summary: An example of a 500 response object
                  value:
                    detailCode: 500.0 Internal Fault
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: An internal fault occurred.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Internal Server Error - Returned if there is an unexpected
            error.
      security:
      - userAuth:
        - idn:role-unchecked:manage
        - idn:role-checked:manage
      summary: Patch a specified dimension
      tags:
      - Dimensions
      x-sailpoint-userLevels:
      - ORG_ADMIN
      - ROLE_ADMIN
      - ROLE_SUBADMIN
  /roles/v1/{roleId}/dimensions/bulk-delete:
    post:
      description: "This endpoint initiates a bulk deletion of one or more dimensions.\n\
        When the request is successful, the endpoint returns the bulk delete's task\
        \ result ID.  To follow the task, you can use [Get Task Status by ID](https://developer.sailpoint.com/docs/api/beta/get-task-status),\
        \ which will return the task result's status and information. \nThis endpoint\
        \ can only bulk delete up to a limit of 50 roles per request. \nA token with\
        \ API, ORG_ADMIN, ROLE_ADMIN, or ROLE_SUBADMIN authority is required to call\
        \ this endpoint. In addition, a token with ROLE_SUBADMIN authority can only\
        \ call this endpoint if all dimensions included in the request are associated\
        \ with sources with management workgroups the ROLE_SUBADMIN is a member of."
      operationId: deleteBulkDimensionsV1
      parameters:
      - description: Parent Role Id of the dimensions.
        example: 6603fba3004f43c687610a29195252ce
        explode: false
        in: path
        name: roleId
        required: true
        schema:
          type: string
        style: simple
        x-sailpoint-resource-operation-id: listRolesV1
      requestBody:
        content:
          application/json:
            example:
              dimensionIds:
              - 2c91808876438bb2017668b91919ecca
              - 2c91808876438ba801766e129f151816
            schema:
              $ref: '#/components/schemas/dimensionbulkdeleterequest'
        required: true
      responses:
        "202":
          content:
            application/json:
              example:
                type: TASK_RESULT
                id: 464ae7bf791e49fdb74606a2e4a89635
                name: null
              schema:
                $ref: '#/components/schemas/taskresultdto'
          description: Returns an object with the id of the task performing the delete
            operation.
        "400":
          content:
            application/json:
              examples:
                "400.1 Bad Request Content":
                  description: Response for bad request content
                  value:
                    detailCode: 400.1 Bad Request Content
                    trackingId: 1ea1adcb84da4dcb890145e05745774e
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The request was syntactically correct but its content
                        is semantically invalid.
                "400.1 Dimension ids limit violation":
                  description: Dimension ids limit violation response
                  value:
                    detailCode: 400.1 Bad Request Content
                    trackingId: 77aa89ac6f0e422dbc588866abc22be9
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: dimensionIds count exceeded max limit of 50 for bulk-delete.
                "400.1.404 Referenced object not found":
                  description: Referenced object not found response
