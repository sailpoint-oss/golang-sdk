                - type: STRING
                  label: input1
                  description: "A single dynamic scalar value (i.e. number, string,\
                    \ date, etc) that can be passed into the form for use in conditional\
                    \ logic"
                formElements:
                - id: "3069272797630701"
                  elementType: SECTION
                  config:
                    label: First Section
                    formElements:
                    - id: "3069272797630700"
                      elementType: TEXT
                      key: firstName
                      config:
                        label: First Name
                    - id: "3498415402897539"
                      elementType: TEXT
                      key: lastName
                      config:
                        label: Last Name
                formConditions:
                - ruleOperator: AND
                  rules:
                  - sourceType: INPUT
                    source: Department
                    operator: EQ
                    valueType: STRING
                    value: Sales
                  effects:
                  - effectType: HIDE
                    config:
                      element: "2614088730489570"
                created: 2022-10-04T19:27:04.456Z
                modified: 2022-11-16T20:45:02.172Z
            schema:
