      - ROLE_ADMIN
      - ROLE_SUBADMIN
    patch:
      description: "This API updates an existing role using [JSON Patch](https://tools.ietf.org/html/rfc6902)\
        \ syntax.\n\nThe following fields are patchable:\n\n* name\n* description\n\
        * enabled\n* owner\n* additionalOwners\n* accessProfiles\n* entitlements\n\
        * membership\n* requestable\n* accessRequestConfig\n* revokeRequestConfig\n\
        * segments\n* accessModelMetadata   \nA token with API, ORG_ADMIN, ROLE_ADMIN,\
        \ or ROLE_SUBADMIN authority is required to call this API. In addition, a\
        \ token with ROLE_SUBADMIN authority may only call this API if all access\
        \ profiles included in the role are associated to Sources with management\
        \ workgroups of which the ROLE_SUBADMIN is a member.\n\nThe maximum supported\
        \ length for the description field is 2000 characters. Longer descriptions\
        \ will be preserved for existing roles, however, any new roles as well as\
        \ any updates to existing descriptions will be limited to 2000 characters.\n\
        \nWhen you use this API to modify a role's membership identities, you can\
        \ only modify up to a limit of 500 membership identities at a time."
      operationId: patchRoleV1
      parameters:
      - description: ID of the Role to patch
        explode: false
        in: path
        name: id
        required: true
        schema:
          example: 2c91808a7813090a017814121e121518
          type: string
        style: simple
        x-sailpoint-resource-operation-id: listRoles
      requestBody:
        content:
          application/json-patch+json:
            examples:
              Make a Role Requestable and Enable it in One Call:
                description: This example shows how multiple fields may be updated
                  with a single patch call.
                value:
                - op: replace
                  path: /requestable
                  value: true
                - op: replace
                  path: /enabled
                  value: true
              Assign a Role to a Segment:
                description: This example illustrates the use of patch to assign a
                  Role to a Segment by adding the Segment's ID to the Role's segments
                  array.
                value:
                - op: add
                  path: /segments/-
                  value: f7b1b8a3-5fed-4fd4-ad29-82014e137e19
              Set the Membership Selection Criteria to a List of Identities:
                description: "This example shows how to define a Role's membershp\
                  \ by providing a list of Identities, referenced by their IDs."
                value:
                - op: replace
                  path: /membership
                  value:
                    type: IDENTITY_LIST
                    identities:
                    - id: 2c91808973fe906c0174262092014ed9
                    - id: 2c918086262092014ed94fb8a47612f3
              Set the Membership Selection Criteria to a Standard Expression:
                description: "This example shows how to define a Role's membership\
                  \ using STANDARD criteria. In this case, the Role will be granted\
                  \ to all Identities which have the *Engineering* attribute from\
                  \ the indicated Source."
                value:
                - op: replace
                  path: /membership
                  value:
                    type: STANDARD
                    criteria:
                      operation: OR
                      children:
                      - operation: EQUALS
                        key:
                          type: ENTITLEMENT
                          property: attribute.memberOf
                          sourceId: 2c9180887701fb2014213e122092014e
                        stringValue: Engineering
              Add a New Clause as the Child of an Existing Standard Expression:
                description: This example shows how to add a child clause to an existing
                  STANDARD criteria expression.
                value:
                - op: add
                  path: /membership/criteria/children/-
                  value:
                    operation: ENDS_WITH
                    key:
                      type: IDENTITY
                      property: attribute.email
                    stringValue: '@identitynow.com'
              Assign a Access Model Metadata to a Role:
                description: This example shows how to assign a existing metadata
                  to a role.
                value:
                - op: add
                  path: /accessModelMetadata/attributes/0
                  value:
                    key: iscFederalClassifications
                    values:
                    - value: secret
              Add an Access Profile to a Role:
                description: This example shows how to add an access profile to a
                  role.
                value:
                - op: add
                  path: /accessProfiles/-
                  value:
                    id: 1de104e1f9024b1289b3a31e22d28cd1
                    type: ACCESS_PROFILE
              Add an Entitlement to a Role:
                description: This example shows how to add an entitlement to a role.
                value:
                - op: add
                  path: /entitlements/-
                  value:
                    id: 0fb2f8051e48421b8f1f8a64aee3b205
                    type: ENTITLEMENT
            schema:
              items:
                $ref: '#/components/schemas/jsonpatchoperation'
              type: array
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/role'
          description: Responds with the Role as updated.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Client Error - Returned if the request body is invalid.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listRolesV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listRolesV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
