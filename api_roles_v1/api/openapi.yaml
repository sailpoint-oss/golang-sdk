      description: "This API returns a list of Role that filter by metadata and filter,\
        \ it support filter by  both path parameter and attribute key and values.\n\
        A token with API, ORG_ADMIN, ROLE_ADMIN, ROLE_SUBADMIN, HELPDESK, CERT_ADMIN,\
        \ REPORT_ADMIN or SOURCE_ADMIN  authority is required to call this API. "
      operationId: searchRolesByFilterV1
      parameters:
      - description: "If provided, filters the returned list according to what is\
          \ visible to the indicated ROLE_SUBADMIN Identity. The value of the parameter\
          \ is either an Identity ID, or the special value **me**, which is shorthand\
          \ for the calling Identity's ID. A 400 Bad Request error is returned if\
          \ the **for-subadmin** parameter is specified for an Identity that is not\
          \ a subadmin."
        example: 5168015d32f890ca15812c9180835d2e
        explode: true
        in: query
        name: for-subadmin
        required: false
        schema:
          type: string
        style: form
      - description: "Max number of results to return See [V3 API Standard Collection\
          \ Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters)\
          \ for more information."
        example: 50
        explode: true
