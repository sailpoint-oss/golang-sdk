      properties:
        infos:
          description: Informational messages returned from the target service on
            import.
          items:
            $ref: '#/components/schemas/spconfigmessage-2'
          type: array
        warnings:
          description: Warning messages returned from the target service on import.
          items:
            $ref: '#/components/schemas/spconfigmessage-2'
          type: array
        errors:
          description: Error messages returned from the target service on import.
          items:
            $ref: '#/components/schemas/spconfigmessage-2'
          type: array
        importedObjects:
          description: References to objects that were created or updated by the import.
          items:
            $ref: '#/components/schemas/importobject'
          type: array
      required:
      - errors
      - importedObjects
      - infos
      - warnings
      title: Import Object Response Body
      type: object
    spconfigimportresults:
      description: Response Body for Config Import command.
      example:
        results:
          results:
            TRIGGER_SUBSCRIPTION:
              infos:
              - key: IMPORT_PREVIEW
                text: "Object to be imported: [c953134c-2224-42f2-a84e-fa5cbb395904,\
                  \ Test 2]"
                detail: null
              - key: IMPORT_PREVIEW
                text: "Object to be imported: [be9e116d-08e1-49fc-ab7f-fa585e96c9e4,\
                  \ Test 1]"
                detail: null
              warnings: []
              errors: []
              importedObjects: []
        exportJobId: be9e116d-08e1-49fc-ab7f-fa585e96c9e4
      properties:
        results:
          additionalProperties:
            $ref: '#/components/schemas/objectimportresult-2'
          description: The results of an object configuration import job.
          example:
            results:
              TRIGGER_SUBSCRIPTION:
                infos:
                - key: IMPORT_PREVIEW
                  text: "Object to be imported: [c953134c-2224-42f2-a84e-fa5cbb395904,\
                    \ Test 2]"
                  detail: null
                - key: IMPORT_PREVIEW
                  text: "Object to be imported: [be9e116d-08e1-49fc-ab7f-fa585e96c9e4,\
                    \ Test 1]"
                  detail: null
                warnings: []
                errors: []
                importedObjects: []
          type: object
        exportJobId:
          description: "If a backup was performed before the import, this will contain\
            \ the jobId of the backup job. This id can be used to retrieve the json\
            \ file of the backup export."
          example: be9e116d-08e1-49fc-ab7f-fa585e96c9e4
          type: string
      required:
      - results
      title: Config Import Response Body
      type: object
    spconfigrule:
      description: Format of Config Hub object rules.
      example:
        path: $.enabled
        modes:
        - RESTORE
        - PROMOTE
        value: "{}"
      properties:
        path:
          description: JSONPath expression denoting the path within the object where
            a value substitution should be applied.
          example: $.enabled
          type: string
        value:
          $ref: '#/components/schemas/spconfigrule_value'
        modes:
          description: Draft modes the rule will apply to.
          example:
          - RESTORE
          - PROMOTE
          items:
            enum:
            - RESTORE
            - PROMOTE
            - UPLOAD
            type: string
          type: array
      title: Config Object Rule
      type: object
    spconfigrules:
      description: Rules to be applied to the config object during the draft process.
      example:
        defaultRules:
        - path: $.enabled
          modes:
          - RESTORE
          - PROMOTE
          value: "{}"
        - path: $.enabled
          modes:
          - RESTORE
          - PROMOTE
          value: "{}"
        takeFromTargetRules:
        - path: $.enabled
          modes:
          - RESTORE
          - PROMOTE
          value: "{}"
        - path: $.enabled
          modes:
          - RESTORE
          - PROMOTE
          value: "{}"
        editable: true
      properties:
        takeFromTargetRules:
          items:
            $ref: '#/components/schemas/spconfigrule'
          type: array
        defaultRules:
          items:
            $ref: '#/components/schemas/spconfigrule'
          type: array
        editable:
          default: false
          description: Indicates whether the object can be edited.
          example: true
          type: boolean
      title: Config Object Rules
      type: object
    spconfigobject:
      description: Response model for object configuration.
      example:
        exportable: true
        signatureRequired: false
        legacyObject: false
        rules:
          defaultRules:
          - path: $.enabled
            modes:
            - RESTORE
            - PROMOTE
            value: "{}"
          - path: $.enabled
            modes:
            - RESTORE
            - PROMOTE
            value: "{}"
          takeFromTargetRules:
          - path: $.enabled
            modes:
            - RESTORE
            - PROMOTE
            value: "{}"
          - path: $.enabled
            modes:
            - RESTORE
            - PROMOTE
            value: "{}"
          editable: true
        referenceExtractors:
        - $.owner
        alwaysResolveById: true
        objectType: TRIGGER_SUBSCRIPTION
        onePerTenant: false
      properties:
        objectType:
          description: Object type the configuration is for.
          example: TRIGGER_SUBSCRIPTION
          type: string
        referenceExtractors:
          description: "List of JSON paths within an exported object of this type,\
            \ representing references that must be resolved."
          example:
          - $.owner
          items:
            type: string
          nullable: true
          type: array
        signatureRequired:
          default: false
          description: Indicates whether this type of object will be JWS signed and
            cannot be modified before import.
          example: false
          type: boolean
        alwaysResolveById:
          default: false
          description: Indicates whether this object type must be always be resolved
            by ID.
          example: true
          type: boolean
        legacyObject:
          default: false
          description: Indicates whether this is a legacy object.
          example: false
          type: boolean
        onePerTenant:
          default: false
          description: Indicates whether there is only one object of this type.
          example: false
          type: boolean
        exportable:
          default: false
          description: Indicates whether the object can be exported or is just a reference
            object.
          example: true
          type: boolean
        rules:
          $ref: '#/components/schemas/spconfigrules'
      title: Object Configuration Model
      type: object
    exportSpConfigV1_401_response:
      example:
        error: "JWT validation failed: JWT is expired"
      properties:
        error:
          description: A message describing the error
          example: "JWT validation failed: JWT is expired"
      type: object
    exportSpConfigV1_429_response:
      example:
        message: ' Rate Limit Exceeded '
      properties:
        message:
          description: A message describing the error
          example: ' Rate Limit Exceeded '
      type: object
    importSpConfigV1_request:
      properties:
        data:
          description: JSON file containing the objects to be imported.
          format: binary
          type: string
        options:
          $ref: '#/components/schemas/importoptions'
      required:
      - data
      type: object
    spconfigrule_value:
      anyOf:
      - type: object
      - items:
          type: object
        type: array
      - type: string
      - type: number
      - type: boolean
      description: Value to be assigned at the jsonPath location within the object.
      nullable: true
