openapi: 3.0.1
info:
  contact:
    name: Developer Relations
    url: https://developer.sailpoint.com/discuss/api-help
  description: "Use these APIs to interact with the Identity Security Cloud platform\
    \ to achieve repeatable, automated processes with greater scalability. We encourage\
    \ you to join the SailPoint Developer Community forum at https://developer.sailpoint.com/discuss\
    \ to connect with other developers using our APIs."
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://developer.sailpoint.com/discuss/tos
  title: Identity Security Cloud API - SP-Config
  version: v1
servers:
- description: This is the production API server.
  url: "https://{tenant}.api.identitynow.com"
  variables:
    tenant:
      default: sailpoint
      description: "This is the name of your tenant, typically your company's name."
- description: This is the versioned API server.
  url: "https://{apiUrl}"
  variables:
    apiUrl:
      default: sailpoint.api.identitynow.com
      description: This is the api url of your tenant
security:
- userAuth:
  - sp:scopes:all
tags:
- description: Import and export configuration for some objects between tenants.
  name: SP-Config
paths:
  /sp-config/v1/export:
    post:
      description: |-
        This post will export objects from the tenant to a JSON configuration file.
        For more information about the object types that currently support export functionality, refer to [SaaS Configuration](https://developer.sailpoint.com/docs/extensibility/configuration-management/saas-configuration#supported-objects).
      operationId: exportSpConfigV1
      requestBody:
        content:
          application/json:
            examples:
              Export all objects available:
                description: Export all object types available in IDN.
                value:
                  description: Export all available objects
                  excludeTypes: []
                  includeTypes:
                  - ACCESS_PROFILE
                  - ACCESS_REQUEST_CONFIG
                  - ATTR_SYNC_SOURCE_CONFIG
                  - AUTH_ORG
                  - CAMPAIGN_FILTER
                  - CONNECTOR_RULE
                  - FORM_DEFINITION
                  - GOVERNANCE_GROUP
                  - IDENTITY_OBJECT_CONFIG
                  - IDENTITY_PROFILE
                  - LIFECYCLE_STATE
                  - NOTIFICATION_TEMPLATE
                  - PASSWORD_POLICY
                  - PASSWORD_SYNC_GROUP
                  - PUBLIC_IDENTITIES_CONFIG
                  - ROLE
                  - RULE
                  - SEGMENT
                  - SERVICE_DESK_INTEGRATION
                  - SOD_POLICY
                  - SOURCE
                  - TAG
                  - TRANSFORM
                  - TRIGGER_SUBSCRIPTION
                  - WORKFLOW
                  objectOptions: {}
              Export sources by ID:
                description: Export only sources that match the IDs specified in the
                  export options.
                value:
                  description: Export sources by ID
                  excludeTypes: []
                  includeTypes:
                  - SOURCE
                  objectOptions:
                    SOURCE:
                      includedIds:
                      - be9e116d-08e1-49fc-ab7f-fa585e96c9e4
                      - be9p119e-90e1-49pk-ac9f-fa576e96c9e4
                      includedNames: []
              Export transforms by name:
                description: Export only transforms that match the names specified
                  in the export options.
                value:
                  description: Export transforms by name
                  excludeTypes: []
                  includeTypes:
                  - TRANSFORM
                  objectOptions:
                    TRANSFORM:
                      includedIds: []
                      includedNames:
                      - Remove Diacritical Marks
                      - Common - Location Lookup
              Export trigger subscriptions triggers and transforms with custom options:
                description: Export trigger subscriptions and transforms that match
                  the export options.
                value:
                  description: Export trigger subscriptions and transforms with custom
                    filter options
                  excludeTypes: []
                  includeTypes:
                  - TRANSFORM
                  - TRIGGER_SUBSCRIPTION
                  objectOptions:
                    TRANSFORM:
                      includedIds: []
                      includedNames:
                      - Remove Diacritical Marks
                      - Common - Location Lookup
                    TRIGGER_SUBSCRIPTION:
                      includedIds:
                      - be9e116d-08e1-49fc-ab7f-fa585e96c9e4
                      - be9p119e-90e1-49pk-ac9f-fa576e96c9e4
                      includedNames:
                      - "NGROK Test: fire and forget"
                      - Manager Certification
            schema:
              $ref: '#/components/schemas/exportpayload'
        description: Export options control what will be included in the export.
        required: true
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/spconfigexportjob'
          description: Export job accepted and queued for processing.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: |
            Client Error - Returned if the request body is invalid.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/exportSpConfigV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "404":
          content:
            application/json:
              examples:
                "404":
                  summary: An example of a 404 response object
                  value:
                    detailCode: 404 Not found
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server did not find a current representation for the
                        target resource.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Not Found - returned if the request URL refers to a resource
            or object that does not exist
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/exportSpConfigV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              examples:
                "500":
                  summary: An example of a 500 response object
                  value:
                    detailCode: 500.0 Internal Fault
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: An internal fault occurred.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Internal Server Error - Returned if there is an unexpected
            error.
      security:
      - userAuth:
        - sp:config:read
        - sp:config:manage
      summary: Initiates configuration objects export job
      tags:
      - SP-Config
      x-sailpoint-userLevels:
      - ORG_ADMIN
  /sp-config/v1/export/{id}:
    get:
      description: |-
        This gets the status of the export job identified by the `id` parameter.
        The request will need one of the following security scopes:
        - sp:config:read - sp:config:manage
      operationId: getSpConfigExportStatusV1
      parameters:
      - description: The ID of the export job whose status will be returned.
        example: ef38f94347e94562b5bb8424a56397d8
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
        x-sailpoint-resource-operation-id: exportSpConfigV1
      responses:
        "200":
          content:
            application/json:
              example:
                jobId: 1e824aa0-4c6e-4f14-95e9-e7dc5234aa51
                status: COMPLETE
                type: EXPORT
                message: null
                description: Export Job 1 Test
                expiration: 2021-05-20T15:04:24Z
                created: 2021-05-13T15:04:24.112Z
                modified: 2021-05-13T15:04:27.363Z
                completed: 2021-05-13T15:04:27.358Z
              schema:
                $ref: '#/components/schemas/spconfigexportjobstatus'
