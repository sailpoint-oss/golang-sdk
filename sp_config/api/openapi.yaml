      security:
      - userAuth:
        - sp:config:read
        - sp:config:manage
      summary: Get export job status
      tags:
      - SP-Config
      x-sailpoint-userLevels:
      - ORG_ADMIN
  /sp-config/v1/export/{id}/download:
    get:
      description: |-
        This endpoint gets the export file resulting from the export job with the requested `id` and downloads it to a file.
