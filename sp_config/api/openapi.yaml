        - sp:config:read - sp:config:manage
      operationId: getSpConfigExportV1
      parameters:
      - description: The ID of the export job whose results will be downloaded.
        example: ef38f94347e94562b5bb8424a56397d8
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
