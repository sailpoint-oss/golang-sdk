openapi: 3.0.1
info:
  contact:
    name: Developer Relations
    url: https://developer.sailpoint.com/discuss/api-help
  description: "Use these APIs to interact with the Identity Security Cloud platform\
    \ to achieve repeatable, automated processes with greater scalability. We encourage\
    \ you to join the SailPoint Developer Community forum at https://developer.sailpoint.com/discuss\
    \ to connect with other developers using our APIs."
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://developer.sailpoint.com/discuss/tos
  title: Identity Security Cloud API - Custom User Levels
  version: v1
servers:
- description: This is the production API server.
  url: "https://{tenant}.api.identitynow.com"
  variables:
    tenant:
      default: sailpoint
      description: "This is the name of your tenant, typically your company's name."
- description: This is the versioned API server.
  url: "https://{apiUrl}"
  variables:
    apiUrl:
      default: sailpoint.api.identitynow.com
      description: This is the api url of your tenant
security:
- userAuth:
  - sp:scopes:all
tags:
- description: |
    Use this API to implement custom user level functionality.
    With this functionality in place, administrators can create custom user levels and configure them for use throughout Identity Security Cloud.

    Custom user levels allow administrators to create custom user levels that can be used to control access to Identity Security Cloud features and APIs.

    Refer to [User Levels](https://documentation.sailpoint.com/saas/help/common/users/index.html) for more information about User Levels.
  name: Custom User Levels
paths:
  /authorization/v1/custom-user-levels:
    get:
      description: Retrieves a list of user levels for the tenant.
      operationId: listUserLevelsV1
      parameters:
      - description: Use this header to enable this experimental API.
        example: true
        explode: false
        in: header
        name: X-SailPoint-Experimental
        required: true
        schema:
          default: "true"
          type: string
        style: simple
      - description: Specifies the level of detail for the user levels.
        example: FULL
        explode: true
        in: query
        name: detailLevel
        required: false
        schema:
          default: basic
          enum:
          - FULL
          - SLIM
          type: string
        style: form
      - description: "Filter results using the standard syntax described in [V3 API\
          \ Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#filtering-results)\n\
          \nFiltering is supported for the following fields and operators:\n\n**name**:\
          \ *co*  \n\n**owner**: *co*  \n\n**status**: *eq*\n\n**description**: *co*"
        example: "name co \"identity\", owner co \"john\", status eq \"active\", description\
          \ co \"some description\""
        explode: true
        in: query
        name: filters
        required: false
        schema:
          type: string
        style: form
      - description: |-
          Sort results using the standard syntax described in [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#sorting-results)

          Sorting is supported for the following fields: **name, created, description, status, owner**
        example: "name, -created, description, status, owner"
        explode: true
        in: query
        name: sorters
        required: false
        schema:
          type: string
        style: form
      - description: |-
          Note that for this API the maximum value for limit is 50.
          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: 50
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 50
          format: int32
          maximum: 50
          minimum: 0
          type: integer
        style: form
      - description: |-
          Offset into the full result set. Usually specified with *limit* to paginate through the results.
          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: 0
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          format: int32
          minimum: 0
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              example:
              - owner:
                  type: IDENTITY
                  id: 29b9da8273b441239238bc041c386817
                  name: John Doe
                status: ACTIVE
                created: 2023-01-01T12:00:00Z
                modified: 2023-01-02T12:00:00Z
                associatedIdentitiesCount: 10
                id: beb02a57-010f-4c29-a6d2-fae9628bda73
                name: Identity And Detail Management
                description: This is a description of the custom user level.
                legacyGroup: null
                rightSets:
                - id: idn:ui-identity-manage-example
                  name: Identity Management
                  description: Access to manage all identities.
                  category: identity
                  rights:
                  - idn:ui-identity-example:read
                  - idn:ui-identity-example:write
                  rightSetIds:
                  - idn:identity-management-example
                  uiAssignableChildRightSetIds:
                  - idn:ui-identity-details-read-example
                  - idn:ui-identity-list-read-example
                  uiAssignable: true
                  translatedName: Identity Management
                  translatedDescription: Access to manage all identities.
                  parentId: null
                - id: idn:ui-identity-details-read-example
                  name: Identity Details Read
                  description: Read only access for identity details.
                  category: identity
                  rights:
                  - idn:ui-identity-details-example:read
                  rightSetIds: []
                  uiAssignableChildRightSetIds: []
                  uiAssignable: true
                  translatedName: Identity Details Read
                  translatedDescription: Read only access for identity details.
                  parentId: idn:ui-identity-manage-example
                custom: true
                adminAssignable: true
                translatedName: null
                translatedGrant: null
                translatedRemove: null
              schema:
                items:
                  $ref: '#/components/schemas/userlevelsummarydto'
                type: array
          description: Successfully retrieved the list of user levels.
          headers:
            X-Total-Count:
              description: Total number of user levels.
              example: 10
              explode: false
              schema:
                type: integer
              style: simple
            accept-language:
              description: The locale to use for translations for the response
              explode: false
              schema:
                type: string
              style: simple
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Client Error - Returned if the request body is invalid.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listUserLevelsV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "404":
          content:
            application/json:
              examples:
                "404":
                  summary: An example of a 404 response object
                  value:
                    detailCode: 404 Not found
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server did not find a current representation for the
                        target resource.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Not Found - returned if the request URL refers to a resource
            or object that does not exist
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listUserLevelsV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              examples:
                "500":
                  summary: An example of a 500 response object
                  value:
                    detailCode: 500.0 Internal Fault
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: An internal fault occurred.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Internal Server Error - Returned if there is an unexpected
            error.
      security:
      - userAuth:
        - idn:user-level:manage
      summary: List user levels
      tags:
      - Custom User Levels
      x-sailpoint-userLevels:
      - ORG_ADMIN
