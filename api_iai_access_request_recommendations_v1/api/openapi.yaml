openapi: 3.0.1
info:
  contact:
    name: Developer Relations
    url: https://developer.sailpoint.com/discuss/api-help
  description: "Use these APIs to interact with the Identity Security Cloud platform\
    \ to achieve repeatable, automated processes with greater scalability. We encourage\
    \ you to join the SailPoint Developer Community forum at https://developer.sailpoint.com/discuss\
    \ to connect with other developers using our APIs."
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://developer.sailpoint.com/discuss/tos
  title: Identity Security Cloud API - IAI Access Request Recommendations
  version: v1
servers:
- description: This is the production API server.
  url: "https://{tenant}.api.identitynow.com"
  variables:
    tenant:
      default: sailpoint
      description: "This is the name of your tenant, typically your company's name."
- description: This is the versioned API server.
  url: "https://{apiUrl}"
  variables:
    apiUrl:
      default: sailpoint.api.identitynow.com
      description: This is the api url of your tenant
security:
- userAuth:
  - sp:scopes:all
tags:
- name: IAI Access Request Recommendations
paths:
  /ai-access-request-recommendations/v1:
    get:
      description: This API returns the access request recommendations for the specified
        identity. The default identity is *me* which indicates the current user.
      operationId: getAccessRequestRecommendationsV1
      parameters:
      - description: Get access request recommendations for an identityId. *me* indicates
          the current user.
        example: 2c91808570313110017040b06f344ec9
        explode: true
        in: query
        name: identity-id
        required: false
        schema:
          default: me
          type: string
        style: form
      - description: Max number of results to return.
        example: 15
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 15
          format: int32
          maximum: 15
          minimum: 0
          type: integer
        style: form
      - description: |-
          Offset into the full result set. Usually specified with *limit* to paginate through the results.
          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: 0
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          format: int32
          minimum: 0
          type: integer
        style: form
      - description: |-
          If *true* it will populate the *X-Total-Count* response header with the number of results that would be returned if *limit* and *offset* were ignored.

          Since requesting a total count can have a performance impact, it is recommended not to send **count=true** if that value will not be used.

          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: true
        explode: true
        in: query
        name: count
        required: false
        schema:
          default: false
          type: boolean
        style: form
      - description: If *true* it will populate a list of translation messages in
          the response.
        example: false
        explode: true
        in: query
        name: include-translation-messages
        required: false
        schema:
          default: false
          type: boolean
        style: form
      - description: |-
          Filter results using the standard syntax described in [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#filtering-results)

          Filtering is supported for the following fields and operators:

          **access.name**: *co*

          **access.type**: *eq, in*

          **access.description**: *co, eq, in*
        example: access.name co "admin"
        explode: true
        in: query
        name: filters
        required: false
        schema:
          type: string
        style: form
      - description: |-
          Sort results using the standard syntax described in [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#sorting-results)

          Sorting is supported for the following fields: **access.name, access.type**

          By default the recommendations are sorted by highest confidence first.
        example: access.name
        explode: true
        in: query
        name: sorters
        required: false
        schema:
          format: comma-separated
          type: string
        style: form
      - description: Use this header to enable this experimental API.
        example: true
        explode: false
        in: header
        name: X-SailPoint-Experimental
        required: true
        schema:
          default: "true"
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/accessrequestrecommendationitemdetail'
                type: array
          description: List of access request recommendations for the identityId
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Client Error - Returned if the request body is invalid.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getAccessRequestRecommendationsV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getAccessRequestRecommendationsV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              examples:
                "500":
                  summary: An example of a 500 response object
                  value:
                    detailCode: 500.0 Internal Fault
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: An internal fault occurred.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Internal Server Error - Returned if there is an unexpected
            error.
      security:
      - userAuth:
        - iai:access-request-recommender:read
        - iai:access-request-recommender:manage
      - applicationAuth:
        - iai:access-request-recommender:read
        - iai:access-request-recommender:manage
      summary: Identity access request recommendations
      tags:
      - IAI Access Request Recommendations
      x-sailpoint-userLevels:
      - Any
