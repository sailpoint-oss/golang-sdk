            invalid.
          locale: en-US
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        messages:
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        detailCode: 400.1 Bad Request Content
        trackingId: e7eab60924f64aa284175b9fa3309599
      properties:
        detailCode:
          description: Fine-grained error code providing more detail of the error.
          example: 400.1 Bad Request Content
          type: string
        trackingId:
          description: Unique tracking id for the error.
          example: e7eab60924f64aa284175b9fa3309599
          type: string
        messages:
          description: Generic localized reason for error
          items:
            $ref: '#/components/schemas/errormessagedto'
          type: array
        causes:
          description: Plain-text descriptive reasons to provide additional detail
            to the text provided in the messages field
          items:
            $ref: '#/components/schemas/errormessagedto'
          type: array
      title: Error Response Dto
      type: object
    accessrequestrecommendationconfigdto:
      example:
        scoreThreshold: 0.5
        startDateAttribute: startDate
        restrictionAttribute: location
        moverAttribute: isMover
        joinerAttribute: isJoiner
        useRestrictionAttribute: true
      properties:
        scoreThreshold:
          description: The value that internal calculations need to exceed for recommendations
            to be made.
          example: 0.5
          format: float
          type: number
        startDateAttribute:
          description: Use to map an attribute name for determining identities' start
            date.
          example: startDate
          type: string
        restrictionAttribute:
          description: Use to only give recommendations based on this attribute.
          example: location
          type: string
        moverAttribute:
          description: Use to map an attribute name for determining whether identities
            are movers.
          example: isMover
          type: string
        joinerAttribute:
          description: Use to map an attribute name for determining whether identities
            are joiners.
          example: isJoiner
          type: string
        useRestrictionAttribute:
          default: false
          description: Use only the attribute named in restrictionAttribute to make
            recommendations.
          example: true
          type: boolean
      required:
      - scoreThreshold
      title: Access Request Recommendation Config Dto
      type: object
    accessrequestrecommendationitem:
      example:
        id: 2c9180835d2e5168015d32f890ca1581
        type: ACCESS_PROFILE
      properties:
        id:
          description: ID of access item being recommended.
          example: 2c9180835d2e5168015d32f890ca1581
          format: UUID
          type: string
        type:
          $ref: '#/components/schemas/accessrequestrecommendationitemtype'
      title: Access Request Recommendation Item
      type: object
    accessrequestrecommendationactionitemresponsedto:
      example:
        access:
          id: 2c9180835d2e5168015d32f890ca1581
          type: ACCESS_PROFILE
        identityId: 2c91808570313110017040b06f344ec9
        timestamp: 2017-07-11T18:45:37.098Z
      properties:
        identityId:
          description: The identity ID taking the action.
          example: 2c91808570313110017040b06f344ec9
          format: UUID
          type: string
        access:
