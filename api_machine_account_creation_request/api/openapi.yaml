components:
  responses:
    "400":
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorresponsedto'
      description: Client Error - Returned if the request body is invalid.
    "401":
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/createMachineAccountRequestV1_401_response'
      description: "Unauthorized - Returned if there is no authorization header, or\
        \ if the JWT token is expired."
    "403":
      content:
        application/json:
          examples:
            "403":
              summary: An example of a 403 response object
              value:
                detailCode: 403 Forbidden
                trackingId: b21b1f7ce4da4d639f2c62a57171b427
                messages:
                - locale: en-US
                  localeOrigin: DEFAULT
                  text: The server understood the request but refuses to authorize
                    it.
          schema:
            $ref: '#/components/schemas/errorresponsedto'
      description: "Forbidden - Returned if the user you are running as, doesn't have\
        \ access to this end-point."
    "404":
      content:
        application/json:
          examples:
            "404":
              summary: An example of a 404 response object
              value:
                detailCode: 404 Not found
                trackingId: b21b1f7ce4da4d639f2c62a57171b427
                messages:
                - locale: en-US
                  localeOrigin: DEFAULT
                  text: The server did not find a current representation for the target
                    resource.
          schema:
            $ref: '#/components/schemas/errorresponsedto'
      description: Not Found - returned if the request URL refers to a resource or
        object that does not exist
    "429":
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/createMachineAccountRequestV1_429_response'
      description: Too Many Requests - Returned in response to too many requests in
        a given period of time - rate limited. The Retry-After header in the response
        includes how long to wait before trying again.
    "500":
      content:
        application/json:
          examples:
            "500":
              summary: An example of a 500 response object
              value:
                detailCode: 500.0 Internal Fault
                trackingId: b21b1f7ce4da4d639f2c62a57171b427
                messages:
                - locale: en-US
                  localeOrigin: DEFAULT
                  text: An internal fault occurred.
          schema:
            $ref: '#/components/schemas/errorresponsedto'
      description: Internal Server Error - Returned if there is an unexpected error.
  schemas:
    machineaccountcreaterequestinput:
      description: Contains the required information for processing a user-initiated
        machine account creation request.
      properties:
        subtypeId:
          description: Subtype ID for which machine account create is enabled and
            user have the entitlement to create the machine account.
          example: 6d28b7c1-620c-49c6-b6d5-cbf81eb4b5fa
          type: string
        formId:
          description: Form ID selected by user for the machine account create request.
          example: f5dd23fe-3414-42b7-bb1c-869400ad7a10
          type: string
        ownerIdentityId:
          description: Owner Identity ID. This identity will be assigned as an owner
            of the created machine account.
          example: 18104e7e499b4e23882d6323344ab6bc
          type: string
        machineIdentityId:
          description: "Machine identity to correlate with the created machine account.\
            \ If not provided, a new machine identity will be created."
          example: 6d28b7c1-620c-49c6-b6d5-cbf81eb4b5fa
          nullable: true
          type: string
        environment:
          description: Environment type to use for the machine account.
          example: Dev
          type: string
        description:
          description: Description for the machine account.
          example: Requesting machine account for tracking the inventory.
          type: string
        userInput:
          description: Fields of the form linked to the subtype in approval settings.
          example:
            target: AD Source
            description: Inventory tracking
          type: object
        entitlementIds:
          description: List of entitlement IDs to provision for created machine account.
          example:
          - 6d28b7c1620c49c6b6d5cbf81eb4b5fa
          - 2c91808a7624751a01762f19d67c220e
          items:
            type: string
          type: array
      required:
      - ownerIdentityId
      - subtypeId
      title: Machine Account Create Request Input
      type: object
    accountrequestasyncresult:
      description: Asynchronous response containing a unique tracking ID for the account
        request
      example:
        accountRequestId: 2d81808474683da6017468693c260196
      properties:
        accountRequestId:
          description: Id of the account request
          example: 2d81808474683da6017468693c260196
          type: string
      required:
      - accountRequestId
      title: Account Create/Delete Async Result
      type: object
    localeorigin:
      description: "An indicator of how the locale was selected. *DEFAULT* means the\
        \ locale is the system default. *REQUEST* means the locale was selected from\
        \ the request context (i.e., best match based on the *Accept-Language* header).\
        \ Additional values may be added in the future without notice."
      enum:
      - DEFAULT
      - REQUEST
      - null
      example: DEFAULT
      nullable: true
      type: string
    errormessagedto:
      example:
        localeOrigin: DEFAULT
        text: The request was syntactically correct but its content is semantically
          invalid.
        locale: en-US
      properties:
        locale:
          description: "The locale for the message text, a BCP 47 language tag."
          example: en-US
          nullable: true
          type: string
        localeOrigin:
          $ref: '#/components/schemas/localeorigin'
        text:
          description: Actual text of the error message in the indicated locale.
          example: The request was syntactically correct but its content is semantically
            invalid.
          type: string
      title: Error Message Dto
      type: object
    errorresponsedto:
      example:
        causes:
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        messages:
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        - localeOrigin: DEFAULT
          text: The request was syntactically correct but its content is semantically
            invalid.
          locale: en-US
        detailCode: 400.1 Bad Request Content
        trackingId: e7eab60924f64aa284175b9fa3309599
      properties:
        detailCode:
          description: Fine-grained error code providing more detail of the error.
          example: 400.1 Bad Request Content
          type: string
        trackingId:
          description: Unique tracking id for the error.
          example: e7eab60924f64aa284175b9fa3309599
          type: string
        messages:
          description: Generic localized reason for error
          items:
            $ref: '#/components/schemas/errormessagedto'
          type: array
        causes:
          description: Plain-text descriptive reasons to provide additional detail
            to the text provided in the messages field
          items:
            $ref: '#/components/schemas/errormessagedto'
          type: array
      title: Error Response Dto
      type: object
    dtotype:
      description: An enumeration of the types of DTOs supported within the IdentityNow
        infrastructure.
      enum:
      - ACCOUNT_CORRELATION_CONFIG
      - ACCESS_PROFILE
      - ACCESS_REQUEST_APPROVAL
      - ACCOUNT
      - APPLICATION
      - CAMPAIGN
      - CAMPAIGN_FILTER
      - CERTIFICATION
      - CLUSTER
      - CONNECTOR_SCHEMA
      - ENTITLEMENT
      - GOVERNANCE_GROUP
      - IDENTITY
      - IDENTITY_PROFILE
      - IDENTITY_REQUEST
      - MACHINE_IDENTITY
      - LIFECYCLE_STATE
      - PASSWORD_POLICY
      - ROLE
      - RULE
      - SOD_POLICY
      - SOURCE
      - TAG
      - TAG_CATEGORY
      - TASK_RESULT
      - REPORT_RESULT
      - SOD_VIOLATION
      - ACCOUNT_ACTIVITY
      - WORKGROUP
      example: IDENTITY
      type: string
    basereferencedto:
      properties:
        type:
          $ref: '#/components/schemas/dtotype'
        id:
          description: ID of the object to which this reference applies
          example: 2c91808568c529c60168cca6f90c1313
          type: string
        name:
          description: Human-readable display name of the object to which this reference
            applies
          example: William Wilson
          type: string
      title: Base Reference Dto
      type: object
    accountrequestphasestate:
      description: "The current phase state of the account request, indicating its\
        \ progress or outcome in the approval workflow."
      enum:
      - PENDING
      - CANCELLED
      - APPROVED
      - REJECTED
      - PASSED
      - FAILED
      - NOT_STARTED
      example: APPROVED
      type: string
    accountrequestphase:
      description: "Contains detailed information about each phase in the account\
        \ request process, including its type, current state, and relevant timestamps."
      properties:
        name:
          description: Enum of account request phase type
          enum:
          - APPROVAL_PHASE
          - PROVISIONING_PHASE
          example: APPROVAL_PHASE
          title: AccountRequestPhaseType
          type: string
        state:
          $ref: '#/components/schemas/accountrequestphasestate'
        started:
          description: Start date of account request phase.
          example: 2026-01-21T11:43:22.432Z
          format: date-time
          readOnly: true
          type: string
        finished:
          description: Finish date of account request phase.
          example: 2026-01-21T11:45:22.432Z
          format: date-time
          readOnly: true
          type: string
      title: Account Request phase
      type: object
    accountrequestdetailsdto:
      description: Represents a request to create a machine account.
      example:
        requester:
          name: William Wilson
          id: 2c91808568c529c60168cca6f90c1313
          type: IDENTITY
        createdAt: 2026-01-20T21:30:00Z
        accountRequestId: 2d8180a46faadee4016fb4e018c20648
        completedAt: 2026-01-20T21:35:00Z
        requestType: CREATE_MACHINE_ACCOUNT
        accountRequestPhases:
        - name: APPROVAL_PHASE
          state: APPROVED
          started: 2026-01-14T08:08:28.644090559Z
          finished: 2026-01-14T08:38:42.707043142Z
        - name: PROVISIONING_PHASE
          state: PASSED
          started: 2026-01-14T08:38:42.785577841Z
          finished: 2026-01-14T08:38:45.932606296Z
        overallStatus: SUCCESS
        errorDetails: Detailed error message.
      properties:
        accountRequestId:
          description: Account request ID.
          example: 2d8180a46faadee4016fb4e018c20648
          type: string
        requestType:
          description: Type of the account request.
          example: CREATE_MACHINE_ACCOUNT
          type: string
        createdAt:
          description: Machine account creation request creation date and time.
          example: 2026-01-20T21:30:00Z
          format: date-time
          readOnly: true
          type: string
        completedAt:
          description: Machine account creation request completion date and time.
          example: 2026-01-20T21:35:00Z
          format: date-time
          nullable: true
          readOnly: true
          type: string
        overallStatus:
          description: Overall status of the creation request.
          example: SUCCESS
          type: string
        requester:
          $ref: '#/components/schemas/accountrequestdetailsdto_requester'
        accountRequestPhases:
          description: List of account request phases.
          example:
          - name: APPROVAL_PHASE
            state: APPROVED
            started: 2026-01-14T08:08:28.644090559Z
            finished: 2026-01-14T08:38:42.707043142Z
          - name: PROVISIONING_PHASE
            state: PASSED
            started: 2026-01-14T08:38:42.785577841Z
            finished: 2026-01-14T08:38:45.932606296Z
          items:
            $ref: '#/components/schemas/accountrequestphase'
          type: array
        errorDetails:
