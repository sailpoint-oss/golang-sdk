  schemas:
    workitemstatemanualworkitems:
      description: The state of a work item
      enum:
      - Finished
      - Rejected
      - Returned
      - Expired
      - Pending
      - Canceled
      example: Finished
      type: string
    workitemtypemanualworkitems:
      description: The type of the work item
      enum:
      - Generic
      - Certification
      - Remediation
      - Delegation
      - Approval
      - ViolationReview
      - Form
      - PolicyVioloation
      - Challenge
      - ImpactAnalysis
      - Signoff
      - Event
      - ManualAction
      - Test
      example: Generic
      type: string
    remediationitemdetails:
      example:
        targetName: john.smith
        targetId: 2c9180835d2e5168015d32f890ca1581
        attributeValue: 512-555-1212
        targetDisplayName: emailAddress
        attributeName: phoneNumber
        id: 2c9180835d2e5168015d32f890ca1581
        applicationName: Active Directory
        attributeOperation: update
        nativeIdentity: jason.smith2
      properties:
        id:
          description: The ID of the certification
          example: 2c9180835d2e5168015d32f890ca1581
          type: string
        targetId:
          description: The ID of the certification target
          example: 2c9180835d2e5168015d32f890ca1581
          type: string
        targetName:
          description: The name of the certification target
          example: john.smith
          type: string
        targetDisplayName:
          description: The display name of the certification target
          example: emailAddress
          type: string
        applicationName:
          description: The name of the application/source
          example: Active Directory
          type: string
        attributeName:
          description: The name of the attribute being certified
          example: phoneNumber
          type: string
        attributeOperation:
          description: The operation of the certification on the attribute
          example: update
          type: string
        attributeValue:
          description: The value of the attribute being certified
          example: 512-555-1212
          type: string
        nativeIdentity:
          description: The native identity of the target
          example: jason.smith2
          type: string
      title: Remediation Item Details
      type: object
    workitemstate:
      description: The state of a work item
      enum:
      - Finished
      - Rejected
      - Returned
      - Expired
      - Pending
      - Canceled
      - null
      example: Pending
      nullable: true
      type: string
    approvalitemdetails:
      example:
        application: Active Directory
        name: emailAddress
        id: 2c9180835d2e5168015d32f890ca1581
        state: ""
        operation: update
        value: a@b.com
        account: john.smith
      properties:
        id:
          description: The approval item's ID
          example: 2c9180835d2e5168015d32f890ca1581
          type: string
        account:
          description: The account referenced by the approval item
          example: john.smith
          nullable: true
          type: string
        application:
          description: The name of the application/source
          example: Active Directory
          type: string
        name:
          description: The attribute's name
          example: emailAddress
          nullable: true
          type: string
        operation:
          description: The attribute's operation
          example: update
          type: string
        value:
          description: The attribute's value
          example: a@b.com
          nullable: true
          type: string
        state:
          allOf:
          - $ref: '#/components/schemas/workitemstate'
          - nullable: true
      title: Approval Item Details
      type: object
    formitemdetails:
      properties:
        name:
          description: Name of the FormItem
          example: Field1
          nullable: true
          type: string
      title: Form Item Details
      type: object
    sectiondetails:
      allOf:
      - $ref: '#/components/schemas/formitemdetails'
      - properties:
          label:
            description: Label of the section
            example: Section 1
            nullable: true
            type: string
          formItems:
            description: List of FormItems. FormItems can be SectionDetails and/or
              FieldDetails
            example: []
