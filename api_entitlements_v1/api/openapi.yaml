        example: "name,id"
        explode: true
        in: query
        name: sorters
        required: false
        schema:
          format: comma-separated
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              example:
              - sourceSchemaObjectType: group
                attribute: memberOf
                attributes:
                  GroupType: Security
                  sAMAccountName: Account Payable
                  GroupScope: Global
                  objectguid: "{01a6e70b-9705-4155-a5c6-492a9bcc8c64}"
                  objectSid: S-1-5-21-3585869415-1648031554-2909195034-1633
                  cn: Account Payable
                  msDS-PrincipalName: AUTOMATIONAD\Account Payable
                value: "CN=Account Payable,OU=Finance,DC=xyz company"
                description: "This entitlement allows users to access the accounts\
                  \ payable module of the organization's financial management system.\
                  \ Users can view, process, and approve invoices, manage vendor relationships,\
                  \ and perform other accounts payable-related tasks."
                privilegeLevel: null
                cloudGoverned: false
                source:
                  type: SOURCE
                  id: 2c9180877504c40e0175097d5ce707c8
                  name: EndToEnd-ADSource
                owner:
                  id: 2a2fdacca5e345f18bf7970cfbb8fec2
                  name: identity 1
                  type: IDENTITY
                segments:
                - 1d126fe0-45e2-4aea-bc64-a07e9344ef26
                manuallyUpdatedFields:
                  DISPLAY_NAME: true
                  DESCRIPTION: true
                id: 2c91808c74ff913f0175097daa9d59cd
                name: Account Payable
