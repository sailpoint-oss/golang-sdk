openapi: 3.0.1
info:
  contact:
    name: Developer Relations
    url: https://developer.sailpoint.com/discuss/api-help
  description: "Use these APIs to interact with the Identity Security Cloud platform\
    \ to achieve repeatable, automated processes with greater scalability. We encourage\
    \ you to join the SailPoint Developer Community forum at https://developer.sailpoint.com/discuss\
    \ to connect with other developers using our APIs."
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://developer.sailpoint.com/discuss/tos
  title: Identity Security Cloud API - Entitlements
  version: v1
servers:
- description: This is the production API server.
  url: "https://{tenant}.api.identitynow.com"
  variables:
    tenant:
      default: sailpoint
      description: "This is the name of your tenant, typically your company's name."
- description: This is the versioned API server.
  url: "https://{apiUrl}"
  variables:
    apiUrl:
      default: sailpoint.api.identitynow.com
      description: This is the api url of your tenant
security:
- userAuth:
  - sp:scopes:all
tags:
- name: Entitlements
paths:
  /entitlements/v1:
    get:
      description: This API returns a list of entitlements. Any authenticated token
        can call this API.
      operationId: listEntitlementsV1
      parameters:
      - description: "If present and not empty, additionally filters Entitlements\
          \ to those which are assigned to the Segment(s) which are visible to the\
          \ Identity with the specified ID."
        example: e554098913544630b5985e9042f5e44b
        explode: true
        in: query
        name: segmented-for-identity
        required: false
        schema:
          type: string
        style: form
      - description: "If present and not empty, additionally filters Access Profiles\
          \ to those which are assigned to the Segment(s) with the specified IDs."
        example: "041727d4-7d95-4779-b891-93cf41e98249,a378c9fa-bae5-494c-804e-a1e30f69f649"
        explode: true
        in: query
        name: for-segment-ids
        required: false
        schema:
          format: comma-separated
          type: string
        style: form
      - description: "Whether or not the response list should contain unsegmented\
          \ Entitlements. If **for-segment-ids** and **segmented-for-identity** are\
          \ both absent or empty, specifying **include-unsegmented=false** results\
          \ in an error."
        example: true
        explode: true
        in: query
        name: include-unsegmented
        required: false
        schema:
          default: true
          type: boolean
        style: form
      - description: |-
          Offset into the full result set. Usually specified with *limit* to paginate through the results.
          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: 0
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          format: int32
          minimum: 0
          type: integer
        style: form
      - description: |-
          Max number of results to return.
          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: 250
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 250
          format: int32
          maximum: 250
          minimum: 0
          type: integer
        style: form
      - description: |-
          If *true* it will populate the *X-Total-Count* response header with the number of results that would be returned if *limit* and *offset* were ignored.

          Since requesting a total count can have a performance impact, it is recommended not to send **count=true** if that value will not be used.

          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: true
        explode: true
        in: query
        name: count
        required: false
        schema:
          default: false
          type: boolean
        style: form
      - description: |-
          Used to begin the search window at the values specified.

          This parameter consists of the last values of the sorted fields in the current record set.

          searchAfter length must match the number of sorters.

          This is used to expand the Elasticsearch limit of 10K records by shifting the 10K window to begin at this value.

          It is recommended that you always include the ID of the object in addition to any other fields on this parameter in order to ensure you don't get duplicate results while paging.

          For example, if you are sorting by name you will also want to include ID, for example searchAfter=Account Payable,2c91808375d8e80a0175e1f88a575221&sorters=name,id.

          If the last entitlement ID in the search result is 2c91808375d8e80a0175e1f88a575221 and the last name is "Account Payable", then using that name and ID will start a new search after this entitlement.
        example: "Account Payable,2c91808375d8e80a0175e1f88a575221"
        explode: true
        in: query
        name: searchAfter
        required: false
        schema:
          format: comma-separated
          type: string
        style: form
      - description: |-
          Sort results using the standard syntax described in [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#sorting-results)

          Sorting is supported for the following fields: **id, name, created, modified, type, attribute, value, source.id, requestable**
        example: "name,id"
        explode: true
        in: query
        name: sorters
        required: false
        schema:
          format: comma-separated
          type: string
        style: form
      - description: |-
          Filter results using the standard syntax described in [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#filtering-results)

          Filtering is supported for the following fields and operators:

          **id**: *eq, in*

          **name**: *eq, in, sw*

          **type**: *eq, in*

          **attribute**: *eq, in*

          **value**: *eq, in, sw*

          **source.id**: *eq, in*

          **requestable**: *eq*

          **created**: *gt, lt, ge, le*

          **modified**: *gt, lt, ge, le*

          **owner.id**: *eq, in*

          **tags**: *eq*

          **privilegeLevel.direct**: *eq*
        example: attribute eq "memberOf"
        explode: true
        in: query
        name: filters
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/entitlementv2'
                type: array
          description: List of entitlements
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Client Error - Returned if the request body is invalid.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listEntitlementsV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listEntitlementsV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              examples:
                "500":
                  summary: An example of a 500 response object
                  value:
                    detailCode: 500.0 Internal Fault
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: An internal fault occurred.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Internal Server Error - Returned if there is an unexpected
            error.
      security:
      - userAuth:
        - idn:entitlement:read
        - idn:entitlement:manage
      summary: Gets a list of entitlements.
      tags:
      - Entitlements
      x-sailpoint-userLevels:
      - Any
  /entitlements/v1/account/{accountId}/entitlements:
    get:
      description: "This API returns a list of all entitlements associated with the\
        \ given account ID. The account must exist; if not found, the API returns\
        \ 404."
      operationId: listEntitlementsByAccountV1
      parameters:
      - description: The account ID to get entitlements for
        example: ef38f94347e94562b5bb8424a56397d8
        explode: false
        in: path
        name: accountId
        required: true
        schema:
          type: string
        style: simple
        x-sailpoint-resource-operation-id: listAccounts
      - description: |-
          Max number of results to return.
          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: 250
        explode: true
        in: query
        name: limit
