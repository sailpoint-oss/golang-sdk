  /entitlements/v1/bulk-update:
    post:
      description: |
        This API applies an update to every entitlement of the list.


        The number of entitlements to update is limited to 50 items maximum.


        The JsonPatch update follows the [JSON Patch](https://tools.ietf.org/html/rfc6902) standard.
        examples of allowed operations :
        `**{ "op": "replace", "path": "/requestable","value": boolean }**`
        `**{ "op": "replace", "path": "/privilegeOverride/level","value": string }**`

        A token with ORG_ADMIN or API authority is required to call this API.
      operationId: updateEntitlementsInBulkV1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/entitlementbulkupdaterequest'
        required: true
      responses:
        "204":
          description: No content - indicates the request was successful but there
            is no content to be returned in the response.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Client Error - Returned if the request body is invalid.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listEntitlementsV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "404":
          content:
            application/json:
              examples:
                "404":
                  summary: An example of a 404 response object
