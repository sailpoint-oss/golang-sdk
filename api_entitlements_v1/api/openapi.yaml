      security:
      - userAuth:
        - idn:entitlement:read
        - idn:entitlement:manage
      summary: Get an entitlement
      tags:
      - Entitlements
      x-sailpoint-userLevels:
      - ORG_ADMIN
    patch:
      description: |-
        This API updates an existing entitlement using [JSON Patch](https://tools.ietf.org/html/rfc6902) syntax.

        The following fields are patchable: **requestable**, **segments**, **privilegeOverride/level**, **owner**, **name**, **description**, and **manuallyUpdatedFields**

        When you're patching owner, only owner type and owner id must be provided. Owner name is optional, and it won't be modified. If the owner name is provided, it should correspond to the real name. The only owner type currently supported is IDENTITY.
      operationId: patchEntitlementV1
      parameters:
      - description: ID of the entitlement to patch
        explode: false
        in: path
        name: id
        required: true
        schema:
          example: 2c91808a7813090a017814121e121518
          type: string
        style: simple
        x-sailpoint-resource-operation-id: listEntitlements
      requestBody:
        content:
          application/json-patch+json:
            examples:
              Assign an entitlement to a segment:
                description: This example shows how to use patch to assign an entitlement
                  to a segment by adding the segment's ID to the entitlement's segments
                  array.
                value:
                - op: add
                  path: /segments/-
