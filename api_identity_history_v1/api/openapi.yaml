  /historical-identities/v1/{id}/snapshot-summary:
    get:
      description: 'This method gets the summary for the event count for a specific
        identity by month/day Requires authorization scope of ''idn:identity-history:read'' '
      operationId: getIdentitySnapshotSummaryV1
      parameters:
      - description: The identity id
        example: 8c190e6787aa4ed9a90bd9d5344523fb
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
        x-sailpoint-resource-operation-id: listHistoricalIdentities
      - description: The date before which snapshot summary is required
        example: 2007-03-01T13:00:00Z
        explode: true
        in: query
        name: before
        required: false
        schema:
          type: string
        style: form
      - description: The interval indicating day or month. Defaults to month if not
          specified
        explode: true
        in: query
        name: interval
        required: false
        schema:
          enum:
          - day
          - month
          type: string
        style: form
      - description: The time zone. Defaults to UTC if not provided
        example: UTC
        explode: true
        in: query
        name: time-zone
        required: false
        schema:
          type: string
        style: form
      - description: |-
          Max number of results to return.
