openapi: 3.0.1
info:
  contact:
    name: Developer Relations
    url: https://developer.sailpoint.com/discuss/api-help
  description: "Use these APIs to interact with the Identity Security Cloud platform\
    \ to achieve repeatable, automated processes with greater scalability. We encourage\
    \ you to join the SailPoint Developer Community forum at https://developer.sailpoint.com/discuss\
    \ to connect with other developers using our APIs."
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://developer.sailpoint.com/discuss/tos
  title: Identity Security Cloud API - Identity History
  version: v1
servers:
- description: This is the production API server.
  url: "https://{tenant}.api.identitynow.com"
  variables:
    tenant:
      default: sailpoint
      description: "This is the name of your tenant, typically your company's name."
- description: This is the versioned API server.
  url: "https://{apiUrl}"
  variables:
    apiUrl:
      default: sailpoint.api.identitynow.com
      description: This is the api url of your tenant
security:
- userAuth:
  - sp:scopes:all
tags:
- name: Identity History
paths:
  /historical-identities/v1:
    get:
      description: This gets the list of identities for the customer. This list end
        point does not support count=true request param. The total  count of identities
        would never be returned even if the count param is specified in the request
        Requires authorization scope of 'idn:identity-history:read'
      operationId: listHistoricalIdentitiesV1
      parameters:
      - description: "This param is used for starts-with search for first, last and\
          \ display name of the identity"
        example: Ada
        explode: true
        in: query
        name: starts-with-query
        required: false
        schema:
          type: string
        style: form
      - description: Indicates if we want to only list down deleted identities or
          not.
        example: true
        explode: true
        in: query
        name: is-deleted
        required: false
        schema:
          type: boolean
        style: form
      - description: Indicates if we want to only list active or inactive identities.
        example: true
        explode: true
        in: query
        name: is-active
        required: false
        schema:
          type: boolean
        style: form
      - description: |-
          Max number of results to return.
          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: 250
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 250
          format: int32
          maximum: 250
          minimum: 0
          type: integer
        style: form
      - description: |-
          Offset into the full result set. Usually specified with *limit* to paginate through the results.
          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: 0
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          format: int32
          minimum: 0
          type: integer
        style: form
      - description: Use this header to enable this experimental API.
        example: true
        explode: false
        in: header
        name: X-SailPoint-Experimental
        required: true
        schema:
          default: "true"
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/identitylistitem'
                type: array
          description: List of identities for the customer.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Client Error - Returned if the request body is invalid.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listHistoricalIdentitiesV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listHistoricalIdentitiesV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              examples:
                "500":
                  summary: An example of a 500 response object
                  value:
                    detailCode: 500.0 Internal Fault
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: An internal fault occurred.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Internal Server Error - Returned if there is an unexpected
            error.
      security:
      - userAuth:
        - idn:identity-history:read
        - idn:identity-history:manage
      - applicationAuth:
        - idn:identity-history:read
        - idn:identity-history:manage
      summary: Lists all the identities
      tags:
      - Identity History
  /historical-identities/v1/{id}:
    get:
      description: This method retrieves a specified identity Requires authorization
        scope of 'idn:identity-history:read'
      operationId: getHistoricalIdentityV1
      parameters:
      - description: The identity id
        example: 8c190e6787aa4ed9a90bd9d5344523fb
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
        x-sailpoint-resource-operation-id: listHistoricalIdentities
      - description: Use this header to enable this experimental API.
        example: true
        explode: false
        in: header
        name: X-SailPoint-Experimental
        required: true
        schema:
          default: "true"
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/identityhistoryresponse'
          description: The identity object.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Client Error - Returned if the request body is invalid.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listHistoricalIdentitiesV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listHistoricalIdentitiesV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              examples:
                "500":
                  summary: An example of a 500 response object
                  value:
                    detailCode: 500.0 Internal Fault
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: An internal fault occurred.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Internal Server Error - Returned if there is an unexpected
            error.
      security:
      - userAuth:
        - idn:identity-history:read
        - idn:identity-history:manage
      - applicationAuth:
        - idn:identity-history:read
        - idn:identity-history:manage
      summary: Get latest snapshot of identity
      tags:
      - Identity History
  /historical-identities/v1/{id}/access-items:
    get:
      description: |
        This method retrieves a list of access item for the identity filtered by the access item type
      operationId: listIdentityAccessItemsV1
      parameters:
      - description: The identity id
        example: 8c190e6787aa4ed9a90bd9d5344523fb
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
        x-sailpoint-resource-operation-id: listHistoricalIdentities
      - description: "The type of access item for the identity. If not provided, it\
          \ defaults to account"
        example: account
        explode: true
        in: query
        name: type
        required: false
        schema:
          enum:
          - account
          - entitlement
          - app
          - accessProfile
          - role
          type: string
        style: form
      - description: Use this header to enable this experimental API.
        example: true
        explode: false
        in: header
        name: X-SailPoint-Experimental
        required: true
        schema:
          default: "true"
          type: string
        style: simple
      - description: |-
          Max number of results to return.
          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: 250
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 250
          format: int32
          maximum: 250
          minimum: 0
          type: integer
        style: form
      - description: |-
          If *true* it will populate the *X-Total-Count* response header with the number of results that would be returned if *limit* and *offset* were ignored.

          Since requesting a total count can have a performance impact, it is recommended not to send **count=true** if that value will not be used.

          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: true
        explode: true
        in: query
        name: count
        required: false
        schema:
          default: false
          type: boolean
        style: form
      - description: |-
          Offset into the full result set. Usually specified with *limit* to paginate through the results.
          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: 0
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          format: int32
          minimum: 0
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              examples:
                Access Profile:
                  description: An access profile response
                  value:
                  - accessType: accessProfile
                    id: 2c918087763e69d901763e72e97f006f
                    name: sample
                    sourceName: DataScienceDataset
                    sourceId: 2793o32dwd
                    description: AccessProfile - Workday/Citizenship access
                    displayName: Dr. Arden Rogahn MD
                    entitlementCount: 12
                    appDisplayName: AppName
                Account:
                  description: An account response
                  value:
                  - accessType: account
                    id: 2c918087763e69d901763e72e97f006f
                    nativeIdentity: dr.arden.ogahn.d
                    sourceName: DataScienceDataset
                    sourceId: 2793o32dwd
                    entitlementCount: 12
                    displayName: Dr. Arden Rogahn MD
                App:
                  description: An app response
                  value:
                  - accessType: app
                    id: 2c918087763e69d901763e72e97f006f
                    name: appName
                Entitlement:
                  description: An entitlement event
                  value:
                  - accessType: entitlement
                    id: 2c918087763e69d901763e72e97f006f
                    attribute: groups
                    value: Upward mobility access
                    type: group
                    sourceName: DataScienceDataset
                    sourceId: 2793o32dwd
                    description: Entitlement - Workday/Citizenship access
                    displayName: Dr. Arden Rogahn MD
                Role:
                  description: A role response
                  value:
                  - accessType: role
                    id: 2c918087763e69d901763e72e97f006f
                    name: sample
                    description: Role - Workday/Citizenship access
              schema:
                items:
                  $ref: '#/components/schemas/listIdentityAccessItemsV1_200_response_inner'
                type: array
          description: The list of access items.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Client Error - Returned if the request body is invalid.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listHistoricalIdentitiesV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "404":
          content:
            application/json:
              examples:
                "404":
                  summary: An example of a 404 response object
                  value:
                    detailCode: 404 Not found
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server did not find a current representation for the
                        target resource.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Not Found - returned if the request URL refers to a resource
            or object that does not exist
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listHistoricalIdentitiesV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              examples:
                "500":
                  summary: An example of a 500 response object
                  value:
                    detailCode: 500.0 Internal Fault
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: An internal fault occurred.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Internal Server Error - Returned if there is an unexpected
            error.
      security:
      - userAuth:
        - idn:identity-history:read
        - idn:identity-history:manage
      - applicationAuth:
        - idn:identity-history:read
        - idn:identity-history:manage
      summary: List access items by identity
      tags:
      - Identity History
      x-sailpoint-userLevels:
      - ORG_ADMIN
      - HELPDESK
      - REPORT_ADMIN
  /historical-identities/v1/{id}/snapshots:
    get:
      description: 'This method retrieves all the snapshots for the identity Requires
        authorization scope of ''idn:identity-history:read'' '
      operationId: listIdentitySnapshotsV1
      parameters:
      - description: The identity id
        example: 8c190e6787aa4ed9a90bd9d5344523fb
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
        x-sailpoint-resource-operation-id: listHistoricalIdentities
      - description: The specified start date
        example: 2007-03-01T13:00:00Z
        explode: true
        in: query
        name: start
        required: false
        schema:
          type: string
        style: form
      - description: The interval indicating the range in day or month for the specified
          interval-name
        explode: true
        in: query
        name: interval
        required: false
        schema:
          enum:
          - day
          - month
          type: string
        style: form
      - description: |-
          Max number of results to return.
