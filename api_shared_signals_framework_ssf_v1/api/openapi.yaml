        inactivity_timeout: 3600
        events_requested:
        - "https://schemas.openid.net/secevent/caep/event-type/{event-type}"
        min_verification_interval: 300
        updatedAt: 2025-02-11T14:30:00Z
      type: object
    createstreamrequest:
      description: Request body for POST /ssf/streams (create stream).
      properties:
        delivery:
          $ref: '#/components/schemas/createstreamdeliveryrequest'
        events_requested:
          description: |
            Optional list of event types the receiver wants. Use CAEP event-type URIs in the form:
