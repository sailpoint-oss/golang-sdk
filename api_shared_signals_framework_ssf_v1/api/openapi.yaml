openapi: 3.0.1
info:
  contact:
    name: Developer Relations
    url: https://developer.sailpoint.com/discuss/api-help
  description: "Use these APIs to interact with the Identity Security Cloud platform\
    \ to achieve repeatable, automated processes with greater scalability. We encourage\
    \ you to join the SailPoint Developer Community forum at https://developer.sailpoint.com/discuss\
    \ to connect with other developers using our APIs."
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://developer.sailpoint.com/discuss/tos
  title: Identity Security Cloud API - Shared Signals Framework (SSF)
  version: v1
servers:
- description: This is the production API server.
  url: "https://{tenant}.api.identitynow.com"
  variables:
    tenant:
      default: sailpoint
      description: "This is the name of your tenant, typically your company's name."
- description: This is the versioned API server.
  url: "https://{apiUrl}"
  variables:
    apiUrl:
      default: sailpoint.api.identitynow.com
      description: This is the api url of your tenant
security:
- userAuth:
  - sp:scopes:all
tags:
- description: |
    The SSF Transmitter Service is a security event notification system that monitors identity attribute changes
    and automatically triggers session revocation events when specific lifecycle conditions are met.

    Use this API to implement transmitter functionality so administrators can discover the transmitter and manage streams.
    Transmitters send identity data and events from Identity Security Cloud to external receivers over the Secure Sync Framework (SSF).
    The SSF configuration and JWKS endpoints support discovery and verification; the stream management endpoints support creating, updating, and managing streams and verifying receivers.
    In Identity Security Cloud, administrators can use the "Connections" > "Shared Signals" area to view and manage transmitters and their streams.
  name: Shared Signals Framework (SSF)
paths:
  /.well-known/v1/ssf-configuration:
    get:
      description: Returns the SSF transmitter discovery metadata (well-known configuration).
      operationId: getSSFConfigurationV1
      responses:
        "200":
          content:
            application/json:
              example:
                spec_version: 1_0
                issuer: https://tenant.api.identitynow.com
                jwks_uri: https://tenant.api.identitynow.com/ssf/jwks
                delivery_methods_supported:
                - urn:ietf:rfc:8935
                configuration_endpoint: https://tenant.api.identitynow.com/latest/ssf/streams
                status_endpoint: https://tenant.api.identitynow.com/latest/ssf/streams/status
                verification_endpoint: https://tenant.api.identitynow.com/latest/ssf/streams/verify
                authorization_schemes:
                - spec_urn: urn:ietf:rfc:6749
                - spec_urn: urn:ietf:rfc:6750
              schema:
                $ref: '#/components/schemas/transmittermetadata'
          description: "SSF transmitter configuration (issuer, jwks_uri, endpoints,\
            \ authorization_schemes)."
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Client Error - Returned if the request body is invalid.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getSSFConfigurationV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getSSFConfigurationV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              examples:
                "500":
                  summary: An example of a 500 response object
                  value:
                    detailCode: 500.0 Internal Fault
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: An internal fault occurred.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Internal Server Error - Returned if there is an unexpected
            error.
      security:
      - {}
      summary: Get SSF configuration
      tags:
      - Shared Signals Framework (SSF)
