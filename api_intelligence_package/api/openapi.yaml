          authoritative: false
          systemAccount: false
          isMachine: false
          hasEntitlements: true
          manuallyCorrelated: false
          connectionType: direct
          nativeIdentity: "CN=example.user,OU=users"
          created: 2026-01-01T00:00:00Z
          modified: 2026-05-01T00:00:00Z
      properties:
        accounts:
          description: Accounts for the identity in camelCase wire format from Shelby
            List Accounts.
          example:
          - id: acc-1
            name: example.user
            source:
              id: src-1
              name: Example Directory
            disabled: false
            locked: false
            uncorrelated: false
            authoritative: false
            systemAccount: false
            isMachine: false
            hasEntitlements: true
            manuallyCorrelated: false
            connectionType: direct
            nativeIdentity: "CN=example.user,OU=users"
            created: 2026-01-01T00:00:00Z
            modified: 2026-05-01T00:00:00Z
          items:
            $ref: '#/components/schemas/intelaccessaccountwire'
          type: array
        privilegedAccessItems:
          description: Privileged access items for the identity returned by SDS Search.
          example:
          - privileged: true
            displayName: Example_Admin_Access
            name: Example_Admin_Access
            standalone: true
            id: ent-1
            source:
              name: Example HR Source
              id: src-2
            attribute: EXAMPLE_PERMISSION_GROUPS
            type: ENTITLEMENT
            value: Example_Admin_Access
          items:
            $ref: '#/components/schemas/intelprivilegedaccessitemwire'
          type: array
      required:
      - accounts
      - privilegedAccessItems
      type: object
    intelidentityaccesshistorybody:
