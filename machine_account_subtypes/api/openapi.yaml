  /source-subtypes/v1/{subtypeId}/machine-config:
    get:
      description: "This endpoint retrieves the approval configuration for machine\
        \ account creation and deletion at the machine subtype level. By providing\
        \ a specific subtypeId in the path, clients can fetch the approval rules and\
        \ settings (such as required approvers and comments policy) that govern account\
        \ creation and deletion for that particular machine subtype. The response\
        \ includes a MachineAccountSubtypeConfigDto object detailing these configurations,\
        \ enabling clients to understand or display the approval workflow required\
        \ for creating and deleting machine accounts of the given subtype. Use this\
        \ endpoint to get machine subtype level approval config for account creation\
        \ and deletion."
      operationId: getMachineAccountSubtypeApprovalConfigV1
      parameters:
      - description: Use this header to enable this experimental API.
        example: true
        explode: false
        in: header
        name: X-SailPoint-Experimental
        required: true
        schema:
          default: "true"
          type: string
        style: simple
      - description: machine subtype id.
        example: ef38f94347e94562b5bb8424a56498d8
        explode: false
        in: path
        name: subtypeId
        required: true
        schema:
          type: string
        style: simple
        x-sailpoint-resource-operation-id: listSourceSubtypesV1
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/machineaccountsubtypeconfigdto'
          description: Responds with a MachineAccountSubtypeConfigDto for machine
            account creation and deletion approval config by subtypeId.
        "400":
          content:
            application/json:
