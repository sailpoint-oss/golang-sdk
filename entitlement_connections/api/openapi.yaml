openapi: 3.0.1
info:
  contact:
    name: Developer Relations
    url: https://developer.sailpoint.com/discuss/api-help
  description: "Use these APIs to interact with the Identity Security Cloud platform\
    \ to achieve repeatable, automated processes with greater scalability. We encourage\
    \ you to join the SailPoint Developer Community forum at https://developer.sailpoint.com/discuss\
    \ to connect with other developers using our APIs."
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://developer.sailpoint.com/discuss/tos
  title: Identity Security Cloud API - Entitlement Connections
  version: v1
servers:
- description: This is the production API server.
  url: "https://{tenant}.api.identitynow.com"
  variables:
    tenant:
      default: sailpoint
      description: "This is the name of your tenant, typically your company's name."
- description: This is the versioned API server.
  url: "https://{apiUrl}"
  variables:
    apiUrl:
      default: sailpoint.api.identitynow.com
      description: This is the api url of your tenant
security:
- userAuth:
  - sp:scopes:all
tags:
- description: |
    Use this API to search and manage entitlement connections.
    Entitlement connections represent the relationship between an identity account and an entitlement on a source, including its access type and JIT lifecycle state.
  name: Entitlement Connections
paths:
  /entitlement-connections/v1:
    get:
      description: |
        Returns entitlement connections for the tenant.

        This endpoint proxies to Search and supports standard collection query parameters.
        The `filters` and `sorters` values support the Entitlement Connections search fields documented by ECS.
      operationId: listEntitlementConnectionsV1
      parameters:
      - description: |-
          Offset into the full result set. Usually specified with *limit* to paginate through the results.
          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: 0
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          format: int32
          minimum: 0
          type: integer
        style: form
      - description: |-
          Max number of results to return.
          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: 250
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 250
          format: int32
          maximum: 250
          minimum: 0
          type: integer
        style: form
      - description: |-
          If *true* it will populate the *X-Total-Count* response header with the number of results that would be returned if *limit* and *offset* were ignored.

          Since requesting a total count can have a performance impact, it is recommended not to send **count=true** if that value will not be used.

          See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information.
        example: true
        explode: true
        in: query
        name: count
        required: false
        schema:
          default: false
          type: boolean
        style: form
      - description: |-
          Used to begin the search window at the values specified.

          This parameter consists of the last values of the sorted fields in the current record set.

          searchAfter length must match the number of sorters.

          This is used to expand the Elasticsearch limit of 10K records by shifting the 10K window to begin at this value.

          It is recommended that you always include the ID of the object in addition to any other fields on this parameter in order to ensure you don't get duplicate results while paging.

          For example, if you are sorting by name you will also want to include ID, for example searchAfter=Account Payable,2c91808375d8e80a0175e1f88a575221&sorters=name,id.

          If the last entitlement ID in the search result is 2c91808375d8e80a0175e1f88a575221 and the last name is "Account Payable", then using that name and ID will start a new search after this entitlement.
        example: "Account Payable,2c91808375d8e80a0175e1f88a575221"
        explode: true
        in: query
        name: searchAfter
        required: false
        schema:
          format: comma-separated
          type: string
        style: form
      - description: |
          Filter results using the standard syntax described in [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#filtering-results)

          Filtering is supported for the following fields and operators:

          **identity.id**: *eq, in*

          **identity.name**: *eq, in, co*

          **source.id**: *eq, in*

          **source.name**: *eq, in, co*

          **account.id**: *eq, in*

          **account.name**: *eq, in, co*

          **entitlement.id**: *eq, in*

          **entitlement.attribute**: *eq, in, co*

          **entitlement.value**: *eq, in, co*

          **entitlement.privilegeLevel.effective**: *eq, in, co*

          **type**: *eq, in*

          **state.value**: *eq, in, co*

          **standalone**: *eq, in*

          **jit.activation**: *gt, lt, ge, le*

          **jit.provision**: *gt, lt, ge, le*

          **jit.deactivation**: *gt, lt, ge, le*

          **jit.deprovision**: *gt, lt, ge, le*

          **jit.expiration**: *gt, lt, ge, le*
        example: type eq "JIT"
        explode: true
        in: query
        name: filters
        required: false
        schema:
          type: string
        style: form
      - description: |
          Sort results using the standard syntax described in [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#sorting-results)

          Sorting is supported for the following fields: **id, identity.id, identity.name, source.id, source.name, account.id, account.name, entitlement.id, entitlement.displayName, entitlement.attribute, entitlement.privilegeLevel.effective, type, state.value, standalone, jit.activation, jit.provision, jit.deactivation, jit.deprovision, jit.expiration**

          Prefix a field with `-` for descending order.
        example: "-type,id"
        explode: true
        in: query
        name: sorters
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/entitlementconnectionsearchhit'
                type: array
          description: List of entitlement connections.
          headers:
            X-Total-Count:
              description: Included when `count=true` and available from Search.
              explode: false
              schema:
                type: string
              style: simple
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Client Error - Returned if the request body is invalid.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listEntitlementConnectionsV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "404":
          content:
            application/json:
              examples:
                "404":
                  summary: An example of a 404 response object
                  value:
                    detailCode: 404 Not found
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server did not find a current representation for the
                        target resource.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Not Found - returned if the request URL refers to a resource
            or object that does not exist
        "412":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listEntitlementConnectionsV1_412_response'
          description: Precondition Failed - Returned in response if API/Feature not
            enabled for an organization.
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listEntitlementConnectionsV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              examples:
                "500":
                  summary: An example of a 500 response object
                  value:
                    detailCode: 500.0 Internal Fault
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: An internal fault occurred.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Internal Server Error - Returned if there is an unexpected
            error.
      security:
      - userAuth:
        - idn:entitlement-connections:list
      summary: List entitlement connections
      tags:
      - Entitlement Connections
      x-sailpoint-userLevels:
      - ORG_ADMIN
    patch:
      description: |
        Applies JSON Patch operations to a single entitlement connection selected by
        `entitlementId`, `identityId`, and `accountId`.
      operationId: patchEntitlementConnectionByQueryV1
      parameters:
      - description: Entitlement ID (UUID with or without hyphens).
        example: dcfd09e551644ad5aa162ce977862031
        explode: true
        in: query
        name: entitlementId
        required: true
        schema:
          type: string
        style: form
      - description: Identity ID (UUID with or without hyphens).
        example: 5470d8d4817a4207a8020bf533187da9
        explode: true
        in: query
        name: identityId
        required: true
        schema:
          type: string
        style: form
      - description: Account ID (UUID with or without hyphens).
        example: 323bfddfb3dd4197b8f10f7735307d27
        explode: true
        in: query
        name: accountId
        required: true
        schema:
          type: string
        style: form
      requestBody:
        content:
          application/json-patch+json:
            schema:
              items:
                $ref: '#/components/schemas/jsonpatchoperation'
              type: array
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/entitlementconnection'
          description: Updated entitlement connection.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Client Error - Returned if the request body is invalid.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listEntitlementConnectionsV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "404":
          content:
            application/json:
              examples:
                "404":
                  summary: An example of a 404 response object
                  value:
                    detailCode: 404 Not found
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server did not find a current representation for the
                        target resource.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Not Found - returned if the request URL refers to a resource
            or object that does not exist
        "412":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listEntitlementConnectionsV1_412_response'
          description: Precondition Failed - Returned in response if API/Feature not
            enabled for an organization.
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listEntitlementConnectionsV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
          content:
            application/json:
              examples:
                "500":
                  summary: An example of a 500 response object
                  value:
                    detailCode: 500.0 Internal Fault
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: An internal fault occurred.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Internal Server Error - Returned if there is an unexpected
            error.
      security:
      - userAuth:
        - idn:entitlement-connections:manage
      summary: Update connection by query
      tags:
      - Entitlement Connections
      x-sailpoint-userLevels:
      - ORG_ADMIN
    post:
      description: |
        Updates connection type for up to 100 connections in one request.
        The API returns per-item results in a 207 Multi-Status response.
      operationId: updateEntitlementConnectionsBulkV1
      requestBody:
        content:
          application/json:
            examples:
              mixedBulkUpdate:
                summary: Mixed bulk update request
                value:
                - connectionId: d532fa5cb15748e2873c6a01e5923ec4
                  type: JIT
                - connectionId: 57bdbfcab8a34afb91c0a9fb4dba52b8
                  type: STANDING
                - connectionId: 0f571cefc8a2411790e0ee09f77e25a3
                  type: STANDING
                - connectionId: 025542c7e42144258c6f2325b6feeba8
                  type: JIT
                - connectionId: 6bccbc42381f49028dac9bfe68dbad2e
                  type: JIT
            schema:
              items:
                $ref: '#/components/schemas/entitlementconnectionbulkupdateitem'
              type: array
        required: true
      responses:
        "207":
          content:
            application/json:
              examples:
                mixedBulkUpdateResult:
                  summary: Mixed per-item bulk response
                  value:
                  - connectionId: d532fa5cb15748e2873c6a01e5923ec4
                    type: JIT
                    status: 201
                    description: success
                  - connectionId: 57bdbfcab8a34afb91c0a9fb4dba52b8
                    type: STANDING
                    status: 201
                    description: success
                  - connectionId: 6bccbc42381f49028dac9bfe68dbad2e
                    type: XYZ
                    status: 422
                    description: "Invalid type specified, must be JIT or STANDING"
                  - connectionId: 57bdbfcab8a34afb91c0a9fb4dba52b8
                    type: JIT
                    status: 409
                    description: Duplicate connectionId in request
                  - connectionId: 025542c7e42144258c6f2325b6feeba8
                    type: JIT
                    status: 404
                    description: Connection not found
              schema:
                items:
                  $ref: '#/components/schemas/entitlementconnectionbulkupdateresultitem'
                type: array
          description: Per-item bulk update results.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: Client Error - Returned if the request body is invalid.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listEntitlementConnectionsV1_401_response'
          description: "Unauthorized - Returned if there is no authorization header,\
            \ or if the JWT token is expired."
        "403":
          content:
            application/json:
              examples:
                "403":
                  summary: An example of a 403 response object
                  value:
                    detailCode: 403 Forbidden
                    trackingId: b21b1f7ce4da4d639f2c62a57171b427
                    messages:
                    - locale: en-US
                      localeOrigin: DEFAULT
                      text: The server understood the request but refuses to authorize
                        it.
              schema:
                $ref: '#/components/schemas/errorresponsedto'
          description: "Forbidden - Returned if the user you are running as, doesn't\
            \ have access to this end-point."
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listEntitlementConnectionsV1_429_response'
          description: Too Many Requests - Returned in response to too many requests
            in a given period of time - rate limited. The Retry-After header in the
            response includes how long to wait before trying again.
        "500":
